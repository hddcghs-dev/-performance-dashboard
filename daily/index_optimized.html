<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民德搓澡堂 · 日报看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 600; }
.date-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.date-nav button { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.date-nav button:hover { background: rgba(255,255,255,0.25); }
.date-nav input[type="date"] { padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; font-size: 13px; }
.date-nav input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
.container { max-width: 1600px; margin: 0 auto; padding: 20px; }
.panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #1a1a2e; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #dee2e6; white-space: nowrap; position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover td { background: #f8f9fa; }
.store-name { font-weight: 600; color: #1a1a2e; }
.rank-badge { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; font-size: 12px; font-weight: 700; color: #fff; }
.rank-1 { background: #FF6B35; } .rank-2 { background: #FF8C42; } .rank-3 { background: #FFA94D; } .rank-other { background: #A0A0A0; }
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.updated { font-size: 11px; color: #999; text-align: right; padding: 10px 0; }
.gap-big { background: #FFF2F0; color: #CF1322; font-weight: 600; }
.gap-small { background: #FFF7E6; color: #D48806; }
.gap-none { color: #00B050; }
.note { font-size: 12px; color: #adb5bd; margin-top: 12px; }
.section-header { background: #e6f7ff; font-weight: 600; }
.anomaly-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 16px; background: #FFF7E6; border-left: 4px solid #FA8C16; border-radius: 6px; }
.anomaly-bar.has-critical { background: #FFF2F0; border-left-color: #FF4D4F; }
.anomaly-tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.anomaly-tag.gap { background: #FF4D4F; color: #fff; }
.anomaly-tag.conv { background: #FA8C16; color: #fff; }
.conv-low { background: #FFF7E6; color: #D48806; font-weight: 600; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi-card { background: #fff; border: 1px solid #edf0f5; border-radius: 8px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.kpi-label { font-size: 12px; color: #667085; margin-bottom: 6px; }
.kpi-value { font-size: 22px; line-height: 1.2; font-weight: 700; color: #1a1a2e; }
.kpi-value.warn { color: #D48806; }
.kpi-value.bad { color: #CF1322; }
.kpi-value.good { color: #00A870; }
.kpi-sub { margin-top: 4px; font-size: 11px; color: #98a2b3; }
.toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.toolbar input[type="search"] { width: 260px; max-width: 100%; padding: 8px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 13px; outline: none; }
.toolbar input[type="search"]:focus { border-color: #1677ff; box-shadow: 0 0 0 3px rgba(22,119,255,0.12); }
.toolbar label { display: inline-flex; align-items: center; gap: 6px; color: #475467; font-size: 13px; white-space: nowrap; }
.toolbar select { padding: 8px 10px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 13px; background: #fff; }
.muted { color: #98a2b3; }
.missing { color: #b7bdc8; }
.row-alert td { background: #fff8f6; }
@media (max-width: 700px) {
  .container { padding: 12px; }
  .toolbar { align-items: stretch; }
  .toolbar input[type="search"], .toolbar select { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <h1>民德搓澡堂 · 日报看板</h1>
  <div class="date-nav">
    <button onclick="navDate(-1)">◀ 前一天</button>
    <input type="date" id="datePicker" onchange="onDateChange(this.value)">
    <button onclick="navDate(1)">后一天 ▶</button>
    <button onclick="resetDate()">最新日期</button>
  </div>
</div>

<div class="container">
  <div class="kpi-grid" id="dailyKpis"></div>
  <div class="panel">
    <div class="toolbar">
      <h3 style="margin-bottom:0;">全部门店业绩明细</h3>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <input type="search" id="storeSearch" placeholder="搜索门店" oninput="renderAll()">
        <select id="riskFilter" onchange="renderAll()">
          <option value="all">全部门店</option>
          <option value="alert">只看异常</option>
          <option value="missing">只看缺失数据</option>
        </select>
      </div>
    </div>
    <div id="anomalyBar"></div>
    <div class="table-wrap">
      <table id="detailTable">
        <thead>
          <tr>
            <th>排名</th><th>门店名称</th>
            <th>总业绩</th>
            <th>美团核销</th><th>美团线下</th>
            <th>抖音核销</th><th>抖音线下</th>
            <th>开卡</th><th>续充</th>
            <th>美团访问</th><th>抖音访问</th><th>抖音访问核销</th>
            <th>美团评分</th><th>抖音评分</th><th>经营评分</th>
            <th>好评</th><th>差评</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="note">核销金额来自美团/抖音日报。线下金额来自微矩POS营业汇总。</div>
  </div>

  <div class="updated" id="updateTime"></div>
</div>

<script>
let allData = [];
let currentDate = '';
let availableDates = [];
const DAILY_RULES = {
  gapWarn: 500,
  gapCritical: 1000,
  convWarn: 0.3,
  convMinVisit: 500
};

function n(v) {
  const num = Number(v);
  return Number.isFinite(num) ? num : 0;
}

function hasValue(v) {
  return v !== null && v !== undefined && v !== '';
}

function money(v) {
  return hasValue(v) ? '¥' + n(v).toLocaleString('zh-CN', { maximumFractionDigits: 0 }) : '<span class="missing">—</span>';
}

function count(v) {
  return hasValue(v) ? n(v).toLocaleString('zh-CN', { maximumFractionDigits: 0 }) : '<span class="missing">—</span>';
}

function score(v) {
  return hasValue(v) && n(v) > 0 ? n(v).toFixed(1) : '<span class="missing">—</span>';
}

async function loadData() {
  try {
    const resp = await fetch('daily_data.json');
    allData = await resp.json();
    initApp();
  } catch (e) {
    document.querySelector('#detailTable tbody').innerHTML =
      '<tr><td colspan="18" class="empty-state"><div style="font-size:48px;margin-bottom:16px;">📂</div><p>暂无数据</p><p style="font-size:12px;color:#bbb;">请先运行数据聚合脚本生成 daily_data.json</p></td></tr>';
  }
}

function initApp() {
  if (!allData.length) return;

  const dateSet = new Set(allData.map(r => r.日期).filter(d => d));
  availableDates = [...dateSet].sort().reverse();

  if (availableDates.length) {
    const dp = document.getElementById('datePicker');
    dp.min = availableDates[availableDates.length - 1];
    dp.max = availableDates[0];
  }

  currentDate = availableDates[0] || '';
  document.getElementById('datePicker').value = currentDate;
  renderAll();
}

function navDate(delta) {
  const idx = availableDates.indexOf(currentDate);
  if (idx === -1) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= availableDates.length) return;
  currentDate = availableDates[newIdx];
  document.getElementById('datePicker').value = currentDate;
  renderAll();
}

function onDateChange(val) { currentDate = val; renderAll(); }

function resetDate() {
  currentDate = availableDates[0] || '';
  document.getElementById('datePicker').value = currentDate;
  renderAll();
}

function renderAll() {
  const dayData = allData.filter(r => r.日期 === currentDate);
  if (!dayData.length) {
    document.querySelector('#detailTable tbody').innerHTML =
      '<tr><td colspan="18" class="empty-state"><div style="font-size:48px;margin-bottom:16px;">📅</div><p>该日期暂无数据</p></td></tr>';
    return;
  }
  renderDetailTable(dayData);
  document.getElementById('updateTime').textContent =
    `数据更新: ${currentDate} | 共 ${new Set(dayData.map(r => r.门店名称)).size} 家门店`;
}

function renderDetailTable(day) {
  const stores = [...day].map(r => {
    const dyVisit = r.抖音访问量 || 0;
    const dyReport = r.抖音核销金额 || 0;
    return {
      name: r.门店名称 || '',
      total: r.微矩总业绩 || 0,
      mtReport: r.美团核销金额 || 0,
      mtOffline: r.美团线下金额 || 0,
      mtGap: r.美团核销差额 != null ? r.美团核销差额 : (r.美团核销金额 || 0) - (r.美团线下金额 || 0),
      dyReport,
      dyOffline: r.抖音线下金额 || 0,
      dyGap: r.抖音核销差额 != null ? r.抖音核销差额 : dyReport - (r.抖音线下金额 || 0),
      wjCard: r.微矩开卡 || 0,
      wjRecharge: r.微矩续充 || 0,
      mtVisit: r.美团访问量 || 0,
      dyVisit,
      dyConv: dyVisit > 0 ? (dyReport / dyVisit) : 0,
      mtScore: r.美团评分 || 0,
      dyScore: r.抖音评分 || 0,
      bizScore: r.经营评分 || 0,
      good: r.新增好评 || 0,
      bad: r.新增差评 || 0
    };
  });

  stores.sort((a, b) => b.total - a.total);

  // ── 异常检测 ──────────────────────────────────────
  const GAP_THRESHOLD = 500;       // 核销差额 > 500 触发告警
  const CONV_THRESHOLD = 0.3;      // 抖音转化率 < 0.3 触发告警
  const CONV_MIN_VISIT = 500;      // 抖音访问 > 500 才检查转化率

  const anomalies = [];
  stores.forEach(s => {
    if (Math.abs(s.mtGap) > GAP_THRESHOLD) {
      anomalies.push({ name: s.name, type: 'gap', msg: `美团差额 ${s.mtGap > 0 ? '+' : ''}${s.mtGap.toLocaleString('zh-CN', {maximumFractionDigits: 0})}` });
    }
    if (Math.abs(s.dyGap) > GAP_THRESHOLD) {
      anomalies.push({ name: s.name, type: 'gap', msg: `抖音差额 ${s.dyGap > 0 ? '+' : ''}${s.dyGap.toLocaleString('zh-CN', {maximumFractionDigits: 0})}` });
    }
    if (s.dyConv < CONV_THRESHOLD && s.dyVisit > CONV_MIN_VISIT) {
      anomalies.push({ name: s.name, type: 'conv', msg: `抖音转化率 ${(s.dyConv * 100).toFixed(1)}% (访问${s.dyVisit.toLocaleString('zh-CN')}→核销¥${s.dyReport.toLocaleString('zh-CN')})` });
    }
  });

  const anomalyBar = document.getElementById('anomalyBar');
  if (anomalies.length > 0) {
    const hasGap = anomalies.some(a => a.type === 'gap');
    anomalyBar.className = 'anomaly-bar' + (hasGap ? ' has-critical' : '');
    anomalyBar.innerHTML = '<strong style="margin-right:8px;">⚠ 异常提醒</strong>' +
      anomalies.map(a => `<span class="anomaly-tag ${a.type}">${a.name}: ${a.msg}</span>`).join('');
    anomalyBar.style.display = 'block';
  } else {
    anomalyBar.style.display = 'none';
  }

  const fmt = (v) => v != null ? v.toLocaleString('zh-CN', {maximumFractionDigits: 0}) : '0';
  const fmtConv = (v) => {
    if (v == null || v === 0) return '-';
    return (v * 100).toFixed(1) + '%';
  };
  const convClass = (s) => {
    if (s.dyConv < CONV_THRESHOLD && s.dyVisit > CONV_MIN_VISIT) return 'conv-low';
    return '';
  };

  const tbody = document.querySelector('#detailTable tbody');
  tbody.innerHTML = stores.map((s, i) => {
    const rank = i + 1;
    const rkCls = rank <= 3 ? `rank-${rank}` : 'rank-other';
    return `<tr>
      <td><span class="rank-badge ${rkCls}">${rank}</span></td>
      <td class="store-name">${s.name}</td>
      <td style="font-weight:700">¥${fmt(s.total)}</td>
      <td>¥${fmt(s.mtReport)}</td>
      <td>¥${fmt(s.mtOffline)}</td>
      <td>¥${fmt(s.dyReport)}</td>
      <td>¥${fmt(s.dyOffline)}</td>
      <td>¥${fmt(s.wjCard)}</td>
      <td>¥${fmt(s.wjRecharge)}</td>
      <td>${fmt(s.mtVisit)}</td>
      <td>${fmt(s.dyVisit)}</td>
      <td class="${convClass(s)}">${fmtConv(s.dyConv)}</td>
      <td>${s.mtScore.toFixed(1)}</td>
      <td>${s.dyScore.toFixed(1)}</td>
      <td>${s.bizScore.toFixed(1)}</td>
      <td style="color:#00B050">${s.good}</td>
      <td style="color:#FF0000">${s.bad}</td>
    </tr>`;
  }).join('');
}

function toStoreRows(day) {
  return [...day].map(r => {
    const mtReport = hasValue(r.美团核销金额) ? n(r.美团核销金额) : null;
    const mtOffline = hasValue(r.美团线下金额) ? n(r.美团线下金额) : null;
    const dyReport = hasValue(r.抖音核销金额) ? n(r.抖音核销金额) : null;
    const dyOffline = hasValue(r.抖音线下金额) ? n(r.抖音线下金额) : null;
    const mtGap = hasValue(r.美团核销差额) ? n(r.美团核销差额) : n(mtReport) - n(mtOffline);
    const dyGap = hasValue(r.抖音核销差额) ? n(r.抖音核销差额) : n(dyReport) - n(dyOffline);
    const dyVisit = hasValue(r.抖音访问量) ? n(r.抖音访问量) : null;
    const dyConv = dyVisit > 0 ? n(dyReport) / dyVisit : null;
    const missing = ['微矩总业绩','美团核销金额','抖音核销金额','美团访问量','抖音访问量'].filter(k => !hasValue(r[k]));
    const gapAlert = Math.abs(mtGap) > DAILY_RULES.gapWarn || Math.abs(dyGap) > DAILY_RULES.gapWarn;
    const convAlert = dyConv !== null && dyConv < DAILY_RULES.convWarn && dyVisit > DAILY_RULES.convMinVisit;
    return {
      raw: r,
      name: r.门店名称 || '',
      total: hasValue(r.微矩总业绩) ? n(r.微矩总业绩) : null,
      mtReport, mtOffline, dyReport, dyOffline, mtGap, dyGap, dyVisit, dyConv,
      mtVisit: hasValue(r.美团访问量) ? n(r.美团访问量) : null,
      card: hasValue(r.开卡金额) ? n(r.开卡金额) : null,
      recharge: hasValue(r.续充金额) ? n(r.续充金额) : null,
      mtScore: r.美团评分,
      dyScore: r.抖音评分,
      opScore: r.经营评分,
      good: r.新增好评数,
      bad: r.新增差评数,
      missing,
      gapAlert,
      convAlert,
      hasAlert: gapAlert || convAlert
    };
  }).sort((a, b) => n(b.total) - n(a.total));
}

function renderDailyKpis(stores) {
  const total = stores.reduce((sum, s) => sum + n(s.total), 0);
  const card = stores.reduce((sum, s) => sum + n(s.card), 0);
  const recharge = stores.reduce((sum, s) => sum + n(s.recharge), 0);
  const alertCount = stores.filter(s => s.hasAlert).length;
  const missingCount = stores.filter(s => s.missing.length).length;
  const badCount = stores.reduce((sum, s) => sum + n(s.bad), 0);
  document.getElementById('dailyKpis').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">总业绩</div><div class="kpi-value">${money(total)}</div><div class="kpi-sub">${stores.length} 家门店</div></div>
    <div class="kpi-card"><div class="kpi-label">开卡金额</div><div class="kpi-value good">${money(card)}</div><div class="kpi-sub">续充 ${money(recharge)}</div></div>
    <div class="kpi-card"><div class="kpi-label">异常门店</div><div class="kpi-value ${alertCount ? 'bad' : 'good'}">${alertCount}</div><div class="kpi-sub">差额或访问核销偏低</div></div>
    <div class="kpi-card"><div class="kpi-label">数据缺失</div><div class="kpi-value ${missingCount ? 'warn' : 'good'}">${missingCount}</div><div class="kpi-sub">差评 ${count(badCount)}</div></div>
  `;
}

function renderAll() {
  const dayData = allData.filter(r => r.日期 === currentDate);
  if (!dayData.length) {
    document.getElementById('dailyKpis').innerHTML = '';
    document.getElementById('anomalyBar').innerHTML = '';
    document.getElementById('detailBody').innerHTML = '<tr><td colspan="15">无数据</td></tr>';
    document.getElementById('updateTime').textContent = `数据更新: ${currentDate} | 无数据`;
    return;
  }
  const stores = toStoreRows(dayData);
  renderDailyKpis(stores);
  const visibleCount = renderDetailTable(stores);
  document.getElementById('updateTime').textContent =
    `数据更新: ${currentDate} | 共 ${stores.length} 家门店 | 当前显示 ${visibleCount} 家`;
}

function renderDetailTable(stores) {
  const query = (document.getElementById('storeSearch')?.value || '').trim().toLowerCase();
  const risk = document.getElementById('riskFilter')?.value || 'all';
  const alertStores = stores.filter(s => s.hasAlert || s.missing.length);
  const topAlerts = alertStores.slice(0, 6).map(s => {
    const reasons = [];
    if (s.gapAlert) reasons.push('核销差额');
    if (s.convAlert) reasons.push('抖音访问核销偏低');
    if (s.missing.length) reasons.push(`缺失 ${s.missing.length} 项`);
    return `${escapeHtml(s.name)}：${reasons.join('、')}`;
  });
  document.getElementById('anomalyBar').innerHTML = alertStores.length
    ? `<div style="background:#fff1f0;border:1px solid #ffccc7;color:#a8071a;padding:10px 12px;border-radius:8px;margin-bottom:12px;">需关注 ${alertStores.length} 家：${topAlerts.join('；')}${alertStores.length > topAlerts.length ? '；...' : ''}</div>`
    : `<div style="background:#f6ffed;border:1px solid #b7eb8f;color:#237804;padding:10px 12px;border-radius:8px;margin-bottom:12px;">今日未发现明显核销差额或关键字段缺失。</div>`;

  let rows = stores.filter(s => !query || s.name.toLowerCase().includes(query));
  if (risk === 'alert') rows = rows.filter(s => s.hasAlert);
  if (risk === 'missing') rows = rows.filter(s => s.missing.length);

  if (!rows.length) {
    document.getElementById('detailBody').innerHTML = '<tr><td colspan="15">没有符合条件的门店</td></tr>';
    return 0;
  }

  document.getElementById('detailBody').innerHTML = rows.map(s => `
    <tr class="${s.hasAlert || s.missing.length ? 'row-alert' : ''}">
      <td>${escapeHtml(s.name)}${s.missing.length ? `<div class="kpi-sub">缺失：${s.missing.map(escapeHtml).join('、')}</div>` : ''}</td>
      <td><b>${money(s.total)}</b></td>
      <td>${money(s.mtReport)}${Math.abs(s.mtGap) > DAILY_RULES.gapWarn ? `<div class="kpi-sub bad">差额 ${money(s.mtGap)}</div>` : ''}</td>
      <td>${money(s.mtOffline)}</td>
      <td>${money(s.dyReport)}${Math.abs(s.dyGap) > DAILY_RULES.gapWarn ? `<div class="kpi-sub bad">差额 ${money(s.dyGap)}</div>` : ''}</td>
      <td>${money(s.dyOffline)}</td>
      <td>${money(s.card)}</td>
      <td>${money(s.recharge)}</td>
      <td>${count(s.mtVisit)}</td>
      <td>${count(s.dyVisit)}</td>
      <td>${s.dyConv === null ? '<span class="missing">—</span>' : (s.dyConv * 100).toFixed(1) + '%'}</td>
      <td>${score(s.mtScore)}</td>
      <td>${score(s.dyScore)}</td>
      <td>${score(s.opScore)}</td>
      <td>${count(s.good)} / ${count(s.bad)}</td>
    </tr>
  `).join('');
  return rows.length;
}

window.addEventListener('resize', () => {});
loadData();
</script>
</body>
</html>
