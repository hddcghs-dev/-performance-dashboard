<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民德搓澡堂 · 日报看板</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="assets/common.css">
<link rel="stylesheet" href="assets/dashboard.css">
</head>
<body>
<main class="app">
  <!-- Hero 区域 -->
  <section class="hero">
    <div class="hero-copy">
      <div class="eyebrow">Daily Operation Desk</div>
      <h1>民德搓澡堂 · 经营日报</h1>
      <p class="hero-subtitle" id="heroSubtitle">从总业绩、渠道核销、客流效率到评价风险，一屏判断今天该盯哪几家店。</p>
    </div>
    <div class="hero-actions">
      <button type="button" onclick="navDate(1)" title="前一天">← 前一天</button>
      <input type="date" id="datePicker" onchange="onDateChange(this.value)">
      <button type="button" onclick="navDate(-1)" title="后一天">后一天 →</button>
      <button type="button" onclick="resetDate()">📌 最新</button>
      <button class="theme-toggle" onclick="toggleDark()" title="切换深色模式" id="themeBtn">🌙</button>
    </div>
    <div class="hero-stats" id="heroStats"></div>
  </section>

  <!-- KPI 卡片 -->
  <section class="section">
    <div class="kpi-grid" id="kpiGrid">
      <!-- 骨架屏 -->
      <div class="card kpi-card" style="grid-column: span 2;">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-value"></div>
        <div class="skeleton skeleton-text" style="width: 60%;"></div>
      </div>
      <div class="card kpi-card">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-value"></div>
        <div class="skeleton skeleton-text" style="width: 60%;"></div>
      </div>
      <div class="card kpi-card">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-value"></div>
        <div class="skeleton skeleton-text" style="width: 60%;"></div>
      </div>
      <div class="card kpi-card">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-value"></div>
        <div class="skeleton skeleton-text" style="width: 60%;"></div>
      </div>
      <div class="card kpi-card">
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-value"></div>
        <div class="skeleton skeleton-text" style="width: 60%;"></div>
      </div>
    </div>
  </section>

  <!-- 风险队列 -->
  <section class="section">
    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">
            <span class="icon">⚠️</span>
            风险队列
          </div>
          <div class="panel-subtitle">差评、回复率、核销差额、低转化优先处理。</div>
        </div>
      </div>
      <div class="panel-body alert-list" id="alertList">
        <div class="alert warning">
          <span class="alert-icon">⏳</span>
          <div><h3>加载中...</h3><p>正在分析门店风险数据</p></div>
        </div>
      </div>
    </div>
  </section>

  <!-- 趋势图表 -->
  <section class="section grid-main">
    <div class="card wide" style="--accent:var(--brand); --accent-soft:var(--brand-soft);">
      <div class="panel-head">
        <div>
          <div class="panel-title">
            <span class="icon">📈</span>
            近期趋势
          </div>
          <div class="panel-subtitle">全店合计总业绩、美团核销、抖音核销、美团访问量、抖音访问量走势。</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="chart tall" id="trendChart"></div>
      </div>
    </div>
  </section>

  <!-- 门店明细表格 -->
  <section class="card table-panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">
          <span class="icon">🏪</span>
          全部门店明细
        </div>
        <div class="panel-subtitle">按经营结果排序，异常字段高亮。</div>
      </div>
      <div class="table-tools">
        <input id="storeSearch" type="search" placeholder="🔍 搜索门店" oninput="renderAll()">
        <select id="sortSelect" onchange="renderAll()">
          <option value="revenue">按总业绩</option>
          <option value="mt">按美团核销</option>
          <option value="dy">按抖音核销</option>
          <option value="bad">按差评</option>
          <option value="reply">按30s回复率</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>排名</th>
            <th>门店</th>
            <th>总业绩</th>
            <th>美团核销</th>
            <th>抖音核销</th>
            <th>美团访问</th>
            <th>抖音访问</th>
            <th>美团扫码</th>
            <th>抖音扫码</th>
            <th>30s回复</th>
            <th>5min回复</th>
            <th>好评</th>
            <th>差评</th>
          </tr>
        </thead>
        <tbody id="detailBody">
          <tr><td colspan="13" class="empty">⏳ 正在加载数据...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
  
  <div class="updated" id="updated">⏳ 数据加载中...</div>
</main>

<script src="assets/dashboard.js"></script>
</body>
</html>
