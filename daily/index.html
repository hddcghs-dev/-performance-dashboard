<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民德搓澡堂 · 日报看板</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="assets/common.css">
<link rel="stylesheet" href="assets/dashboard.css">
</head>
<body>
<main class="app">
  <section class="hero">
    <div class="hero-copy">
      <div class="eyebrow">Daily Operation Desk</div>
      <h1>民德搓澡堂 · 经营日报</h1>
      <p class="hero-subtitle" id="heroSubtitle">从总业绩、渠道核销、客流效率到评价风险，一屏判断今天该盯哪几家店。</p>
    </div>
    <div class="hero-actions">
      <button type="button" onclick="navDate(1)" title="前一天">←</button>
      <input type="date" id="datePicker" onchange="onDateChange(this.value)">
      <button type="button" onclick="navDate(-1)" title="后一天">→</button>
      <button type="button" onclick="resetDate()">最新</button>
      <button class="theme-toggle" onclick="toggleDark()" title="切换深色模式" id="themeBtn">🌙</button>
    </div>
    <div class="hero-stats" id="heroStats"></div>
  </section>

  <section class="section">
    <div class="kpi-grid" id="kpiGrid"></div>
  </section>

  <section class="section grid-main">
    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">经营结构</div>
          <div class="panel-subtitle">总盘、渠道占比、转化效率和健康度放在一起看。</div>
        </div>
      </div>
      <div class="panel-body bento">
        <div class="bento-card">
          <div class="mix-track" id="mixTrack"><span class="mt"></span><span class="dy"></span><span class="other"></span></div>
          <div class="legend" id="mixLegend"></div>
        </div>
        <div class="bento-card health">
          <div class="ring" id="healthRing"><strong id="healthScore">-</strong></div>
          <div class="health-copy" id="healthCopy"></div>
        </div>
        <div class="bento-card">
          <div class="quality-list" id="efficiencyList"></div>
        </div>
        <div class="bento-card">
          <div class="quality-list" id="qualityList"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">风险队列</div>
          <div class="panel-subtitle">差评、回复率、核销差额、低转化优先处理。</div>
        </div>
      </div>
      <div class="panel-body alert-list" id="alertList"></div>
    </div>
  </section>

  <section class="section grid-main">
    <div class="card wide" style="--accent:var(--brand)">
      <div class="panel-head">
        <div>
          <div class="panel-title">近期趋势</div>
          <div class="panel-subtitle">全店合计总业绩、美团核销、抖音核销走势。</div>
        </div>
      </div>
      <div class="panel-body"><div class="chart tall" id="trendChart"></div></div>
    </div>
  </section>

  <section class="section grid-main">
    <div class="card" style="--accent:var(--brand)">
      <div class="panel-head">
        <div>
          <div class="panel-title">业绩 Top 5</div>
          <div class="panel-subtitle">按总业绩排序的门店排名。</div>
        </div>
      </div>
      <div class="panel-body rank-list" id="rankRevenue"></div>
    </div>
    <div class="card" style="--accent:var(--red)">
      <div class="panel-head">
        <div>
          <div class="panel-title">差评 Top 5</div>
          <div class="panel-subtitle">差评数最多的门店。</div>
        </div>
      </div>
      <div class="panel-body rank-list" id="rankBad"></div>
    </div>
  </section>

  <section class="card table-panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">全部门店明细</div>
        <div class="panel-subtitle">按经营结果排序，异常字段高亮。</div>
      </div>
      <div class="table-tools">
        <input id="storeSearch" type="search" placeholder="搜索门店" oninput="renderAll()">
        <select id="sortSelect" onchange="renderAll()">
          <option value="revenue">按总业绩</option>
          <option value="mt">按美团核销</option>
          <option value="dy">按抖音核销</option>
          <option value="bad">按差评</option>
          <option value="reply">按30s回复率</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>排名</th><th>门店</th><th>总业绩</th><th>美团核销</th><th>抖音核销</th>
            <th>开卡</th><th>续充</th><th>美团访问</th><th>抖音访问</th><th>美团扫码</th><th>抖音扫码</th>
            <th>30s回复</th><th>美团评分</th><th>大众评分</th><th>抖音评分</th><th>好评</th><th>差评</th>
          </tr>
        </thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
  </section>
  <div class="updated" id="updated"></div>
</main>

<script src="assets/dashboard.js"></script>
</body>
</html>
