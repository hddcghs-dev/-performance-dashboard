<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民德搓澡堂 · 日报看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 600; }
.date-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.date-nav button { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.date-nav button:hover { background: rgba(255,255,255,0.25); }
.date-nav input[type="date"] { padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; font-size: 13px; }
.date-nav input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
.container { max-width: 1600px; margin: 0 auto; padding: 20px; }
.panel { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #1a1a2e; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #dee2e6; white-space: nowrap; position: sticky; top: 0; }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
tr:hover td { background: #f8f9fa; }
.store-name { font-weight: 600; color: #1a1a2e; }
.rank-badge { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; font-size: 12px; font-weight: 700; color: #fff; }
.rank-1 { background: #FF6B35; } .rank-2 { background: #FF8C42; } .rank-3 { background: #FFA94D; } .rank-other { background: #A0A0A0; }
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.updated { font-size: 11px; color: #999; text-align: right; padding: 10px 0; }
.gap-big { background: #FFF2F0; color: #CF1322; font-weight: 600; }
.gap-small { background: #FFF7E6; color: #D48806; }
.gap-none { color: #00B050; }
.note { font-size: 12px; color: #adb5bd; margin-top: 12px; }
.section-header { background: #e6f7ff; font-weight: 600; }
.anomaly-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 16px; background: #FFF7E6; border-left: 4px solid #FA8C16; border-radius: 6px; }
.anomaly-bar.has-critical { background: #FFF2F0; border-left-color: #FF4D4F; }
.anomaly-tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.anomaly-tag.gap { background: #FF4D4F; color: #fff; }
.anomaly-tag.conv { background: #FA8C16; color: #fff; }
.conv-low { background: #FFF7E6; color: #D48806; font-weight: 600; }
.bad-yes { background: #FFF2F0; color: #CF1322; font-weight: 700; }
.bad-row { background: #FFF2F0 !important; }
.anomaly-tag.bad { background: #CF1322; color: #fff; }
.kpi-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
.kpi-card { background: #fff; border-radius: 10px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
.kpi-card .kpi-label { font-size: 13px; color: #888; margin-bottom: 6px; }
.kpi-card .kpi-value { font-size: 26px; font-weight: 700; color: #1a1a2e; }
.kpi-card .kpi-value.mt { color: #FF6B35; }
.kpi-card .kpi-value.dy { color: #1DA1F2; }
.kpi-card .kpi-value.good { color: #00B050; }
.kpi-card .kpi-value.bad { color: #CF1322; }
</style>
</head>
<body>

<div class="header">
  <h1>民德搓澡堂 · 日报看板</h1>
  <div class="date-nav">
    <button onclick="navDate(-1)">◀ 前一天</button>
    <input type="date" id="datePicker" onchange="onDateChange(this.value)">
    <button onclick="navDate(1)">后一天 ▶</button>
    <button onclick="resetDate()">最新日期</button>
  </div>
</div>

<div class="container">
  <div class="kpi-cards" id="kpiCards">
    <div class="kpi-card"><div class="kpi-label">总业绩</div><div class="kpi-value" id="kpiTotal">-</div></div>
    <div class="kpi-card"><div class="kpi-label">美团核销</div><div class="kpi-value mt" id="kpiMt">-</div></div>
    <div class="kpi-card"><div class="kpi-label">抖音核销</div><div class="kpi-value dy" id="kpiDy">-</div></div>
    <div class="kpi-card"><div class="kpi-label">好评</div><div class="kpi-value good" id="kpiGood">-</div></div>
    <div class="kpi-card"><div class="kpi-label">差评</div><div class="kpi-value bad" id="kpiBad">-</div></div>
  </div>

  <div class="panel">
    <h3>全部门店业绩明细</h3>
    <div id="anomalyBar"></div>
    <div class="table-wrap">
      <table id="detailTable">
        <thead>
          <tr>
            <th>排名</th><th>门店名称</th>
            <th>总业绩</th>
            <th>美团核销</th>
            <th>抖音核销</th>
            <th>开卡</th><th>续充</th>
            <th>美团访问</th><th>抖音访问</th><th>抖音转化</th>
            <th>美团评分</th><th>抖音评分</th><th>经营评分</th>
            <th>好评</th><th>差评</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="note">核销金额来自美团/抖音日报。总业绩/开卡/续充来自微矩POS。红色行 = 有差评。</div>
  </div>

  <div class="updated" id="updateTime"></div>
</div>

<script>
let allData = [];
let currentDate = '';
let availableDates = [];

async function loadData() {
  // Try fetch first (works when served via HTTP/HTTPS)
  try {
    const resp = await fetch('daily_data.json');
    allData = await resp.json();
    initApp();
    return;
  } catch (e) {}

  // Fallback for file:// protocol (local opening)
  if (location.protocol === 'file:') {
    try {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', 'daily_data.json', false);
      xhr.send(null);
      if (xhr.status === 0 || xhr.status === 200) {
        allData = JSON.parse(xhr.responseText);
        initApp();
        return;
      }
    } catch (e) {}
  }

  // Show helpful error with local server command
  const isFile = location.protocol === 'file:';
  document.querySelector('#detailTable tbody').innerHTML =
    '<tr><td colspan="15" class="empty-state"><div style="font-size:48px;margin-bottom:16px;">📂</div><p>暂无数据</p>' +
    '<p style="font-size:12px;color:#bbb;">' +
    (isFile
      ? '浏览器禁止本地文件 fetch。请在此目录运行：<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">python -m http.server 8080</code> 然后用 <code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;">http://localhost:8080</code> 打开'
      : '请先运行数据聚合脚本生成 daily_data.json') +
    '</p></td></tr>';
}

function initApp() {
  if (!allData.length) return;

  const dateSet = new Set(allData.map(r => r.日期).filter(d => d));
  availableDates = [...dateSet].sort().reverse();

  if (availableDates.length) {
    const dp = document.getElementById('datePicker');
    dp.min = availableDates[availableDates.length - 1];
    dp.max = availableDates[0];
  }

  currentDate = availableDates[0] || '';
  document.getElementById('datePicker').value = currentDate;
  renderAll();
}

function navDate(delta) {
  const idx = availableDates.indexOf(currentDate);
  if (idx === -1) return;
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= availableDates.length) return;
  currentDate = availableDates[newIdx];
  document.getElementById('datePicker').value = currentDate;
  renderAll();
}

function onDateChange(val) { currentDate = val; renderAll(); }

function resetDate() {
  currentDate = availableDates[0] || '';
  document.getElementById('datePicker').value = currentDate;
  renderAll();
}

function renderAll() {
  const dayData = allData.filter(r => r.日期 === currentDate);
  if (!dayData.length) {
    document.querySelector('#detailTable tbody').innerHTML =
      '<tr><td colspan="15" class="empty-state"><div style="font-size:48px;margin-bottom:16px;">📅</div><p>该日期暂无数据</p></td></tr>';
    return;
  }

  // ── KPI 卡片 ──────────────────────────────────────
  const fmtKpi = (v) => v != null ? v.toLocaleString('zh-CN', {maximumFractionDigits: 0}) : '-';
  document.getElementById('kpiTotal').textContent = '¥' + fmtKpi(dayData.reduce((s, r) => s + (r.微矩总业绩 || 0), 0));
  document.getElementById('kpiMt').textContent = '¥' + fmtKpi(dayData.reduce((s, r) => s + (r.美团核销金额 || 0), 0));
  document.getElementById('kpiDy').textContent = '¥' + fmtKpi(dayData.reduce((s, r) => s + (r.抖音核销金额 || 0), 0));
  document.getElementById('kpiGood').textContent = fmtKpi(dayData.reduce((s, r) => s + (r.新增好评 || 0), 0));
  document.getElementById('kpiBad').textContent = fmtKpi(dayData.reduce((s, r) => s + (r.新增差评 || 0), 0));

  renderDetailTable(dayData);
  document.getElementById('updateTime').textContent =
    `数据更新: ${currentDate} | 共 ${new Set(dayData.map(r => r.门店名称)).size} 家门店`;
}

function renderDetailTable(day) {
  const stores = [...day].map(r => {
    const dyVisit = r.抖音访问量 || 0;
    const dyReport = r.抖音核销金额 || 0;
    return {
      name: r.门店名称 || '',
      total: r.微矩总业绩 || 0,
      mtReport: r.美团核销金额 || 0,
      dyReport: r.抖音核销金额 || 0,
      wjCard: r.微矩开卡 || 0,
      wjRecharge: r.微矩续充 || 0,
      mtVisit: r.美团访问量 || 0,
      dyVisit,
      dyConv: dyVisit > 0 ? (dyReport / dyVisit) : 0,
      mtScore: r.美团评分 || 0,
      dyScore: r.抖音评分 || 0,
      bizScore: r.经营评分 || 0,
      good: r.新增好评 || 0,
      bad: r.新增差评 || 0
    };
  });

  stores.sort((a, b) => b.total - a.total);

  // ── 异常检测 ──────────────────────────────────────
  const CONV_THRESHOLD = 0.3;      // 抖音转化率 < 0.3 触发告警
  const CONV_MIN_VISIT = 500;      // 抖音访问 > 500 才检查转化率

  const anomalies = [];
  stores.forEach(s => {
    if (s.bad > 0) {
      anomalies.push({ name: s.name, type: 'bad', msg: `差评 ${s.bad} 条` });
    }
    if (s.dyConv < CONV_THRESHOLD && s.dyVisit > CONV_MIN_VISIT) {
      anomalies.push({ name: s.name, type: 'conv', msg: `抖音转化率 ${(s.dyConv * 100).toFixed(1)}% (访问${s.dyVisit.toLocaleString('zh-CN')}→核销¥${s.dyReport.toLocaleString('zh-CN')})` });
    }
  });

  const anomalyBar = document.getElementById('anomalyBar');
  if (anomalies.length > 0) {
    const hasBad = anomalies.some(a => a.type === 'bad');
    anomalyBar.className = 'anomaly-bar' + (hasBad ? ' has-critical' : '');
    anomalyBar.innerHTML = '<strong style="margin-right:8px;">⚠ 异常提醒</strong>' +
      anomalies.map(a => `<span class="anomaly-tag ${a.type}">${a.name}: ${a.msg}</span>`).join('');
    anomalyBar.style.display = 'block';
  } else {
    anomalyBar.style.display = 'none';
  }

  const fmt = (v) => v != null ? v.toLocaleString('zh-CN', {maximumFractionDigits: 0}) : '0';
  const fmtConv = (v) => {
    if (v == null || v === 0) return '-';
    return (v * 100).toFixed(1) + '%';
  };
  const convClass = (s) => {
    if (s.dyConv < CONV_THRESHOLD && s.dyVisit > CONV_MIN_VISIT) return 'conv-low';
    return '';
  };

  const tbody = document.querySelector('#detailTable tbody');
  tbody.innerHTML = stores.map((s, i) => {
    const rank = i + 1;
    const rkCls = rank <= 3 ? `rank-${rank}` : 'rank-other';
    const badCls = s.bad > 0 ? 'bad-row' : '';
    return `<tr class="${badCls}">
      <td><span class="rank-badge ${rkCls}">${rank}</span></td>
      <td class="store-name">${s.name}</td>
      <td style="font-weight:700">¥${fmt(s.total)}</td>
      <td>¥${fmt(s.mtReport)}</td>
      <td>¥${fmt(s.dyReport)}</td>
      <td>¥${fmt(s.wjCard)}</td>
      <td>¥${fmt(s.wjRecharge)}</td>
      <td>${fmt(s.mtVisit)}</td>
      <td>${fmt(s.dyVisit)}</td>
      <td class="${convClass(s)}">${fmtConv(s.dyConv)}</td>
      <td>${s.mtScore.toFixed(1)}</td>
      <td>${s.dyScore.toFixed(1)}</td>
      <td>${s.bizScore.toFixed(1)}</td>
      <td style="color:#00B050">${s.good}</td>
      <td class="${s.bad > 0 ? 'bad-yes' : ''}">${s.bad}</td>
    </tr>`;
  }).join('');
}

window.addEventListener('resize', () => {});
loadData();
</script>
</body>
</html>
