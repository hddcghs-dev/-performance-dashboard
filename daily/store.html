<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门店趋势 · 民德搓澡堂</title>
<link rel="icon" href="data:,">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --page: #f3f5f8;
  --paper: #ffffff;
  --paper-soft: #f8fafc;
  --ink: #111827;
  --muted: #64748b;
  --faint: #94a3b8;
  --line: #e5e7eb;
  --line-strong: #d7dde7;
  --brand: #2563eb;
  --teal: #0f766e;
  --amber: #f59e0b;
  --orange: #f97316;
  --cyan: #0891b2;
  --green: #059669;
  --red: #dc2626;
  --violet: #7c3aed;
  --shadow: 0 18px 44px rgba(15, 23, 42, .08);
  --shadow-soft: 0 1px 2px rgba(15, 23, 42, .06);
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--page); }
body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  color: #1a1d23;
  background: #f4f5f7;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; cursor: pointer; }
.app {
  max-width: 1680px;
  margin: 0 auto;
  padding: 18px 20px 30px;
}
.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 22px;
  min-height: 176px;
  padding: 22px;
  color: #fff;
  background:
    linear-gradient(135deg, #171923 0%, #243145 48%, #135e58 100%);
  border: 1px solid rgba(255, 255, 255, .16);
  border-radius: var(--radius);
  box-shadow: 0 24px 68px rgba(17, 24, 39, .22);
  overflow: hidden;
}
.back {
  display: inline-flex;
  width: max-content;
  height: 34px;
  align-items: center;
  padding: 0 12px;
  color: rgba(255,255,255,.84);
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 8px;
  background: rgba(255,255,255,.09);
  text-decoration: none;
  font-size: 13px;
  font-weight: 680;
  transition: transform .18s ease, background .18s ease;
}
.back:hover { color: #fff; transform: translateY(-1px); background: rgba(255,255,255,.16); }
.hero-copy { align-self: center; }
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  color: rgba(255,255,255,.72);
  font-size: 12px;
  font-weight: 680;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.eyebrow::before {
  content: "";
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #34d399;
  box-shadow: 0 0 0 5px rgba(52, 211, 153, .13);
}
h1 {
  margin-top: 12px;
  font-size: clamp(25px, 3vw, 38px);
  line-height: 1.06;
  font-weight: 790;
  letter-spacing: 0;
}
.subtitle {
  margin-top: 12px;
  max-width: 760px;
  color: rgba(255,255,255,.74);
  font-size: 14px;
  line-height: 1.7;
}
.month-tools { display: flex; gap: 8px; align-items: flex-start; justify-content: flex-end; flex-wrap: wrap; }
.month-tools button, .month-label {
  height: 38px;
  border: 1px solid rgba(255,255,255,.24);
  border-radius: 8px;
  background: rgba(255,255,255,.10);
  color: #fff;
  padding: 0 12px;
  font-size: 13px;
  font-weight: 690;
}
.month-tools button { transition: transform .18s ease, background .18s ease; }
.month-tools button:hover { transform: translateY(-1px); background: rgba(255,255,255,.18); }
.month-label { display: inline-flex; align-items: center; justify-content: center; min-width: 92px; }

.section { margin-top: 20px; display: grid; gap: 16px; }
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}
.card {
  position: relative;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.02);
  overflow: hidden;
  animation: enter .46s ease both;
}
.kpi-card { padding: 20px 22px; }
.kpi-card:nth-child(2) { animation-delay: .04s; }
.kpi-card:nth-child(3) { animation-delay: .08s; }
.kpi-card:nth-child(4) { animation-delay: .12s; }
.label { color: #9ca3af; font-size: 11px; font-weight: 650; letter-spacing: .06em; text-transform: uppercase; }
.kpi-value {
  margin-top: 10px;
  font-size: clamp(26px, 2.2vw, 32px);
  line-height: 1.1;
  font-weight: 700;
  color: #1a1d23;
  letter-spacing: -.02em;
}
.kpi-foot { display: flex; gap: 6px; align-items: center; margin-top: 10px; color: #9ca3af; font-size: 12px; }
.delta {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 2px 7px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 790;
}
.delta.up { color: var(--green); background: #ecfdf5; }
.delta.down { color: var(--red); background: #fef2f2; }
.delta.flat { color: var(--muted); background: #f1f5f9; }
.grid-main {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
  align-items: stretch;
}
.grid-main > .card {
  display: flex;
  flex-direction: column;
}
.grid-main > .card > .panel-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}
.panel-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px 0;
}
.panel-title { font-size: 13px; font-weight: 600; color: #374151; }
.panel-subtitle { margin-top: 4px; color: #9ca3af; font-size: 12px; line-height: 1.45; }
.panel-body { padding: 14px 20px 20px; }
.wide { grid-column: 1 / -1; }
.chart { width: 100%; height: 300px; }
.mix-track {
  display: grid;
  grid-template-columns: var(--mt-share,1fr) var(--dy-share,1fr) var(--other-share,1fr);
  height: 18px;
  border-radius: 999px;
  overflow: hidden;
  background: var(--line);
}
.mix-track span { transform-origin: left; animation: lineIn .8s ease both; }
.mix-track .mt { background: linear-gradient(90deg, #fb923c, var(--orange)); }
.mix-track .dy { background: linear-gradient(90deg, #22d3ee, var(--cyan)); }
.mix-track .other { background: linear-gradient(90deg, #34d399, var(--teal)); }
.legend { display: grid; gap: 9px; margin-top: 16px; color: var(--muted); font-size: 12px; }
.legend-row, .quality-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
}
.dot { display: inline-block; width: 8px; height: 8px; border-radius: 999px; margin-right: 6px; }
.quality-list { display: grid; gap: 12px; }
.quality-row {
  padding-bottom: 10px;
  border-bottom: 1px solid #eef2f7;
  color: var(--muted);
  font-size: 12px;
}
.quality-row:last-child { border-bottom: 0; padding-bottom: 0; }
.quality-row strong { color: var(--ink); font-size: 18px; }
.mini-bars { display: grid; gap: 11px; }
.mini-row { display: grid; gap: 6px; }
.mini-row-head { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--muted); }
.bar-track { height: 8px; border-radius: 999px; background: #eef2f7; overflow: hidden; }
.bar-fill { height: 100%; width: var(--w, 0%); border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--teal)); transform-origin: left; animation: lineIn .75s ease both; }
.table-wrap { overflow: auto; max-height: 58vh; border-top: 1px solid var(--line); }
table { width: 100%; min-width: 1180px; border-collapse: separate; border-spacing: 0; font-size: 13px; }
th {
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 11px 12px;
  color: var(--muted);
  background: #f8fafc;
  border-bottom: 1px solid var(--line);
  text-align: left;
  white-space: nowrap;
  font-size: 12px;
  font-weight: 800;
}
td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
tbody tr:hover td { background: #f8fafc; }
.money { color: var(--ink); font-weight: 800; }
.warn { color: var(--amber); font-weight: 820; background: #fffbeb; }
.bad { color: var(--red); font-weight: 820; background: #fff5f5; }
.empty { padding: 60px 20px; text-align: center; color: var(--faint); }
.updated { padding: 12px 2px 0; color: var(--faint); font-size: 11px; text-align: right; }
@keyframes enter { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes lineIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
@media (max-width: 1240px) {
  .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-main { grid-template-columns: 1fr; }
}
@media (max-width: 860px) {
  .app { padding: 12px; }
  .hero { grid-template-columns: 1fr; min-height: auto; padding: 18px 16px; }
  .month-tools { justify-content: flex-start; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .chart { height: 280px; }
  .panel-head { display: block; }
}
@media (max-width: 560px) {
  .kpi-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="app">
  <section class="hero">
    <div class="hero-copy">
      <a class="back" href="index.html">返回看板</a>
      <div class="eyebrow">Store Detail</div>
      <h1 id="storeTitle">门店趋势</h1>
      <p class="subtitle" id="storeSubtitle">月度营收、渠道核销、客流效率和评价风险。</p>
    </div>
    <div class="month-tools">
      <button type="button" onclick="navMonth(-1)">上月</button>
      <span class="month-label" id="monthLabel">-</span>
      <button type="button" onclick="navMonth(1)">下月</button>
    </div>
  </section>

  <section class="section">
    <div class="kpi-grid" id="kpiGrid"></div>
  </section>

  <section class="section">
    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">营收趋势</div>
          <div class="panel-subtitle">总业绩与美团、抖音核销走势</div>
        </div>
      </div>
      <div class="panel-body"><div class="chart" id="revenueChart" style="height:340px;"></div></div>
    </div>
  </section>

  <section class="section grid-main">
    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">评分与评价</div>
          <div class="panel-subtitle">评分走势和差评柱状</div>
        </div>
      </div>
      <div class="panel-body"><div class="chart" id="qualityChart"></div></div>
    </div>

    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">访问与转化</div>
          <div class="panel-subtitle">访问量和 30s 回复率</div>
        </div>
      </div>
      <div class="panel-body"><div class="chart" id="visitChart"></div></div>
    </div>

    <div class="card">
      <div class="panel-head">
        <div>
          <div class="panel-title">经营分析</div>
          <div class="panel-subtitle">渠道、扫码与结构占比</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="mix-track" id="mixTrack"><span class="mt"></span><span class="dy"></span><span class="other"></span></div>
        <div class="legend" id="mixLegend"></div>
        <div style="margin-top:16px; border-top:1px solid #f3f4f6; padding-top:14px;">
          <div class="quality-list" id="analysisList"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="card" style="margin-top:20px;">
    <div class="panel-head">
      <div>
        <div class="panel-title">每日明细</div>
        <div class="panel-subtitle">保留所有原始指标，异常值高亮</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th><th>总业绩</th><th>美团核销</th><th>抖音核销</th><th>开卡</th><th>续充</th>
            <th>美团访问</th><th>抖音访问</th><th>美团扫码</th><th>抖音扫码</th>
            <th>30s回复</th><th>美团评分</th><th>大众评分</th><th>抖音评分</th><th>好评</th><th>差评</th>
          </tr>
        </thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
  </section>
  <div class="updated" id="updated"></div>
</main>

<script>
let allData = [];
let currentStore = "";
let currentMonth = "";
let charts = {};

const nf = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 0 });
const fmt = value => nf.format(Number(value || 0));
const money = value => "¥" + fmt(value);
const n = value => Number(value || 0);
const pct = value => value == null || Number.isNaN(Number(value)) ? "-" : (Number(value) * 100).toFixed(0) + "%";
const sumBy = (rows, getter) => rows.reduce((sum, row) => sum + n(getter(row)), 0);
const avgBy = (rows, getter) => {
  const values = rows.map(getter).map(Number).filter(v => Number.isFinite(v) && v > 0);
  return values.length ? values.reduce((a, b) => a + b, 0) / values.length : 0;
};

const chartTheme = {
  animationDuration: 850,
  animationEasing: "cubicOut",
  tooltip: {
    trigger: "axis",
    backgroundColor: "#fff",
    borderColor: "#e5e7eb",
    textStyle: { color: "#111827", fontSize: 12 },
    extraCssText: "box-shadow:0 10px 28px rgba(15,23,42,.12);border-radius:8px;padding:10px 14px;"
  },
  legend: { top: 2, right: 8, itemWidth: 10, itemHeight: 10, textStyle: { color: "#64748b", fontSize: 11 } },
  grid: { left: 14, right: 18, top: 58, bottom: 34, containLabel: true },
  xAxis: { type: "category", axisTick: { show: false }, axisLine: { lineStyle: { color: "#e5e7eb" } }, axisLabel: { color: "#94a3b8", fontSize: 10 } },
  yAxis: { type: "value", axisTick: { show: false }, axisLine: { show: false }, axisLabel: { color: "#94a3b8", fontSize: 10 }, splitLine: { lineStyle: { color: "#eef2f7", type: "dashed" } } }
};

function getParam(name) {
  return new URL(location.href).searchParams.get(name) || "";
}

async function loadData() {
  try {
    const response = await fetch("daily_data.json");
    allData = await response.json();
    initApp();
    return;
  } catch (error) {
    if (location.protocol === "file:") {
      try {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "daily_data.json", false);
        xhr.send(null);
        if (xhr.status === 0 || xhr.status === 200) {
          allData = JSON.parse(xhr.responseText);
          initApp();
          return;
        }
      } catch (_) {}
    }
  }
  document.getElementById("detailBody").innerHTML = `<tr><td colspan="16" class="empty">未能读取 daily_data.json</td></tr>`;
}

function initApp() {
  currentStore = decodeURIComponent(getParam("store"));
  currentMonth = getParam("month") || latestMonthForStore(currentStore);
  document.getElementById("storeTitle").textContent = currentStore || "未指定门店";
  render();
}

function latestMonthForStore(store) {
  const dates = allData.filter(row => row.门店名称 === store).map(row => row.日期).filter(Boolean).sort();
  return dates.length ? dates[dates.length - 1].slice(0, 7) : "";
}

function navMonth(delta) {
  if (!currentMonth) return;
  const [year, month] = currentMonth.split("-").map(Number);
  const date = new Date(year, month - 1 + delta, 1);
  currentMonth = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
  render();
}

function rowsForMonth(month) {
  return allData
    .filter(row => row.门店名称 === currentStore && String(row.日期 || "").startsWith(month))
    .sort((a, b) => String(a.日期).localeCompare(String(b.日期)));
}

function previousMonth(month) {
  const [year, mon] = month.split("-").map(Number);
  const date = new Date(year, mon - 2, 1);
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

function totals(rows) {
  return {
    revenue: sumBy(rows, row => row.微矩总业绩 || row.总营业额),
    mt: sumBy(rows, row => row.美团核销金额),
    dy: sumBy(rows, row => row.抖音核销金额),
    card: sumBy(rows, row => row.微矩开卡 || row.开卡金额),
    recharge: sumBy(rows, row => row.微矩续充 || row.续充金额),
    good: sumBy(rows, row => row.新增好评),
    bad: sumBy(rows, row => row.新增差评),
    mtVisit: sumBy(rows, row => row.美团访问量),
    dyVisit: sumBy(rows, row => row.抖音访问量),
    mtScan: sumBy(rows, row => row.美团扫码),
    dyScan: sumBy(rows, row => row.抖音扫码),
  };
}

function trend(now, prev, lowerIsGood = false) {
  if (!prev) return `<span class="delta flat">无对比</span><span>上月为空</span>`;
  const diff = now - prev;
  const cls = Math.abs(diff) < .01 ? "flat" : lowerIsGood ? (diff <= 0 ? "up" : "down") : (diff >= 0 ? "up" : "down");
  return `<span class="delta ${cls}">${diff > 0 ? "+" : ""}${fmt(diff)}</span><span>较上月</span>`;
}

function kpiCard(label, value, foot) {
  return `<article class="card kpi-card">
    <div class="label">${label}</div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-foot">${foot}</div>
  </article>`;
}

function render() {
  document.getElementById("monthLabel").textContent = currentMonth || "-";
  const data = rowsForMonth(currentMonth);
  const prevData = rowsForMonth(previousMonth(currentMonth));
  if (!currentStore || !data.length) {
    document.getElementById("kpiGrid").innerHTML = "";
    document.getElementById("detailBody").innerHTML = `<tr><td colspan="16" class="empty">该门店在 ${currentMonth || "-"} 暂无数据</td></tr>`;
    Object.values(charts).forEach(chart => chart.dispose());
    charts = {};
    return;
  }

  const t = totals(data);
  const p = totals(prevData);
  document.getElementById("storeSubtitle").textContent = `${currentMonth} | ${data.length} 天 | 总业绩 ${money(t.revenue)}`;
  document.getElementById("kpiGrid").innerHTML = [
    kpiCard("总业绩", money(t.revenue), trend(t.revenue, p.revenue)),
    kpiCard("美团核销", money(t.mt), trend(t.mt, p.mt)),
    kpiCard("抖音核销", money(t.dy), trend(t.dy, p.dy)),
    kpiCard("会员收入", `${money(t.card + t.recharge)}`, `<span>开卡 ${money(t.card)} · 续充 ${money(t.recharge)}</span>`),
  ].join("");

  renderAnalysis(data, t);
  renderCharts(data);
  renderTable(data);
  document.getElementById("updated").textContent = `${currentStore} · ${currentMonth} · ${data.length} 天`;
}

function renderAnalysis(data, t) {
  const total = Math.max(t.revenue, t.mt + t.dy, 1);
  const other = Math.max(total - t.mt - t.dy, 0);
  const mix = document.getElementById("mixTrack");
  mix.style.setProperty("--mt-share", Math.max(t.mt / total * 100, 1) + "fr");
  mix.style.setProperty("--dy-share", Math.max(t.dy / total * 100, 1) + "fr");
  mix.style.setProperty("--other-share", Math.max(other / total * 100, 1) + "fr");
  document.getElementById("mixLegend").innerHTML = [
    `<div class="legend-row"><span><i class="dot" style="background:var(--orange)"></i>美团核销</span><strong>${money(t.mt)} · ${(t.mt / total * 100).toFixed(1)}%</strong></div>`,
    `<div class="legend-row"><span><i class="dot" style="background:var(--cyan)"></i>抖音核销</span><strong>${money(t.dy)} · ${(t.dy / total * 100).toFixed(1)}%</strong></div>`,
    `<div class="legend-row"><span><i class="dot" style="background:var(--teal)"></i>其他收入</span><strong>${money(other)} · ${(other / total * 100).toFixed(1)}%</strong></div>`,
  ].join("");

  document.getElementById("analysisList").innerHTML = [
    `<div class="quality-row"><span>平均评分</span><strong>美团 ${avgBy(data, row => row.美团评分).toFixed(1)} / 抖音 ${avgBy(data, row => row.抖音评分).toFixed(1)}</strong></div>`,
    `<div class="quality-row"><span>美团扫码</span><strong>${fmt(t.mtScan)}</strong></div>`,
    `<div class="quality-row"><span>抖音扫码</span><strong>${fmt(t.dyScan)}</strong></div>`,
  ].join("");
}

function chart(id) {
  if (charts[id]) charts[id].dispose();
  const instance = echarts.init(document.getElementById(id));
  charts[id] = instance;
  return instance;
}

function renderCharts(data) {
  const days = data.map(row => String(row.日期).slice(8));
  chart("revenueChart").setOption({
    ...chartTheme,
    xAxis: { ...chartTheme.xAxis, data: days, boundaryGap: false },
    yAxis: { ...chartTheme.yAxis, axisLabel: { color: "#94a3b8", fontSize: 10, formatter: value => "¥" + fmt(value) } },
    series: [
      { name: "总业绩", type: "line", smooth: true, symbol: "circle", symbolSize: 5, data: data.map(row => row.微矩总业绩 || row.总营业额 || 0),
        lineStyle: { color: "#2563eb", width: 3 }, itemStyle: { color: "#2563eb" },
        areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{ offset: 0, color: "rgba(37,99,235,.24)" }, { offset: 1, color: "rgba(37,99,235,0)" }]) } },
      { name: "美团核销", type: "line", smooth: true, symbol: "none", data: data.map(row => row.美团核销金额 || 0), lineStyle: { color: "#f97316", width: 2, type: "dashed" } },
      { name: "抖音核销", type: "line", smooth: true, symbol: "none", data: data.map(row => row.抖音核销金额 || 0), lineStyle: { color: "#0891b2", width: 2, type: "dashed" } },
    ]
  });

  chart("qualityChart").setOption({
    ...chartTheme,
    xAxis: { ...chartTheme.xAxis, data: days, boundaryGap: false },
    yAxis: [
      { ...chartTheme.yAxis, min: 3.5, max: 5 },
      { ...chartTheme.yAxis, min: 0, axisLabel: { color: "#94a3b8", fontSize: 10 } }
    ],
    series: [
      { name: "美团评分", type: "line", smooth: true, symbolSize: 5, data: data.map(row => row.美团评分 || null), connectNulls: true, lineStyle: { color: "#f97316", width: 2 }, itemStyle: { color: "#f97316" } },
      { name: "抖音评分", type: "line", smooth: true, symbolSize: 5, data: data.map(row => row.抖音评分 || null), connectNulls: true, lineStyle: { color: "#0891b2", width: 2 }, itemStyle: { color: "#0891b2" } },
      { name: "差评", type: "bar", yAxisIndex: 1, data: data.map(row => row.新增差评 || 0), itemStyle: { color: "#dc2626", borderRadius: [4,4,0,0] } },
    ]
  });

  chart("visitChart").setOption({
    ...chartTheme,
    xAxis: { ...chartTheme.xAxis, data: days, boundaryGap: false },
    yAxis: [
      { ...chartTheme.yAxis, axisLabel: { color: "#94a3b8", fontSize: 10 } },
      { ...chartTheme.yAxis, axisLabel: { color: "#94a3b8", fontSize: 10, formatter: value => value + "%" }, splitLine: { show: false } }
    ],
    series: [
      { name: "美团访问", type: "line", smooth: true, symbol: "circle", symbolSize: 4, data: data.map(row => row.美团访问量 || 0), lineStyle: { color: "#f97316", width: 2 }, itemStyle: { color: "#f97316" } },
      { name: "抖音访问", type: "line", smooth: true, symbol: "circle", symbolSize: 4, data: data.map(row => row.抖音访问量 || 0), lineStyle: { color: "#0891b2", width: 2 }, itemStyle: { color: "#0891b2" } },
      { name: "30s回复率", type: "line", smooth: true, symbol: "none", yAxisIndex: 1, data: data.map(row => (row["30s回复率"] || 0) * 100), lineStyle: { color: "#059669", width: 2, type: "dashed" } },
    ]
  });
}

function renderTable(data) {
  document.getElementById("detailBody").innerHTML = data.map(row => {
    const revenue = n(row.微矩总业绩 || row.总营业额);
    const mt = n(row.美团核销金额);
    const dy = n(row.抖音核销金额);
    const mtVisit = n(row.美团访问量);
    const dyVisit = n(row.抖音访问量);
    const mtPerVisit = mtVisit ? mt / mtVisit * 1000 : 0;
    const dyPerVisit = dyVisit ? dy / dyVisit * 1000 : 0;
    const bad = n(row.新增差评);
    return `<tr>
      <td>${String(row.日期).slice(5)}</td>
      <td class="money">${money(revenue)}</td>
      <td>${money(mt)}</td>
      <td>${money(dy)}</td>
      <td>${money(row.微矩开卡 || row.开卡金额)}</td>
      <td>${money(row.微矩续充 || row.续充金额)}</td>
      <td>${fmt(mtVisit)}</td>
      <td>${fmt(dyVisit)}</td>
      <td class="muted">${fmt(n(row.美团扫码))}</td>
      <td class="muted">${fmt(n(row.抖音扫码))}</td>
      <td class="${row["30s回复率"] != null && row["30s回复率"] > 0 && row["30s回复率"] < .5 ? "warn" : ""}">${row["30s回复率"] == null ? "-" : pct(row["30s回复率"])}</td>
      <td>${row.美团评分 ? Number(row.美团评分).toFixed(1) : "-"}</td>
      <td>${row.大众评分 ? Number(row.大众评分).toFixed(1) : "-"}</td>
      <td>${row.抖音评分 ? Number(row.抖音评分).toFixed(1) : "-"}</td>
      <td style="color:var(--green);font-weight:760">${fmt(row.新增好评)}</td>
      <td class="${bad > 0 ? "bad" : ""}">${fmt(bad)}</td>
    </tr>`;
  }).join("");
}

window.addEventListener("resize", () => Object.values(charts).forEach(instance => instance.resize()));
loadData();
</script>
</body>
</html>
