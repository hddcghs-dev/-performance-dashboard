<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门店趋势 · 民德搓澡堂</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #eef2f6;
  --card: #fff;
  --text: #172033;
  --text2: #667085;
  --text3: #98a2b3;
  --accent: #1f6feb;
  --accent2: #14b8a6;
  --mt: #f97316;
  --dy: #0891b2;
  --green: #039855;
  --red: #d92d20;
  --border: #e4e7ec;
  --shadow: 0 1px 2px rgba(16,24,40,0.06);
  --shadow-lg: 0 18px 45px rgba(16,24,40,0.08);
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { max-width:100%; overflow-x:hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background:
    radial-gradient(circle at 12% 0%, rgba(31,111,235,0.12), transparent 28%),
    linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header { background: linear-gradient(135deg, #101828 0%, #17345e 54%, #0f766e 100%); color: #fff; padding: 24px 32px 52px; box-shadow: 0 12px 38px rgba(16,24,40,0.2); }
.header-inner { max-width:1440px; margin:0 auto; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:18px; }
.header-left { display:flex; flex-direction:column; gap:8px; }
.header a { color: rgba(255,255,255,0.8); text-decoration:none; font-size:13px; width:max-content; border:1px solid rgba(255,255,255,0.22); border-radius:8px; padding:7px 13px; transition:all 0.2s; }
.header a:hover { background:rgba(255,255,255,0.12); color:#fff; }
.eyebrow { font-size:12px; color:rgba(255,255,255,0.68); }
.header h1 { font-size:30px; font-weight:760; letter-spacing:0; }
.store-subtitle { color:rgba(255,255,255,0.72); font-size:13px; }
.month-nav { display:flex; align-items:center; gap:10px; }
.month-nav button { height:36px; background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.22); border-radius:8px; padding:0 14px; cursor:pointer; font-size:13px; font-weight:650; transition:all 0.2s; }
.month-nav button:hover { background:rgba(255,255,255,0.18); transform:translateY(-1px); }
.month-nav .month-label { font-size:16px; font-weight:600; min-width:90px; text-align:center; letter-spacing:-0.3px; }

.container { max-width:1440px; margin:0 auto; padding:0 24px 28px; }

/* KPI Cards */
.kpi-row { display:grid; grid-template-columns:repeat(6, minmax(150px, 1fr)); gap:14px; margin-top:-34px; margin-bottom:16px; min-width:0; }
.kpi-card { position:relative; min-height:112px; background:rgba(255,255,255,0.94); border:1px solid rgba(255,255,255,0.72); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; gap:5px; transition:box-shadow 0.2s; overflow:hidden; backdrop-filter:blur(12px); }
.kpi-card::after { content:""; position:absolute; inset:auto 14px 0 14px; height:3px; border-radius:999px 999px 0 0; background:var(--border); }
.kpi-card.mt::after { background:var(--mt); }
.kpi-card.dy::after { background:var(--dy); }
.kpi-card.good::after { background:var(--green); }
.kpi-card.red::after { background:var(--red); }
.kpi-card:hover { box-shadow: var(--shadow-lg); }
.kpi-label { font-size:12px; color:var(--text2); font-weight:650; }
.kpi-main { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
.kpi-value { font-size:25px; font-weight:760; letter-spacing:0; }
.kpi-value.mt { color:var(--mt); } .kpi-value.dy { color:var(--dy); }
.kpi-value.green { color:var(--green); } .kpi-value.red { color:var(--red); }
.kpi-delta { font-size:11px; font-weight:750; padding:2px 8px; border-radius:999px; display:inline-flex; align-items:center; gap:2px; }
.kpi-delta.up { background:#ecfdf5; color:#059669; }
.kpi-delta.down { background:#fef2f2; color:#dc2626; }
.summary-strip { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:16px; }
.summary-card { background:rgba(255,255,255,0.94); border:1px solid var(--border); border-radius:var(--radius); padding:15px 18px; box-shadow:var(--shadow); }
.summary-card h3 { font-size:13px; color:var(--text); margin-bottom:10px; }
.metric-line { display:flex; justify-content:space-between; gap:12px; color:var(--text2); font-size:13px; margin-top:8px; }
.metric-line strong { color:var(--text); font-size:16px; }
.mix-bar { display:grid; grid-template-columns:var(--mt-share,1fr) var(--dy-share,1fr) var(--other-share,1fr); height:12px; background:var(--border); border-radius:999px; overflow:hidden; margin:12px 0 10px; }
.mix-bar span:nth-child(1){background:var(--mt);} .mix-bar span:nth-child(2){background:var(--dy);} .mix-bar span:nth-child(3){background:var(--accent2);}
.legend { display:flex; gap:12px; flex-wrap:wrap; color:var(--text2); font-size:12px; }
.legend i { display:inline-block; width:8px; height:8px; border-radius:999px; margin-right:5px; }

/* Chart Grid */
.chart-grid { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:16px; min-width:0; }
.chart-panel { background:rgba(255,255,255,0.96); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); min-width:0; overflow:hidden; }
.chart-panel.full { grid-column:1 / -1; }
.chart-panel h3 { font-size:14px; font-weight:750; color:var(--text); margin-bottom:4px; }
.chart-subtitle { font-size:12px; color:var(--text3); margin-bottom:10px; }
.chart-box { width:100%; min-width:0; height:318px; }
.chart-box.tall { height:372px; }

/* Data Table */
.table-wrap { overflow-x:auto; margin-top:12px; border:1px solid var(--border); border-radius:var(--radius); }
.table-wrap table { width:100%; border-collapse:separate; border-spacing:0; font-size:12px; }
.table-wrap th { background:#f8fafc; padding:11px 12px; text-align:left; font-weight:750; color:var(--text2); border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; font-size:11px; }
.table-wrap td { padding:9px 12px; border-bottom:1px solid #f1f5f9; white-space:nowrap; }
.table-wrap tr:last-child td { border-bottom:0; }
.table-wrap tr:hover td { background:#f8fafc; }
.bar-cell { display:flex; align-items:center; gap:6px; }
.bar-cell .bar { height:6px; border-radius:3px; min-width:2px; transition:width 0.3s; }
.bar-cell .bar.mt { background:var(--mt); } .bar-cell .bar.dy { background:var(--dy); }
.weekend td { background:#fafafa; }

/* Empty */
.empty { text-align:center; padding:80px 20px; color:var(--text3); }
.empty p { margin-top:8px; font-size:13px; }

/* Footer */
.footer { text-align:right; padding:8px 0; font-size:11px; color:var(--text3); }

@media (max-width:768px) {
  .chart-grid { grid-template-columns:1fr; }
  .kpi-row { grid-template-columns:1fr 1fr; }
  .summary-strip { grid-template-columns:1fr; }
  .container { padding:0 14px 20px; }
  .header { padding:20px 16px 44px; }
  .header h1 { font-size:24px; }
  .chart-box { height:270px; }
  .chart-box.tall { height:300px; }
}
@media (max-width:520px) {
  .kpi-row { grid-template-columns:1fr; }
  .month-nav { width:100%; justify-content:space-between; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html">返回看板</a>
      <div class="eyebrow">STORE PERFORMANCE DETAIL</div>
      <h1 id="storeTitle">门店趋势</h1>
      <div class="store-subtitle" id="storeSubtitle">月度营收、渠道核销、评分和评价走势</div>
    </div>
    <div class="month-nav">
      <button onclick="navMonth(-1)">上月</button>
      <span class="month-label" id="monthLabel">2026-05</span>
      <button onclick="navMonth(1)">下月</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="kpi-row" id="kpiRow"></div>

  <div class="summary-strip" id="summaryStrip">
    <div class="summary-card">
      <h3>渠道结构</h3>
      <div class="mix-bar" id="mixBar"><span></span><span></span><span></span></div>
      <div class="legend" id="mixLegend"></div>
    </div>
    <div class="summary-card">
      <h3>客流效率</h3>
      <div class="metric-line"><span>美团千访核销</span><strong id="mtPerVisit">-</strong></div>
      <div class="metric-line"><span>抖音千访核销</span><strong id="dyPerVisit">-</strong></div>
    </div>
    <div class="summary-card">
      <h3>经营质量</h3>
      <div class="metric-line"><span>平均美团评分</span><strong id="avgMtScore">-</strong></div>
      <div class="metric-line"><span>平均抖音评分</span><strong id="avgDyScore">-</strong></div>
    </div>
  </div>

  <div class="chart-grid" id="charts">
    <div class="chart-panel full"><h3>营收趋势</h3><div class="chart-subtitle">总业绩与美团、抖音核销走势对比</div><div class="chart-box tall" id="cRevenue"></div></div>
    <div class="chart-panel"><h3>评分走势</h3><div class="chart-subtitle">平台评分与经营评分变化</div><div class="chart-box" id="cScore"></div></div>
    <div class="chart-panel"><h3>到店访问</h3><div class="chart-subtitle">美团和抖音访问人数趋势</div><div class="chart-box" id="cVisit"></div></div>
    <div class="chart-panel"><h3>开卡 / 续充</h3><div class="chart-subtitle">会员收入结构</div><div class="chart-box" id="cCard"></div></div>
    <div class="chart-panel"><h3>评价分布</h3><div class="chart-subtitle">新增好评与差评</div><div class="chart-box" id="cReview"></div></div>
  </div>

  <div class="chart-panel detail-panel" style="margin-top:16px;">
    <h3>每日明细</h3>
    <div class="table-wrap"><table id="detailTable"><thead><tr>
      <th>日期</th><th>总业绩</th><th>美团核销</th><th>抖音核销</th><th>开卡</th><th>续充</th><th>美团访问</th><th>抖音访问</th><th>美团评分</th><th>抖音评分</th><th>好评</th><th>差评</th>
    </tr></thead><tbody></tbody></table></div>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
// ── State ──
let allData = [], currentMonth = '', currentStore = '';
let charts = {};

// ── Helpers ──
const fmt = v => v != null ? Number(v).toLocaleString('zh-CN', {maximumFractionDigits:0}) : '-';
const fmtMoney = v => '¥' + fmt(v);
const fmtPct = (a, b) => b ? ((a - b) / b * 100).toFixed(1) : null;
const fmtPctUp = (a, b) => b === 0 ? (a > 0 ? '+∞' : '0%') : ((a - b) / b * 100).toFixed(1) + '%';

function getParam(name) { return new URL(location.href).searchParams.get(name) || ''; }

// ── ECharts init ──
function initChart(domId) {
  const dom = document.getElementById(domId);
  if (!dom) return null;
  const c = echarts.init(dom);
  charts[domId] = c;
  return c;
}

// ── Load data ──
async function loadData() {
  try { const r = await fetch('daily_data.json'); allData = await r.json(); initApp(); return; } catch(e) {}
  if (location.protocol === 'file:') {
    try { const x = new XMLHttpRequest(); x.open('GET','daily_data.json',false); x.send(null); if (x.status===0||x.status===200) { allData=JSON.parse(x.responseText); initApp(); return; } } catch(e) {}
  }
  document.getElementById('charts').innerHTML = '<div class="chart-panel full"><div class="empty"><p style="font-size:40px;margin-bottom:12px;">📭</p><p>暂无数据</p></div></div>';
}

function initApp() {
  currentStore = decodeURIComponent(getParam('store'));
  currentMonth = getParam('month') || '2026-05';
  if (!currentStore) {
    document.getElementById('storeTitle').textContent = '未指定门店';
    return;
  }
  document.getElementById('storeTitle').textContent = currentStore;
  document.getElementById('monthLabel').textContent = currentMonth;
  render();
}

function navMonth(d) {
  const [y,m] = currentMonth.split('-').map(Number);
  const dt = new Date(y, m-1+d, 1);
  currentMonth = dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
  document.getElementById('monthLabel').textContent = currentMonth;
  render();
}

// ── Data helpers ──
function storeMonthData(store, month) {
  return allData.filter(r => r.门店名称 === store && String(r.日期).startsWith(month)).sort((a,b) => String(a.日期).localeCompare(String(b.日期)));
}

function prevMonth(month) {
  const [y,m] = month.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function renderSummaryStrip(ctx) {
  const { totalRev, totalMt, totalDy, totalMtVisit, totalDyVisit, data, avg } = ctx;
  const total = Math.max(totalRev, totalMt + totalDy, 1);
  const other = Math.max(total - totalMt - totalDy, 0);
  document.getElementById('mixBar').style.setProperty('--mt-share', Math.max(totalMt / total * 100, 1) + 'fr');
  document.getElementById('mixBar').style.setProperty('--dy-share', Math.max(totalDy / total * 100, 1) + 'fr');
  document.getElementById('mixBar').style.setProperty('--other-share', Math.max(other / total * 100, 1) + 'fr');
  document.getElementById('mixLegend').innerHTML = [
    `<span><i style="background:var(--mt)"></i>美团 ${((totalMt / total) * 100).toFixed(1)}%</span>`,
    `<span><i style="background:var(--dy)"></i>抖音 ${((totalDy / total) * 100).toFixed(1)}%</span>`,
    `<span><i style="background:var(--accent2)"></i>其他 ${((other / total) * 100).toFixed(1)}%</span>`
  ].join('');
  document.getElementById('mtPerVisit').textContent = totalMtVisit ? fmtMoney(totalMt / totalMtVisit * 1000) : '-';
  document.getElementById('dyPerVisit').textContent = totalDyVisit ? fmtMoney(totalDy / totalDyVisit * 1000) : '-';
  const mtScore = avg(data, '美团评分');
  const dyScore = avg(data, '抖音评分');
  document.getElementById('avgMtScore').textContent = mtScore ? mtScore.toFixed(1) : '-';
  document.getElementById('avgDyScore').textContent = dyScore ? dyScore.toFixed(1) : '-';
}

// ── ECharts theme ──
const theme = {
  tooltip: { backgroundColor:'#fff', borderColor:'#e4e7ec', textStyle:{color:'#172033',fontSize:12}, extraCssText:'box-shadow:0 10px 28px rgba(16,24,40,0.12);border-radius:8px;padding:10px 14px;' },
  legend: { top:4, right:8, itemWidth:10, itemHeight:10, textStyle:{fontSize:11,color:'#667085'} },
  grid: { left:10, right:16, top:58, bottom:38, containLabel:true },
  xAxis: { axisLine:{lineStyle:{color:'#e4e7ec'}}, axisTick:{show:false}, axisLabel:{color:'#98a2b3',fontSize:10,margin:12}, splitLine:{show:false} },
  yAxis: { axisLine:{show:false}, axisTick:{show:false}, axisLabel:{color:'#98a2b3',fontSize:10,margin:10}, splitLine:{lineStyle:{color:'#eef2f6',type:'dashed'}} }
};

// ── Main render ──
function render() {
  const data = storeMonthData(currentStore, currentMonth);
  const prev = storeMonthData(currentStore, prevMonth(currentMonth));
  const days = data.map(r => String(r.日期).slice(8));
  const fullDates = data.map(r => String(r.日期));

  if (!data.length) {
    document.getElementById('charts').innerHTML = '<div class="chart-panel full"><div class="empty"><p style="font-size:40px;margin-bottom:12px;">📅</p><p>该月份暂无数据</p></div></div>';
    document.getElementById('kpiRow').innerHTML = '';
    return;
  }

  // ── Aggregates ──
  const sum = (arr, key) => arr.reduce((s,r) => s + (r[key] || 0), 0);
  const sumValue = (arr, getter) => arr.reduce((s,r) => s + (getter(r) || 0), 0);
  const avg = (arr, key) => { const v = arr.filter(r => r[key] != null).map(r => r[key]); return v.length ? v.reduce((a,b)=>a+b,0)/v.length : 0; };

  const totalRev = sumValue(data, r => r.微矩总业绩 || r.总营业额 || 0);
  const totalMt = sum(data, '美团核销金额');
  const totalDy = sum(data, '抖音核销金额');
  const totalCard = sumValue(data, r => r.微矩开卡 || r.开卡金额 || 0);
  const totalRecharge = sumValue(data, r => r.微矩续充 || r.续充金额 || 0);
  const totalGood = sum(data, '新增好评');
  const totalBad = sum(data, '新增差评');
  const totalMtVisit = sum(data, '美团访问量');
  const totalDyVisit = sum(data, '抖音访问量');

  const prevRev = sumValue(prev, r => r.微矩总业绩 || r.总营业额 || 0);
  const prevMt = sum(prev, '美团核销金额');
  const prevDy = sum(prev, '抖音核销金额');
  const prevCard = sumValue(prev, r => r.微矩开卡 || r.开卡金额 || 0);
  const prevRecharge = sumValue(prev, r => r.微矩续充 || r.续充金额 || 0);
  const prevGood = sum(prev, '新增好评');
  const prevBad = sum(prev, '新增差评');
  const prevMtVisit = sum(prev, '美团访问量');
  const prevDyVisit = sum(prev, '抖音访问量');
  document.getElementById('storeSubtitle').textContent = `${currentMonth} | ${data.length} 天 | 总业绩 ${fmtMoney(totalRev)}`;
  renderSummaryStrip({ totalRev, totalMt, totalDy, totalMtVisit, totalDyVisit, data, avg });

  // ── KPI cards ──
  const kpiItems = [
    { label:'总业绩', value:fmtMoney(totalRev), delta:fmtPctUp(totalRev, prevRev), up:totalRev>=prevRev, cls:'' },
    { label:'美团核销', value:fmtMoney(totalMt), delta:fmtPctUp(totalMt, prevMt), up:totalMt>=prevMt, cls:'mt' },
    { label:'抖音核销', value:fmtMoney(totalDy), delta:fmtPctUp(totalDy, prevDy), up:totalDy>=prevDy, cls:'dy' },
    { label:'开卡', value:fmtMoney(totalCard), delta:fmtPctUp(totalCard, prevCard), up:totalCard>=prevCard, cls:'' },
    { label:'续充', value:fmtMoney(totalRecharge), delta:fmtPctUp(totalRecharge, prevRecharge), up:totalRecharge>=prevRecharge, cls:'' },
    { label:'好评/差评', value:totalGood+' / '+totalBad, delta:(totalGood-prevGood>=0?'+':'')+(totalGood-prevGood)+' 好评', up:totalGood>=prevGood, cls:totalBad>0?'red':'green' },
  ];
  document.getElementById('kpiRow').innerHTML = kpiItems.map(k => `
    <div class="kpi-card ${k.cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-main">
        <span class="kpi-value ${k.cls}">${k.value}</span>
        ${k.delta ? `<span class="kpi-delta ${k.up?'up':'down'}">${k.up?'▲':'▼'} ${k.delta}</span>` : ''}
      </div>
    </div>`).join('');

  // ── Destroy old charts ──
  Object.entries(charts).forEach(([id, c]) => { c.dispose(); delete charts[id]; });

  // ── 1. Revenue trend (full width, area) ──
  const c1 = initChart('cRevenue');
  if (c1) c1.setOption({
    ...theme,
    tooltip: { ...theme.tooltip, trigger:'axis', axisPointer:{type:'cross'} },
    legend: theme.legend,
    xAxis: { ...theme.xAxis, data:days, boundaryGap:false },
    yAxis: { ...theme.yAxis, axisLabel:{...theme.yAxis.axisLabel, formatter:v=>'¥'+fmt(v)} },
    series: [
      { name:'总业绩', type:'line', data:data.map(r=>r.微矩总业绩||r.总营业额||0), smooth:true, symbol:'circle', symbolSize:4,
        lineStyle:{color:'#6366f1',width:2.5}, itemStyle:{color:'#6366f1'},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(99,102,241,0.25)'},{offset:1,color:'rgba(99,102,241,0.02)'}])},
        markLine:{silent:true, symbol:'none', lineStyle:{color:'#cbd5e1',type:'dashed'}, data:[{yAxis:totalRev/data.length}]}
      },
      { name:'美团核销', type:'line', data:data.map(r=>r.美团核销金额||0), smooth:true, symbol:'none',
        lineStyle:{color:'#f97316',width:1.5,type:'dashed'}, itemStyle:{color:'#f97316'} },
      { name:'抖音核销', type:'line', data:data.map(r=>r.抖音核销金额||0), smooth:true, symbol:'none',
        lineStyle:{color:'#06b6d4',width:1.5,type:'dashed'}, itemStyle:{color:'#06b6d4'} },
    ]
  });

  // ── 2. Score ──
  const c3 = initChart('cScore');
  const scoreSeries = [];
  if (data.some(r=>r.美团评分)) scoreSeries.push({ name:'美团评分', type:'line', data:data.map(r=>r.美团评分||null), smooth:true, symbol:'circle', symbolSize:5,
    lineStyle:{color:'#f97316',width:2}, itemStyle:{color:'#f97316'}, connectNulls:true,
    markLine:{silent:true, symbol:'none', lineStyle:{color:'#fdba74',type:'dashed'}, data:[{yAxis:avg(data,'美团评分')}]}
  });
  if (data.some(r=>r.抖音评分)) scoreSeries.push({ name:'抖音评分', type:'line', data:data.map(r=>r.抖音评分||null), smooth:true, symbol:'circle', symbolSize:5,
    lineStyle:{color:'#06b6d4',width:2}, itemStyle:{color:'#06b6d4'}, connectNulls:true,
    markLine:{silent:true, symbol:'none', lineStyle:{color:'#67e8f9',type:'dashed'}, data:[{yAxis:avg(data,'抖音评分')}]}
  });
  if (data.some(r=>r.经营评分)) scoreSeries.push({ name:'经营评分', type:'line', data:data.map(r=>r.经营评分||null), smooth:true, symbol:'diamond', symbolSize:4,
    lineStyle:{color:'#10b981',width:1.5}, itemStyle:{color:'#10b981'}, connectNulls:true });
  if (c3) c3.setOption({
    ...theme,
    legend: theme.legend,
    xAxis: { ...theme.xAxis, data:days, boundaryGap:false },
    yAxis: { ...theme.yAxis, min: data.some(r=>r.经营评分) ? 'dataMin' : 3.5, max:5 },
    series: scoreSeries
  });

  // ── 4. Visits ──
  const c4 = initChart('cVisit');
  if (c4) c4.setOption({
    ...theme,
    legend: theme.legend,
    xAxis: { ...theme.xAxis, data:days, boundaryGap:false },
    series: [
      { name:'美团访问', type:'line', data:data.map(r=>r.美团访问量||0), smooth:true, symbol:'circle', symbolSize:4,
        lineStyle:{color:'#f97316',width:2}, itemStyle:{color:'#f97316'},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(249,115,22,0.18)'},{offset:1,color:'rgba(249,115,22,0)'}])}
      },
      { name:'抖音访问', type:'line', data:data.map(r=>r.抖音访问量||0), smooth:true, symbol:'circle', symbolSize:4,
        lineStyle:{color:'#06b6d4',width:2}, itemStyle:{color:'#06b6d4'},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(6,182,212,0.18)'},{offset:1,color:'rgba(6,182,212,0)'}])}
      }
    ]
  });

  // ── 5. Card / Recharge ──
  const c5 = initChart('cCard');
  if (c5) c5.setOption({
    ...theme,
    legend: theme.legend,
    xAxis: { ...theme.xAxis, data:days },
    yAxis: { ...theme.yAxis, axisLabel:{...theme.yAxis.axisLabel, formatter:v=>'¥'+fmt(v)} },
    series: [
      { name:'开卡', type:'bar', stack:'card', data:data.map(r=>r.微矩开卡||r.开卡金额||0),
        itemStyle:{color:'#6366f1', borderRadius:[4,4,0,0]} },
      { name:'续充', type:'bar', stack:'card', data:data.map(r=>r.微矩续充||r.续充金额||0),
        itemStyle:{color:'#a5b4fc', borderRadius:[0,0,0,0]} }
    ]
  });

  // ── 6. Reviews ──
  const c6 = initChart('cReview');
  if (c6) c6.setOption({
    ...theme,
    legend: theme.legend,
    xAxis: { ...theme.xAxis, data:days },
    series: [
      { name:'好评', type:'bar', data:data.map(r=>r.新增好评||0),
        itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#34d399'},{offset:1,color:'#10b981'}]), borderRadius:[4,4,0,0]} },
      { name:'差评', type:'bar', data:data.map(r=>r.新增差评||0),
        itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#fca5a5'},{offset:1,color:'#ef4444'}]), borderRadius:[4,4,0,0]} }
    ]
  });

  // ── Detail table ──
  const maxRev = Math.max(...data.map(r=>r.微矩总业绩||r.总营业额||0), 1);
  const maxVisit = Math.max(...data.map(r=>Math.max(r.美团访问量||0, r.抖音访问量||0)), 1);
  document.querySelector('#detailTable tbody').innerHTML = data.map((r,i) => {
    const rev = r.微矩总业绩 || r.总营业额 || 0;
    const mt = r.美团核销金额 || 0;
    const dt = r.抖音核销金额 || 0;
    const card = r.微矩开卡 || r.开卡金额 || 0;
    const recharge = r.微矩续充 || r.续充金额 || 0;
    const mtV = r.美团访问量 || 0;
    const dyV = r.抖音访问量 || 0;
    const isWeekend = [0,6].includes(new Date(fullDates[i]).getDay());
    return `<tr${isWeekend?' class="weekend"':''}>
      <td style="font-weight:500;">${days[i]}</td>
      <td style="font-weight:600;">${fmtMoney(rev)}</td>
      <td><div class="bar-cell"><span>${fmtMoney(mt)}</span><div class="bar mt" style="width:${(mt/maxRev*80)|0}px"></div></div></td>
      <td><div class="bar-cell"><span>${fmtMoney(dt)}</span><div class="bar dy" style="width:${(dt/maxRev*80)|0}px"></div></div></td>
      <td>${fmtMoney(card)}</td>
      <td>${fmtMoney(recharge)}</td>
      <td>${fmt(mtV)}</td>
      <td>${fmt(dyV)}</td>
      <td>${r.美团评分?r.美团评分.toFixed(1):'-'}</td>
      <td>${r.抖音评分?r.抖音评分.toFixed(1):'-'}</td>
      <td style="color:#059669;">${r.新增好评||0}</td>
      <td style="color:${r.新增差评>0?'#dc2626':'#94a3b8'};">${r.新增差评||0}</td>
    </tr>`;
  }).join('');

  document.getElementById('footer').textContent = `${currentMonth} · ${data.length}天 · 数据更新: ${data[data.length-1].日期}`;
}

window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
loadData();
</script>
</body>
</html>
