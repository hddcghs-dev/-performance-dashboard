<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民德搓澡堂 · 经营数据看板</title>
<script src="assets/echarts.min.js"></script>
<style>
/* ============================================================
   曜石翡翠 · Obsidian Jade — 高端经营指挥舱视觉系统
   暗色为主视觉，亮色同样精致；红涨绿跌遵循业务约定（不可反转）
   ============================================================ */
:root {
  color-scheme: dark;
  /* —— 曜石翡翠色彩令牌（暗色默认） —— */
  --ink: #ecf5ef;
  --muted: #8fa79a;
  --faint: #5f7267;
  --line: rgba(236,245,239,.09);
  --line-strong: rgba(236,245,239,.20);
  --paper: rgba(14,22,17,.58);
  --paper-strong: rgba(17,27,21,.88);
  --surface: rgba(255,255,255,.035);
  --surface-2: rgba(255,255,255,.06);
  --jade: #3ddc9f;
  --cyan: #4adccc;
  --gold: #d8b47e;
  --up: #f4716f;
  --up-bg: rgba(244,113,111,.12);
  --down: #45d194;
  --down-bg: rgba(69,209,148,.12);
  --mint: rgba(61,220,159,.13);
  --grid: rgba(170,205,184,.05);
  --glow: rgba(61,220,159,.30);
  --ring: rgba(61,220,159,.42);
  --halo: rgba(61,220,159,.20);
  --halo-glow: rgba(61,220,159,.09);
  --shadow: 0 26px 70px rgba(0,0,0,.46);
  --on-accent: #05231a;
  --radius-card: 20px;
  --radius-control: 12px;
  --hero-gradient:
    radial-gradient(54rem 32rem at 10% -12%, rgba(61,220,159,.14), transparent 62%),
    radial-gradient(48rem 30rem at 90% -14%, rgba(74,220,204,.11), transparent 64%),
    radial-gradient(44rem 28rem at 55% 120%, rgba(216,180,126,.09), transparent 66%),
    linear-gradient(180deg, #070c09 0%, #050908 100%);
  /* —— 旧变量别名：仅作兼容映射，视觉已收敛到曜石翡翠 —— */
  --bg: #070c09;
  --card: var(--paper);
  --card2: var(--surface-2);
  --border: var(--line);
  --text: var(--ink);
  --text2: var(--muted);
  --gold2: #e6c996;
  --blue: var(--jade);
  --green: var(--down);   /* “好/正向”语义 → 下降绿 */
  --red: var(--up);       /* “坏/警示”语义 → 上升红 */
  --purple: var(--jade);
  --orange: #e0a458;      /* 中度警示，香槟金系 */
}
body[data-theme="light"] {
  color-scheme: light;
  --ink: #15231b;
  --muted: #687a6f;
  --faint: #94a39a;
  --line: rgba(21,35,27,.10);
  --line-strong: rgba(21,35,27,.20);
  --paper: rgba(255,255,255,.74);
  --paper-strong: rgba(255,255,255,.94);
  --surface: rgba(255,255,255,.82);
  --surface-2: rgba(21,35,27,.05);
  --jade: #0e8a5f;
  --cyan: #0f9a8a;
  --gold: #a97f45;
  --up: #d0443e;
  --up-bg: rgba(208,68,62,.10);
  --down: #1e8e5a;
  --down-bg: rgba(30,142,90,.10);
  --mint: rgba(14,138,95,.10);
  --grid: rgba(20,62,43,.05);
  --glow: rgba(14,138,95,.22);
  --ring: rgba(14,138,95,.38);
  --halo: rgba(14,138,95,.16);
  --halo-glow: rgba(14,138,95,.07);
  --shadow: 0 20px 54px rgba(34,62,46,.13);
  --on-accent: #ffffff;
  --bg: #f6f8f4;
  --gold2: #c39a5f;
  --orange: #b97f3a;
  --hero-gradient:
    radial-gradient(54rem 32rem at 10% -12%, rgba(14,138,95,.10), transparent 62%),
    radial-gradient(48rem 30rem at 90% -14%, rgba(15,154,138,.09), transparent 64%),
    radial-gradient(44rem 28rem at 55% 120%, rgba(169,127,69,.08), transparent 66%),
    linear-gradient(180deg, #f6f8f4 0%, #eef2ec 100%);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "Avenir Next", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  font-weight: 400;
  background: var(--hero-gradient);
  background-attachment: fixed;
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  font-variant-numeric: tabular-nums;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background .3s ease, color .3s ease;
}
button, input, select, textarea { font-family: inherit; }
::selection { background: rgba(61,220,159,.30); color: var(--ink); }
:focus-visible { outline: 2px solid var(--jade); outline-offset: 2px; border-radius: 8px; }

/* 滚动条：10px 半透明圆角滑块 */
* { scrollbar-width: thin; scrollbar-color: rgba(143,167,154,.4) transparent; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(143,167,154,.30); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: rgba(143,167,154,.48); border: 2px solid transparent; background-clip: content-box; }

/* 氛围层：44px 细网格，自顶部径向淡出 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse 92% 64% at 50% 0%, black 26%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 92% 64% at 50% 0%, black 26%, transparent 100%);
}
/* 氛围层：三团极光斑（左上翡翠 / 右上青 / 底部金），drift 26–38s 交替 */
.ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.ambient .blob { position: absolute; border-radius: 999px; filter: blur(90px); opacity: .55; will-change: transform; }
body[data-theme="light"] .ambient .blob { opacity: .38; }
.blob-a { width: 46rem; height: 46rem; left: -14rem; top: -18rem; background: radial-gradient(circle, rgba(61,220,159,.32), transparent 65%); animation: drift 26s ease-in-out infinite alternate; }
.blob-b { width: 40rem; height: 40rem; right: -12rem; top: -10rem; background: radial-gradient(circle, rgba(74,220,204,.26), transparent 65%); animation: drift 32s ease-in-out infinite alternate-reverse; }
.blob-c { width: 38rem; height: 38rem; left: 34%; bottom: -24rem; background: radial-gradient(circle, rgba(216,180,126,.22), transparent 65%); animation: drift 38s ease-in-out infinite alternate; }
@keyframes drift { from { transform: translate3d(0,0,0) scale(1); } to { transform: translate3d(4rem,2.6rem,0) scale(1.12); } }

/* ===== 顶部栏（sticky 毛玻璃） ===== */
.header {
  background: var(--paper-strong);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid var(--line);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 15px; font-weight: 700; color: var(--ink); white-space: nowrap; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 11px;
  display: grid; place-items: center;
  color: var(--on-accent); font-weight: 700; font-size: 15px;
  background: linear-gradient(135deg, var(--jade), var(--cyan));
  box-shadow: 0 8px 22px var(--glow), inset 0 1px 0 rgba(255,255,255,.30);
}
.brand-copy { display: flex; flex-direction: column; gap: 1px; }
.brand-copy small { color: var(--faint); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }

.tabs { display: flex; gap: 4px; align-items: center; }
.tab {
  position: relative;
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  transition: color .2s ease, background .2s ease, border-color .2s ease;
}
.tab:hover { color: var(--ink); background: var(--surface-2); }
.tab.active { color: var(--jade); background: var(--mint); border-color: var(--ring); }

.global-search { position: relative; margin-left: auto; width: min(300px, 24vw); }
.global-search input {
  width: 100%; height: 42px; padding: 0 40px 0 36px;
  border: 1px solid var(--line); border-radius: var(--radius-control);
  background: var(--paper-strong); color: var(--ink);
  outline: none; font-size: 12px;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  transition: border-color .2s ease, box-shadow .2s ease;
}
.global-search input:focus { border-color: var(--ring); box-shadow: 0 0 0 3px var(--mint); }
.global-search input::placeholder { color: var(--faint); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.search-shortcut { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); padding: 2px 6px; border: 1px solid var(--line); border-radius: 6px; color: var(--faint); font-size: 9px; pointer-events: none; background: var(--surface); }
.search-results {
  display: none; position: absolute; top: 48px; left: 0; right: 0; padding: 6px;
  border: 1px solid var(--line-strong); border-radius: 14px;
  background: var(--paper-strong);
  backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
  box-shadow: var(--shadow); z-index: 1200; max-height: 340px; overflow: auto;
}
.search-results.open { display: block; }
.search-result { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 9px 10px; border: 0; border-radius: 8px; background: transparent; color: var(--ink); text-align: left; font-size: 12px; }
.search-result:hover, .search-result.active { background: var(--mint); }
.search-result small { color: var(--muted); font-size: 10px; }
.search-empty { padding: 18px 10px; text-align: center; color: var(--muted); font-size: 12px; }

/* 主题切换按钮 */
.theme-toggle {
  height: 42px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 0 14px; border-radius: var(--radius-control); cursor: pointer;
  border: 1px solid var(--line); background: var(--paper-strong);
  color: var(--ink); font-size: 13px; font-weight: 600; white-space: nowrap;
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
}
.theme-toggle:hover { border-color: var(--jade); transform: translateY(-1px); box-shadow: 0 8px 22px var(--glow); }
.theme-dot { width: 8px; height: 8px; border-radius: 999px; background: var(--jade); box-shadow: 0 0 12px var(--jade); }

/* 数据新鲜度胶囊 */
.freshness {
  font-size: 10px; color: var(--jade); white-space: nowrap;
  padding: 5px 10px; border-radius: 999px;
  background: var(--mint); border: 1px solid var(--ring);
}

/* ===== 筛选条 ===== */
.filter-bar {
  position: relative; z-index: 2;
  background: var(--paper);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border-bottom: 1px solid var(--line);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; }

/* 控件基座：玻璃底 + 圆角 12px */
select, button {
  border: 1px solid var(--line);
  border-radius: var(--radius-control);
  background: var(--paper-strong);
  color: var(--ink);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 12px;
  cursor: pointer;
  transition: border-color .2s ease, background .2s ease, color .2s ease, transform .2s ease, box-shadow .2s ease;
}
button:hover, select:hover { border-color: var(--line-strong); }
select {
  appearance: none; -webkit-appearance: none;
  padding-right: 26px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238fa79a' stroke-width='1.6' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat; background-position: right 10px center;
}
select option { color: #ecf5ef; background: #101a14; }
body[data-theme="light"] select option { color: #15231b; background: #ffffff; }
/* 筛选条内控件统一 42px 高（select 右侧保留箭头空间） */
.filter-bar select, .filter-bar > button, .filter-bar .dropdown-btn { height: 42px; padding: 0 14px; font-size: 13px; }
.filter-bar select { padding-right: 30px; }

/* 周期预设分段控件 */
.presets { display: flex; gap: 3px; padding: 3px; height: 42px; border-radius: 14px; background: var(--surface); border: 1px solid var(--line); }
.preset-btn { height: 100%; padding: 0 14px; border: 0; border-radius: 10px; background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; }
.preset-btn:hover { color: var(--ink); background: var(--surface-2); }
.preset-btn.active {
  background: linear-gradient(135deg, var(--jade), var(--cyan));
  color: var(--on-accent);
  box-shadow: 0 6px 18px var(--glow);
}
.preset-btn .badge { font-size: 9px; color: inherit; opacity: .7; margin-left: 3px; }

/* 多选下拉 */
.dropdown { position: relative; display: inline-block; }
.dropdown-btn {
  border: 1px solid var(--line);
  color: var(--ink);
  border-radius: var(--radius-control);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  min-width: 170px;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  background: var(--paper-strong);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  padding: 0 14px;
  transition: border-color .2s ease;
}
.dropdown-btn:hover { border-color: var(--jade); }
.dropdown-content {
  display: none;
  position: absolute;
  top: calc(100% + 6px);
  background: var(--paper-strong);
  backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
  border: 1px solid var(--line-strong);
  border-radius: 14px;
  min-width: 230px;
  max-height: 320px;
  overflow-y: auto;
  z-index: 1000;
  box-shadow: var(--shadow);
}
.dropdown.open .dropdown-content { display: block; }
.dropdown-item { padding: 8px 14px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 8px; color: var(--ink); }
.dropdown-item:hover { background: var(--mint); }
.dropdown-item input[type=checkbox] { accent-color: var(--jade); }
.dropdown-footer { padding: 8px 14px; border-top: 1px solid var(--line); display: flex; gap: 8px; }
.dropdown-footer button { font-size: 11px; padding: 4px 8px; flex: 1; height: auto; }

/* 主操作按钮：翡翠→青渐变 + 辉光 */
.export-btn {
  height: 34px; padding: 0 16px; border-radius: var(--radius-control); cursor: pointer;
  border: 1px solid transparent; font-size: 12px; font-weight: 600;
  background: linear-gradient(135deg, var(--jade), var(--cyan));
  color: var(--on-accent);
  box-shadow: 0 10px 26px var(--glow), inset 0 1px 0 rgba(255,255,255,.30);
  transition: transform .2s ease, box-shadow .2s ease;
  margin-left: auto;
}
.export-btn:hover { transform: translateY(-2px); border-color: transparent; box-shadow: 0 14px 34px var(--glow), inset 0 1px 0 rgba(255,255,255,.30); }
.filter-bar .export-btn { height: 42px; }

/* ===== 主区域 ===== */
.main { position: relative; z-index: 1; padding: 24px 28px 48px; max-width: 1600px; margin: 0 auto; }

/* ===== 玻璃卡片通用基底（整圈翡翠发光描边） ===== */
.kpi-card, .chart-card, .table-card, .insight-card, .compare-summary, .store-selector {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow), 0 0 0 1px var(--halo), 0 0 26px var(--halo-glow);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  overflow: hidden;
  animation: rise .6s cubic-bezier(.22,.9,.3,1) backwards;
  transition: transform .24s cubic-bezier(.22,.9,.3,1), box-shadow .24s ease, border-color .24s ease;
}
.kpi-card > *, .chart-card > *, .table-card > *, .insight-card > * { position: relative; }

/* ===== KPI 指标卡 ===== */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 14px; margin-bottom: 22px; }
.kpi-card { min-height: 140px; padding: 18px 18px 16px; }
.kpi-card:hover {
  transform: translateY(-6px) scale(1.025);
  border-color: var(--ring);
  box-shadow: 0 30px 80px rgba(0,0,0,.50), 0 0 0 1px var(--ring), 0 0 46px rgba(61,220,159,.22);
  z-index: 3;
}
body[data-theme="light"] .kpi-card:hover { box-shadow: 0 24px 60px rgba(34,62,46,.20), 0 0 0 1px var(--ring), 0 0 34px rgba(14,138,95,.16); }
.kpi-card.no-data { opacity: .4; }
/* 同组卡片 .04s 步进错峰入场（backwards 填充，动画结束即释放 transform） */
.kpi-card:nth-child(1) { animation-delay: .04s; }
.kpi-card:nth-child(2) { animation-delay: .08s; }
.kpi-card:nth-child(3) { animation-delay: .12s; }
.kpi-card:nth-child(4) { animation-delay: .16s; }
.kpi-card:nth-child(5) { animation-delay: .20s; }
.kpi-card:nth-child(6) { animation-delay: .24s; }
.kpi-card:nth-child(7) { animation-delay: .28s; }
.kpi-card:nth-child(8) { animation-delay: .32s; }
.kpi-card:nth-child(9) { animation-delay: .36s; }
.kpi-card:nth-child(10) { animation-delay: .40s; }
.kpi-card:nth-child(11) { animation-delay: .44s; }
.kpi-card:nth-child(12) { animation-delay: .48s; }
.kpi-card:nth-child(13) { animation-delay: .52s; }
.kpi-card:nth-child(14) { animation-delay: .56s; }
.kpi-label {
  display: flex; align-items: center; gap: 8px;
  color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .14em;
  margin-bottom: 6px;
}
.kpi-label::before {
  content: ""; width: 5px; height: 5px; border-radius: 2px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--jade), var(--cyan));
  box-shadow: 0 0 10px var(--glow);
}
.kpi-value {
  margin-top: 8px;
  font-size: clamp(24px, 2.2vw, 32px);
  line-height: 1.08; font-weight: 600; letter-spacing: -.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.kpi-value.gold { color: var(--gold); }
.kpi-value.green { color: var(--down); }
.kpi-value.red { color: var(--up); }
.kpi-value.small { font-size: 15px; font-weight: 600; }
/* 涨跌胶囊徽章：1px×8px 内边距、999px 圆角、同色 12% 底 + 同色文字 */
.kpi-change {
  display: inline-block;
  margin-top: 8px;
  padding: 1px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.kpi-change.up { color: var(--up); background: var(--up-bg); }     /* 红涨 */
.kpi-change.down { color: var(--down); background: var(--down-bg); } /* 绿跌 */
.kpi-change .arrow { font-size: 10px; margin-right: 2px; }
.kpi-change-label { margin-left: 4px; font-size: 9px; color: var(--text2); font-weight: 500; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

/* KPI 分区 */
.kpi-section { margin-bottom: 14px; }
.kpi-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-card) var(--radius-card) 0 0;
  font-size: 11px; font-weight: 700; letter-spacing: .14em; color: var(--muted);
  user-select: none;
}
.kpi-section-body {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px; padding: 12px;
  border: 1px solid var(--line); border-top: none;
  border-radius: 0 0 var(--radius-card) var(--radius-card);
  background: var(--surface);
}

/* ===== 图表卡片（大型卡片不缩放，仅边框与阴影变化） ===== */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.chart-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.chart-card { animation-delay: .06s; }
.chart-card:hover, .table-card:hover, .insight-card:hover, .compare-summary:hover {
  border-color: var(--line-strong);
  box-shadow: var(--shadow), 0 0 0 1px var(--line-strong);
}
.chart-card-title {
  font-size: 15px;

/* 标签页 */

/* 动画 */
@keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.dropdown.open .dropdown-content, .search-results.open { animation: menuIn .16s ease-out both; transform-origin: top; }

/* 动效降级：全局动画 .01ms，氛围层静止 */

function shiftMonthKey(month, offset) {
  const [year, monthNumber] = month.split('-').map(Number);
  const value = new Date(year, monthNumber - 1 + offset, 1);
  return `${value.getFullYear()}-${String(value.getMonth() + 1).padStart(2, '0')}`;
}

function dailyMonthRows(data, month) {
  return (data.daily?.data || []).filter(record => String(record['日期'] || '').startsWith(month));
}

function aggregateDailyMonthMetric(rows, metric) {
  const ratioParts = RATIO_METRICS[metric];
  if (ratioParts) {
    const numerator = aggregateDailyMonthMetric(rows, ratioParts[0]);
    const denominator = aggregateDailyMonthMetric(rows, ratioParts[1]);
    return denominator ? numerator / denominator : 0;
  }
  if (metric === '大钟占比（298+358）') {
    const numerator = rows.reduce((sum, row) => sum + safeNum(row['298项目数']) + safeNum(row['358项目数']), 0);
    const denominator = rows.reduce((sum, row) => sum + safeNum(row['项目数']), 0);
    return denominator ? numerator / denominator : 0;
  }
  if (metric === '差评率') {
    const numerator = rows.reduce((sum, row) => sum + safeNum(row['总差评数']), 0);
    const denominator = rows.reduce((sum, row) => sum + safeNum(row['总评论数']), 0);
    return denominator ? numerator / denominator : 0;
  }
  if (metric === '新客占比') {
    const numerator = rows.reduce((sum, row) => sum + safeNum(row['核销新客数']), 0);
    const denominator = numerator + rows.reduce((sum, row) => sum + safeNum(row['核销老客数']), 0);
    return denominator ? numerator / denominator : 0;
  }
  if (AVG_METRICS.has(metric) || ['抖音评价回复率'].includes(metric)) {
    const valid = rows.map(row => safeNum(row[metricField(metric)])).filter(value => value > 0);
    return valid.length ? valid.reduce((sum, value) => sum + value, 0) / valid.length : 0;
  }
  const field = metricField(metric);
  return rows.reduce((sum, row) => sum + safeNum(row[field]), 0);
}

function prepareMonthlyViewData(data) {
  const monthly = data.monthly;
  const dailyDates = data.daily?.dates || [];
  const latestDailyDate = [...dailyDates].sort().at(-1) || '';
  const latestMonth = latestDailyDate.substring(0, 7);
  if (!latestMonth) return monthly;

  const monthDate = `${latestMonth}-01`;
  const rows = dailyMonthRows(data, latestMonth);
  const storeNames = data.stores || [...new Set(rows.map(row => row['门店']))];
  const partialRows = storeNames.map(store => {
    const storeRows = rows.filter(row => row['门店'] === store);
    const record = { 日期: monthDate, 门店: store };
    monthly.metrics.forEach(metric => {
      record[metric] = aggregateDailyMonthMetric(storeRows, metric);
    });
    record['美团刷单金额'] = storeRows.reduce((sum, row) => sum + safeNum(row['美团刷单金额']), 0);
    return record;
  });

  return {
    ...monthly,
    dates: [...new Set([...monthly.dates.filter(date => date !== monthDate), monthDate])].sort(),
    data: [...monthly.data.filter(row => row['日期'] !== monthDate), ...partialRows],
  };
}

function grainForPeriod(period, fallback = DATA_GRAIN) {
  if (period === 'day' || period === 'week') return 'daily';
  if (period === 'month' || period === 'quarter' || period === 'year') return 'monthly';
  return fallback;
}

function switchGrainForPeriod(period, state) {
  const nextGrain = grainForPeriod(period);
  if (nextGrain === DATA_GRAIN) return false;
  sessionStorage.setItem(VIEW_STATE_KEY, JSON.stringify({ ...state, period }));
  const url = new URL(location.href);
  url.searchParams.set('grain', nextGrain);
  location.href = url.toString();
  return true;
}

function displayDate(date) {
  return DATA_GRAIN === 'daily' ? date : date.substring(0, 7).replace('-', '年') + '月';
}

function axisDate(date) {
  return DATA_GRAIN === 'daily' ? date.substring(5) : date.substring(5, 7) + '月';
}

function trendAxisDate(date, trendDates) {
  const dailyDates = ROOT_DATA?.daily?.dates || [];
  const isDailyTrend = DATA_GRAIN === 'daily'
    || (trendDates.length > 1 && trendDates.every(value => dailyDates.includes(value)));
  return isDailyTrend ? date.substring(5) : axisDate(date);
}

function shiftIsoDate(date, days) {
  const value = new Date(date + 'T12:00:00');
  value.setDate(value.getDate() + days);
  return `${value.getFullYear()}-${String(value.getMonth() + 1).padStart(2, '0')}-${String(value.getDate()).padStart(2, '0')}`;
}

function getRecord(date, store) {
  return IDX_BY_DS[date + '_' + store];
}

function safeNum(v) {
  if (v == null || v === '' || v === undefined) return 0;
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}
function metricField(m) { return FIELD_MAP[m] || m; }
function primaryRevenueMetric() { return DATA_GRAIN === 'daily' ? '总营业额' : '服务营业额'; }
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}
function jsString(value) {
  return String(value)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r/g, '\\r')
    .replace(/\n/g, '\\n');
}
function csvCell(value) {
  const s = value == null ? '' : String(value);
  return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

// 获取上一周期日期（同长度）
function getPrevDates(dates) {
  if (!dates || dates.length === 0) return [];
  const sorted = [...DATES].sort();
  const curStart = sorted.indexOf(dates[0]);
  if (curStart <= 0) return [];
  const prevStart = Math.max(0, curStart - dates.length);
  return sorted.slice(prevStart, curStart);
}

// 格式化函数族
function fmtY(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString('zh-CN');
}
// 金额取整到个位（单店详情卡使用）：四舍五入 + 千分位，不带小数与“万”缩写
function fmtYInt(n) {
  if (n == null || isNaN(n)) return '—';
  return Math.round(Number(n)).toLocaleString('zh-CN');
}
function fmtN(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('zh-CN');
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (Number(n)*100).toFixed(1) + '%';
}
function fmtScore(n) {
  if (n == null || isNaN(n) || Number(n) === 0) return '—';
  return Number(n).toFixed(1);
}

function getFilteredDates() {
  if (presetDates) return presetDates;
  const sorted = [...DATES].sort();
  const period = document.getElementById('overview-period')?.value;
  if (!period) return sorted;
  if (period === 'day') {
    const date = document.getElementById('overview-day')?.value;
    return date ? sorted.filter(d => d === date) : sorted.slice(-1);
  }
  if (period === 'week') {
    const end = document.getElementById('overview-week-end')?.value || sorted[sorted.length - 1];
    const endIndex = sorted.indexOf(end);
    return endIndex >= 0 ? sorted.slice(Math.max(0, endIndex - 6), endIndex + 1) : [];
  }
  if (period === 'month') {
    const month = document.getElementById('overview-month')?.value;
    return month ? (DATA_GRAIN === 'daily' ? sorted.filter(d => d.startsWith(month)) : sorted.filter(d => d === month)) : [];
  }
  if (period === 'quarter') {
    const year = document.getElementById('overview-quarter-year')?.value;
    const quarter = document.getElementById('overview-quarter')?.value;
    const months = {Q1:['01','02','03'], Q2:['04','05','06'], Q3:['07','08','09'], Q4:['10','11','12']}[quarter] || [];
    return sorted.filter(d => d.startsWith(year + '-') && months.includes(d.substring(5, 7)));
  }
  if (period === 'year') {
    const year = document.getElementById('overview-year')?.value;
    return year ? sorted.filter(d => d.startsWith(year)) : [];
  }
  if (period === 'range') {
    const from = document.getElementById('overview-from')?.value;
    const to = document.getElementById('overview-to')?.value;
    return from && to ? sorted.filter(d => d >= from && d <= to) : sorted;
  }
  return sorted;
}

function calcTotal(dates, metric) {
  if (CHANNEL_REVENUE_FIELDS[metric]) return calcChannelRevenue(dates, metric);
  if (metric === '美团刷单金额') return calcFraudRecharge(dates);
  const parts = RATIO_METRICS[metric];
  if (parts) {
    const numerator = calcTotal(dates, parts[0]);
    const denominator = calcTotal(dates, parts[1]);
    return denominator ? numerator / denominator : 0;
  }
  const f = metricField(metric);
  let sum = 0;
  dates.forEach(d => {
    (IDX_BY_DATE[d] || []).forEach(r => sum += safeNum(r[f]));
  });
  return sum;
}

function calcRowsTotal(rows, metric) {
  if (CHANNEL_REVENUE_FIELDS[metric]) return calcChannelRevenueRows(rows, metric);
  if (metric === '美团刷单金额') return rows.reduce((sum, row) => sum + safeNum(row['美团刷单金额']), 0);
  const parts = RATIO_METRICS[metric];
  if (parts) {
    const numerator = calcRowsTotal(rows, parts[0]);
    const denominator = calcRowsTotal(rows, parts[1]);
    return denominator ? numerator / denominator : 0;
  }
  const f = metricField(metric);
  return rows.reduce((sum, row) => sum + safeNum(row[f]), 0);
}

function getDailyRowsForDates(dates) {
  const dateSet = new Set(dates);
  return (ROOT_DATA.daily?.data || []).filter(row => dateSet.has(row['日期']));
}

const CHANNEL_REVENUE_FIELDS = Object.freeze({
  '抖音营业额': { platform: '抖音-平台', fallback: '抖音-可聚集' },
  '美团营业额': { platform: '美团-平台', fallback: '美团-可聚集' },
});

function getDailyRowsForViewDates(dates) {
  const values = (dates || []).map(String);
  const dailyDates = new Set(values.filter(value => /^\d{4}-\d{2}-\d{2}$/.test(value)));
  const months = new Set(values.filter(value => /^\d{4}-\d{2}$/.test(value)));
  return (ROOT_DATA.daily?.data || []).filter(row => {
    const date = String(row['日期'] || '');
    return dailyDates.has(date) || months.has(date.substring(0, 7));
  });
}

function channelRevenueValue(row, metric) {
  const fields = CHANNEL_REVENUE_FIELDS[metric];
  if (!fields) return 0;
  const platformAmount = safeNum(row[fields.platform]);
  return platformAmount > 0 ? platformAmount : safeNum(row[fields.fallback]);
}

function calcChannelRevenueRows(rows, metric) {
  return rows.reduce((sum, row) => sum + channelRevenueValue(row, metric), 0);
}

function calcChannelRevenue(dates, metric) {
  return calcChannelRevenueRows(getDailyRowsForViewDates(dates), metric);
}

function calcFraudRecharge(dates) {
  return getDailyRowsForViewDates(dates)
    .reduce((sum, row) => sum + safeNum(row['美团刷单金额']), 0);
}

function getOverviewComparison(dates) {
  const period = document.getElementById('overview-period')?.value;
  if (DATA_GRAIN === 'monthly' && period === 'month' && dates.length === 1) {
    const selectedMonth = dates[0].substring(0, 7);
    const latestDailyDate = [...(ROOT_DATA.daily?.dates || [])].sort().at(-1) || '';
    const latestDailyMonth = latestDailyDate.substring(0, 7);
    if (selectedMonth === latestDailyMonth && latestDailyDate) {
      const dayLimit = Number(latestDailyDate.substring(8, 10));
      const clipMonth = month => (ROOT_DATA.daily?.dates || []).filter(date =>
        date.startsWith(month) && Number(date.substring(8, 10)) <= dayLimit
      );
      return {
        prev: { rows: getDailyRowsForDates(clipMonth(shiftMonthKey(selectedMonth, -1))), label: '环比同期' },
        yoy: { rows: getDailyRowsForDates(clipMonth(shiftMonthKey(selectedMonth, -12))), label: '同比同期' },
      };
    }
    return {
      prev: { dates: [`${shiftMonthKey(selectedMonth, -1)}-01`], label: '环比' },
      yoy: { dates: [`${shiftMonthKey(selectedMonth, -12)}-01`], label: '同比' },
    };
  }
  if (DATA_GRAIN === 'daily') {
    return { prev: { dates: getPrevDates(dates), label: '' } };
  }
  return {};
}

function calcOverviewRangeTotal(range, metric) {
  if (range?.rows) return calcRowsTotal(range.rows, metric);
  return range?.dates?.length ? calcTotal(range.dates, metric) : 0;
}

function calcStoreAgg(dates, store, metric) {
  if (CHANNEL_REVENUE_FIELDS[metric]) {
    return calcChannelRevenueRows(
      getDailyRowsForViewDates(dates).filter(row => row['门店'] === store),
      metric,
    );
  }
  if (metric === '美团刷单金额') {
    return getDailyRowsForViewDates(dates)
      .filter(row => row['门店'] === store)
      .reduce((sum, row) => sum + safeNum(row['美团刷单金额']), 0);
  }
  const f = metricField(metric);
  let sum = 0;
  dates.forEach(d => {
    const r = IDX_BY_DS[d + '_' + store] || DAILY_IDX_BY_DS[d + '_' + store];
    if (r) sum += safeNum(r[f]);
  });
  return sum;
}
const RATIO_METRICS = {
  '美团转化率':['美团核销总数','美团曝光人数'],
  '抖音转化率':['抖音门店页成交人数','抖音门店页访问人数'],
  '抖音核销率':['抖音-平台','抖音成交金额'],
};
// 评分和已有比率沿用均值；明确分子分母的新比率按合计重算。
const AVG_METRICS = new Set(['差评率','新客占比','曝光-访问转化率','意向转化率','大钟占比','抖音评价回复率','抖音评分','美团评分','大众点评','美团经营分']);
function isAvgMetric(m) { return AVG_METRICS.has(m); }
const MONEY_METRICS = new Set(['总营业额','服务营业额','现金流营业额','抖音营业额','美团营业额','抖音成交金额','抖音平台核销金额','美团平台核销金额','抖音-平台','美团-平台','卡金','充值','开卡','续充','商品营业额','免单减免']);
function fmtMean(v, m) {
  if (MONEY_METRICS.has(m)) return fmtY(v);
  return fmtN(Math.round(v));
}
function calcStoreValue(dates, store, metric) {
  const parts = RATIO_METRICS[metric];
  if (parts) {
    const numerator = calcStoreAgg(dates, store, parts[0]);
    const denominator = calcStoreAgg(dates, store, parts[1]);
    return denominator ? numerator / denominator : 0;
  }
  if (isAvgMetric(metric)) return calcStoreAvg(dates, store, metric);
  return calcStoreAgg(dates, store, metric);
}
function getStoreDataDates(dates, store) {
  return dates.filter(d => IDX_BY_DS[d + '_' + store]);
}
function calcStoreAvg(dates, store, metric) {
  const dataDates = getStoreDataDates(dates, store);
  if (dataDates.length === 0) return 0;
  return calcStoreAgg(dataDates, store, metric) / dataDates.length;
}

function getMonthlyData(dates, metric) {
  if (RATIO_METRICS[metric] || CHANNEL_REVENUE_FIELDS[metric] || metric === '美团刷单金额') {
    return Object.fromEntries(dates.map(d => [d, calcTotal([d], metric)]));
  }
  const f = metricField(metric);
  const monthly = {};
  dates.forEach(d => {
    let sum = 0;
    (IDX_BY_DATE[d] || []).forEach(r => sum += safeNum(r[f]));
    monthly[d] = sum;
  });
  return monthly;
}

function getStoreMonthlyData(store, metric, dates) {
  if (RATIO_METRICS[metric] || CHANNEL_REVENUE_FIELDS[metric] || metric === '美团刷单金额') {
    return Object.fromEntries(dates.map(d => [d, calcStoreValue([d], store, metric)]));
  }
  const f = metricField(metric);
  const result = {};
  dates.forEach(d => {
    const r = IDX_BY_DS[d + '_' + store] || DAILY_IDX_BY_DS[d + '_' + store];
    result[d] = r ? safeNum(r[f]) : 0;
  });
  return result;
}

function renderOverview() {
  const dates = getFilteredDates();
  renderOverviewKPIs(dates);
  renderOverviewInsights(dates);
  renderTrendChart(getOverviewTrendDates(dates), trendSelectedMetrics);
  renderPieCharts(dates);

}

function getOverviewTrendDates(dates) {
  const period = document.getElementById('overview-period')?.value;
  if (DATA_GRAIN !== 'daily' || period !== 'day' || dates.length !== 1) return dates;
  const sortedDates = [...DATES].sort();
  const endIndex = sortedDates.indexOf(dates[0]);
  return endIndex >= 0
    ? sortedDates.slice(Math.max(0, endIndex - 6), endIndex + 1)
    : dates;
}

function renderOverviewKPIs(dates) {
  const container = document.getElementById('overview-kpi');
  const comparison = getOverviewComparison(dates);

  function calcDelta(cur, metric, range) {
    const pv = calcOverviewRangeTotal(range, metric);
    if (!pv) return '';
    const chg = (cur - pv) / pv;
    const arrow = chg >= 0 ? '↑' : '↓';
    // 红涨绿跌：up/down 类只按涨跌方向赋予；差评等负向指标上升呈红色，恰好兼作警示
    const colorCls = chg >= 0 ? 'up' : 'down';
    const label = range.label ? `<span class="kpi-change-label">${range.label}</span>` : '';
    return `<div class="kpi-change ${colorCls}"><span class="arrow">${arrow}</span>${(chg*100).toFixed(1)}%${label}</div>`;
  }

  function overviewChanges(cur, metric) {
    return Object.values(comparison)
      .map(range => calcDelta(cur, metric, range))
      .filter(Boolean)
      .join('');
  }

  const overviewMoney = n => DATA_GRAIN === 'daily' ? fmtYInt(n) : fmtY(n);

  const revenueMetric = primaryRevenueMetric();
  const totalRev = calcTotal(dates,revenueMetric);
  const totalCashflow = calcTotal(dates,'现金流营业额');
  const dyAmt = calcTotal(dates,'抖音营业额');
  const mtAmt = calcTotal(dates,'美团营业额');
  const mtFraud = calcTotal(dates, '美团刷单金额');
  const totalFree = calcTotal(dates,'免单减免');
  const totalCard = calcTotal(dates,'卡金');
  const totalRecharge = calcTotal(dates,'充值');
  const totalProjects = calcTotal(dates,'项目数');
  const totalComments = calcTotal(dates,'综合新增评论');
  const totalBad = calcTotal(dates,'综合新增差评');
  const badRate = totalComments > 0 ? totalBad/totalComments : 0;
  const avgTicket = totalProjects > 0 ? totalRev / totalProjects : 0;
  const cashflowRate = totalRev > 0 ? totalCashflow / totalRev : 0;
  const cardRechargeGap = totalRecharge - totalCard;
  // 新客占比 = 核销新客 / (核销新客+核销老客)，用总数算避免平均各店比率
  const totalNewCust = calcTotal(dates,'核销新客数');
  const totalOldCust = calcTotal(dates,'核销老客数');
  const newRate = (totalNewCust + totalOldCust) > 0 ? totalNewCust / (totalNewCust + totalOldCust) : 0;

  // 评分只取所选范围内最新月份，且只统计非0有效门店
  const sortedSelectedDates = [...dates].sort();
  const latestDate = sortedSelectedDates[sortedSelectedDates.length - 1] || LATEST_DATE;
  const latestRecs = IDX_BY_DATE[latestDate] || [];
  function avgNonZero(field) {
    const vals = latestRecs.map(r => safeNum(r[field])).filter(v => v > 0);
    return {
      value: vals.length ? vals.reduce((s, v) => s + v, 0) / vals.length : 0,
      count: vals.length
    };
  }
  const dyScore = avgNonZero('抖音评分');
  const mtScore = avgNonZero('美团评分');

  const kpis = [
    { label:METRIC_LABELS[revenueMetric], val:overviewMoney(totalRev), raw:totalRev, color:'gold', m:revenueMetric },
    { label:'现金流营业额', val:overviewMoney(totalCashflow), raw:totalCashflow, color:'', m:'现金流营业额' },
    { label:'现金流率', val:fmtPct(cashflowRate), raw:cashflowRate, color: cashflowRate>=1?'green':'', m:null },
    { label:'项目均价', val:fmtYInt(avgTicket), raw:avgTicket, color:'', m:null },
    { label:'总项目数', val:fmtN(totalProjects), raw:totalProjects, color:'', m:'项目数' },
    { label:'抖音营业额', val:overviewMoney(dyAmt), raw:dyAmt, color:'', m:'抖音营业额' },
    { label:'美团营业额', val:overviewMoney(mtAmt), raw:mtAmt, color:'', m:'美团营业额', sub:mtFraud > 0 ? `刷单金额 ${fmtYInt(mtFraud)} 元` : undefined },
    { label:'卡金-充值', val:overviewMoney(cardRechargeGap), raw:cardRechargeGap, color: cardRechargeGap<0?'red':'green', sub:cardRechargeGap<0?'充值少于卡金':'充值覆盖卡金', m:null },
    { label:'免单减免', val:overviewMoney(totalFree), raw:totalFree, color: totalFree>0?'red':'', m:'免单减免' },
    { label:'综合新增评论', val:fmtN(totalComments), raw:totalComments, color:'green', m:'综合新增评论' },
    { label:'综合新增差评', val:fmtN(totalBad), raw:totalBad, color:'red', m:'综合新增差评' },
    { label:'差评率', val:fmtPct(badRate), raw:badRate, color: badRate>0.05?'red':'', m:null },
    { label:'新客占比', val:fmtPct(newRate), raw:newRate, color:'', m:null },
    { label:'抖音评分', val:fmtScore(dyScore.value), raw:dyScore.value, sub:latestDate.substring(0,7).replace('-','年')+'月 · 有效'+dyScore.count+'店', color: Number(dyScore.value)>4.5?'green':'', m:null },
    { label:'美团评分', val:fmtScore(mtScore.value), raw:mtScore.value, sub:latestDate.substring(0,7).replace('-','年')+'月 · 有效'+mtScore.count+'店', color: Number(mtScore.value)>4.5?'green':'', m:null },
  ];
  const hiddenOverviewKpis = new Set(['现金流率','抖音评分','美团评分']);
  container.innerHTML = kpis.filter(it => !hiddenOverviewKpis.has(it.label)).map(it => `
    <div class="kpi-card">
      <div class="kpi-label">${it.label}</div>
      <div class="kpi-value ${it.color}">${it.val}</div>
      ${it.m ? overviewChanges(it.raw, it.m) : ''}
      ${it.sub ? `<div class="kpi-sub">${it.sub}</div>` : ''}
    </div>`).join('');
}

function renderOverviewInsights(dates) {
  const container = document.getElementById('overview-insights');
  if (!container) return;
  const date = [...dates].sort().pop();
  if (!date) {
    container.innerHTML = '';
    return;
  }

  const records = (IDX_BY_DATE[date] || []).filter(r => STORE_ORDER.includes(r['门店']));
  if (records.length === 0) {
    container.innerHTML = '';
    return;
  }

  const prevDate = getPrevDates([date])[0];
  const rows = records.map(r => {
    const store = r['门店'];
    const prev = prevDate ? IDX_BY_DS[prevDate + '_' + store] : null;
    const revenueField = metricField(primaryRevenueMetric());
    const rev = safeNum(r[revenueField]);
    const prevRev = prev ? safeNum(prev[revenueField]) : 0;
    const revChange = prevRev > 0 ? (rev - prevRev) / prevRev : null;
    const ticket = safeNum(r['项目数']) > 0 ? rev / safeNum(r['项目数']) : 0;
    const cardGap = safeNum(r['充值']) - safeNum(r['卡金']);
    return { r, store, rev, prevRev, revChange, ticket, cardGap };
  });

  const byRev = [...rows].sort((a, b) => b.rev - a.rev);
  const downRows = rows
    .filter(x => x.revChange !== null)
    .sort((a, b) => a.revChange - b.revChange)
    .slice(0, 4);
  const riskRows = rows
    .map(x => {
      const scores = [
        { label:'抖音', value:safeNum(x.r['抖音评分']), line:4.3 },
        { label:'美团', value:safeNum(x.r['美团评分']), line:4.3 },
      ].filter(s => s.value > 0 && s.value < s.line);
      return { store:x.store, scores };
    })
    .filter(x => x.scores.length > 0)
    .slice(0, 4);
  const cashRows = rows
    .filter(x => x.cardGap < 0 || safeNum(x.r['免单+减免']) > 2000)
    .sort((a, b) => (a.cardGap - safeNum(a.r['免单+减免'])) - (b.cardGap - safeNum(b.r['免单+减免'])))
    .slice(0, 4);

  function card(title, items, render) {
    return `<div class="insight-card">
      <div class="insight-title">${title}</div>
      ${items.length ? items.map(render).join('') : '<div class="insight-empty">暂无明显异常</div>'}
    </div>`;
  }

  container.innerHTML =
    card('收入最高', byRev.slice(0, 4), x => `<div class="insight-row" data-store="${escapeHtml(x.store)}" onclick="openStoreDetail('${jsString(x.store)}')"><span class="name">${escapeHtml(x.store)}</span><span class="val">${fmtY(x.rev)}</span></div>`) +
    card('收入最低', byRev.slice(-4).reverse(), x => `<div class="insight-row" data-store="${escapeHtml(x.store)}" onclick="openStoreDetail('${jsString(x.store)}')"><span class="name">${escapeHtml(x.store)}</span><span class="val bad">${fmtY(x.rev)}</span></div>`) +
    card('环比下滑', downRows, x => `<div class="insight-row" data-store="${escapeHtml(x.store)}" onclick="openStoreDetail('${jsString(x.store)}')"><span class="name">${escapeHtml(x.store)}</span><span class="val bad">${(x.revChange*100).toFixed(1)}%</span></div>`) +
    card('口碑/现金风险', [...riskRows.map(x => ({
      store:x.store,
      text:x.scores.map(s => `${s.label}${s.value.toFixed(s.label === '经营分' ? 0 : 1)}`).join(' / ')
    })), ...cashRows.map(x => ({
      store:x.store,
      text:x.cardGap < 0 ? `卡金缺口${fmtY(Math.abs(x.cardGap))}` : `免单${fmtY(safeNum(x.r['免单+减免']))}`
    }))].slice(0, 4), x => `<div class="insight-row" data-store="${escapeHtml(x.store)}" onclick="openStoreDetail('${jsString(x.store)}')"><span class="name">${escapeHtml(x.store)}</span><span class="val bad">${escapeHtml(x.text)}</span></div>`);
}

function renderTrendChart(dates, metrics) {
  const chart = getChart('chart-trend');
  if (!chart) return;
  const labels = dates.map(axisDate);
  const showAllPointLabels = dates.length <= 14;
  const formatTrendValue = (value, metric) => {
    const number = safeNum(value);
    if (isPct(metric)) return `${(number * 100).toFixed(1)}%`;
    return number.toLocaleString('zh-CN', { maximumFractionDigits: 1 });
  };

  const series = metrics.map((m, i) => {
    const monthly = getMonthlyData(dates, m);
    const values = dates.map(d => monthly[d] || 0);
    const pctFlag = isPct(m);
    return {
      name: METRIC_LABELS[m]||m,
      data: values.map((value, index) => ({
        value,
        label: { show: showAllPointLabels || index === values.length - 1 },
      })),
      type:'line', smooth:true,
      yAxisIndex: pctFlag ? 1 : 0,
      symbol: 'circle',
      symbolSize: 4,
      lineStyle:{color:CHART_COLORS[i % CHART_COLORS.length], width:2},
      itemStyle:{color:CHART_COLORS[i % CHART_COLORS.length]},
      label:{
        show: true,
        position:'top',
        distance:5,
        color:CHART_COLORS[i % CHART_COLORS.length],
        fontSize:9,
        fontWeight:500,
        formatter:params => formatTrendValue(params.value, m),
      },
      labelLayout:{hideOverlap:true, moveOverlap:'shiftY'},
      emphasis:{focus:'series', scale:true, label:{show:true}},
      areaStyle: !pctFlag ? {color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:CHART_COLORS[i % CHART_COLORS.length]+'1F'},{offset:1,color:CHART_COLORS[i % CHART_COLORS.length]+'00'}]}} : null
    };
  });

  const hasPct = metrics.some(m=>isPct(m));
  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{...T.tip,trigger:'axis',formatter:p=>p.map(x=>`${x.seriesName}: ${x.value.toLocaleString('zh-CN')}`).join('<br>')},
    legend:{data:metrics.map(m=>METRIC_LABELS[m]||m),textStyle:{color:T.text,fontSize:10},itemWidth:12,itemHeight:8,top:0},
    xAxis:{type:'category',data:labels,axisLine:{lineStyle:{color:T.axis}},axisLabel:{color:T.text,fontSize:10},splitLine:{show:false}},
    yAxis:[
      {type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:T.split}},axisLabel:{color:T.text,fontSize:10},name:'',nameTextStyle:{show:false}},
      hasPct ? {type:'value',axisLine:{show:false},splitLine:{show:false},axisLabel:{color:T.text,fontSize:10,formatter:v=>(v*100).toFixed(0)+'%'},position:'right',offset:0} : null
    ].filter(y=>y!==null),
    series,
    grid:{left:60,right:hasPct?60:30,top:30,bottom:40}
  }, true);
}

function renderPieCharts(dates) {
  const dy = calcTotal(dates, '抖音营业额');
  const meituanGross = calcTotal(dates, '美团营业额');
  const fraudRechargeAmount = calcTotal(dates, '美团刷单金额');
  const mt = Math.max(0, meituanGross - fraudRechargeAmount);
  const revenueMetric = primaryRevenueMetric();
  const svcTotal = calcTotal(dates,revenueMetric);
  const other = Math.max(0, svcTotal - dy - mt);
  const pieTotal = dy + mt + other;

  const pie = getChart('chart-revenue-pie');
  if (!pie) return;
  pie.setOption({
    backgroundColor:'transparent',
    tooltip:{...T.tip,formatter:p=>`${p.name}: ${p.value.toLocaleString('zh-CN')} (${p.percent.toFixed(1)}%) · 占营业结构 ${(p.value/(pieTotal || 1)*100).toFixed(1)}%`},
    legend:{orient:'vertical',right:10,top:'center',textStyle:{color:T.text,fontSize:11},itemWidth:10,itemHeight:10},
    series:[{
      type:'pie', radius:['40%','70%'], center:['35%','50%'],
      data:[
        {value:dy,name:'抖音',itemStyle:{color:T.dy}},
        {value:mt,name:'美团',itemStyle:{color:T.mt}},
        {value:other,name:'其它',itemStyle:{color:T.gold}},
      ],
      label:{show:true,formatter:'{b}\n{d}%',fontSize:11,color:T.label},
      labelLine:{lineStyle:{color:T.axis}}
    }]
  });
  // 核验: 各成分之和 = 当前主营业额口径
  const checkEl = document.getElementById('revenue-check');
  if (checkEl) {
    const checkSum = pieTotal;
    const diff = Math.abs(svcTotal - checkSum);
    checkEl.textContent = `抖音 + 美团 + 其它 = ${checkSum.toLocaleString('zh-CN')}  ·  ${DATA_GRAIN === 'daily' ? '总营业额' : '服务营业额'} ${svcTotal.toLocaleString('zh-CN')}  ${diff < 1 ? '正常' : '差额 '+diff.toFixed(2)}`;
  }

  const p168 = calcTotal(dates,'168项目数');
  const p298 = calcTotal(dates,'298项目数');
  const p358 = calcTotal(dates,'358项目数');
  const projPie = getChart('chart-project-pie');
  if (!projPie) return;
  projPie.setOption({
    backgroundColor:'transparent',
    tooltip:{...T.tip,formatter:p=>`${p.name}: ${p.value.toLocaleString('zh-CN')} (${p.percent.toFixed(1)}%)`},
    legend:{orient:'vertical',right:10,top:'center',textStyle:{color:T.text,fontSize:11},itemWidth:10,itemHeight:10},
    series:[{
      type:'pie', radius:['40%','70%'], center:['35%','50%'],
      data:[
        {value:p168,name:'168元',itemStyle:{color:T.mt}},
        {value:p298,name:'298元',itemStyle:{color:T.dy}},
        {value:p358,name:'358元',itemStyle:{color:T.gold}},
      ],
      label:{show:true,formatter:'{b}\n{d}%',fontSize:11,color:T.label},
      labelLine:{lineStyle:{color:T.axis}}
    }]
  });
}

function renderOverviewAlerts(dates) {
  const container = document.getElementById('overview-alerts');
  if (!container) return;
  const date = [...dates].sort().pop();
  if (!date) {
    container.innerHTML = '';
    return;
  }

  const records = IDX_BY_DATE[date] || [];
  if (records.length === 0) { container.innerHTML = ''; return; }

  const stores = STORE_ORDER.filter(s => records.some(r => r['门店'] === s));
  if (stores.length === 0) { container.innerHTML = ''; return; }

  // 1) 评分低于4.3
  const scoreWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const dy = safeNum(r['抖音评分']);
    const mt = safeNum(r['美团评分']);
    if (dy > 0 && dy < 4.3) scoreWarns.push({ store:s, platform:'抖音', score:dy });
    if (mt > 0 && mt < 4.3) scoreWarns.push({ store:s, platform:'美团', score:mt });
  });

  // 2) 差评率 > 3%
  const badRateWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const rate = safeNum(r['差评率']);
    const totalNewBad = safeNum(r['综合新增差评']);
    if (rate > 0.03) badRateWarns.push({
      store:s, rate, bad:totalNewBad,
      dyTotal:safeNum(r['抖音总评论数']), dyBad:safeNum(r['抖音总中差评数']),
      mtTotal:safeNum(r['美团总评价数']), mtBad:safeNum(r['美团总差评数'])
    });
  });

  // 3) 新增差评 > 5
  const badCountWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const bad = safeNum(r['综合新增差评']);
    if (bad > 5) badCountWarns.push({ store:s, bad });
  });

  // 4) 免单金额 > 2000
  const freeWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const free = safeNum(r['免单+减免']);
    if (free > 2000) freeWarns.push({ store:s, free });
  });

  // 5) 充值低于卡金消耗
  const cardGapWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const card = safeNum(r['卡金']);
    const recharge = safeNum(r['充值']);
    if (card > recharge) cardGapWarns.push({ store:s, gap:card - recharge, card, recharge });
  });

  const totalWarns = scoreWarns.length + badRateWarns.length + badCountWarns.length + freeWarns.length + cardGapWarns.length;

  if (totalWarns === 0) {
    container.innerHTML = `<div class="alert-section" style="border-color:var(--green);background:rgba(69,209,148,.06);">
      <div class="alert-header" style="background:rgba(69,209,148,.10);color:var(--green);border-color:rgba(69,209,148,.18);">正常 本月无异常警告</div>
    </div>`;
    return;
  }

  const monthLabel = date.substring(0,7).replace('-','年')+'月';
  const scopeLabel = dates.length > 1 ? '所选范围最新月 · ' : '';
  let html = `<div class="alert-section">
    <div class="alert-header">${scopeLabel}${monthLabel} 门店预警 (${totalWarns})</div>
    <div class="alert-body">`;

  if (scoreWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">评分低于4.3</div>
      ${scoreWarns.map(w => `<div class="alert-store">
        <span class="name">${w.store}</span>
        <span class="val" style="color:${w.score<4?'var(--red)':'var(--orange)'}">${w.score.toFixed(1)}</span>
        <span class="detail">${w.platform}评分</span>
      </div>`).join('')}
    </div>`;
  }

  if (badRateWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">差评率超过3%</div>
      ${badRateWarns.map(w => `<div class="alert-store" style="flex-wrap:wrap;padding:8px 10px;">
        <span class="name">${w.store}</span>
        <span class="val">${(w.rate*100).toFixed(1)}%</span>
        <span class="detail">差评 ${w.bad} 条</span>
        <div style="width:100%;font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:16px;">
          <span>🎵 抖音 ${w.dyTotal}评/${w.dyBad}差</span>
          <span>🟦 美团 ${w.mtTotal}评/${w.mtBad}差</span>
        </div>
      </div>`).join('')}
    </div>`;
  }

  if (badCountWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">新增差评超过5条</div>
      ${badCountWarns.map(w => `<div class="alert-store">
        <span class="name">${w.store}</span>
        <span class="val">${w.bad} 条</span>
      </div>`).join('')}
    </div>`;
  }

  if (freeWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">免单金额超过2000元</div>
      ${freeWarns.map(w => `<div class="alert-store">
        <span class="name">${w.store}</span>
        <span class="val">${fmtY(w.free)}</span>
      </div>`).join('')}
    </div>`;
  }

  if (cardGapWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">卡金消耗高于充值</div>
      ${cardGapWarns.map(w => `<div class="alert-store" style="flex-wrap:wrap;padding:8px 10px;">
        <span class="name">${w.store}</span>
        <span class="val">${fmtY(w.gap)}</span>
        <span class="detail">卡金 ${fmtY(w.card)} / 充值 ${fmtY(w.recharge)}</span>
      </div>`).join('')}
    </div>`;
  }

  html += '</div></div>';
  container.innerHTML = html;
}

function initCompare() {
  // 门店下拉（按 STORE_ORDER 顺序）
  const sortedStores = [...STORES].sort((a, b) => {
    const ia = STORE_ORDER.indexOf(a);
    const ib = STORE_ORDER.indexOf(b);
    return ia - ib;
  });
  const list = document.getElementById('compare-store-list');
  list.innerHTML = `
    <div class="store-search"><input type="text" id="compare-store-search" placeholder="搜索门店..." oninput="filterStoreList(this.value)"></div>
    <div class="dropdown-footer">
      <button onclick="compareSelectAll()">全选</button>
      <button onclick="compareSelectNone()">清空</button>
    </div>` +
    sortedStores.map(s => `<div class="dropdown-item" data-store="${s}"><label><input type="checkbox" value="${s}" onchange="compareUpdateStores()"> ${s}</label></div>`).join('');

  // 日期下拉（时间倒序）
  const sortedAsc = [...DATES].sort();
  const sortedDesc = [...DATES].sort((a, b) => b.localeCompare(a));
  const startSel = document.getElementById('compare-start');
  const endSel = document.getElementById('compare-end');
  startSel.innerHTML = sortedAsc.map(d => {
    const label = displayDate(d);
    return `<option value="${d}">${label}</option>`;
  }).join('');
  endSel.innerHTML = sortedDesc.map(d => {
    const label = displayDate(d);
    return `<option value="${d}">${label}</option>`;
  }).join('');
  // 默认：起始月=截止月=最新
  const latest = sortedDesc[0];
  startSel.value = latest;
  endSel.value = latest;
  // 激活"最近一月"预设
  const presetBtns = document.querySelectorAll('#compare-preset-btns .preset-btn');
  presetBtns.forEach(b => b.classList.toggle('active', b.dataset.preset === 'latestMonth'));
  startSel.onchange = endSel.onchange = () => {
    document.querySelectorAll('#compare-preset-btns .preset-btn').forEach(b => b.classList.remove('active'));
    renderCompare();
  };

  // 指标下拉（统一分组）
  renderCompareMetricDropdown();

  // 默认全选
  compareSelectedStores = STORE_ORDER.filter(s => STORES.includes(s));
  compareUpdateStoreUI();
  renderCompare();

function compareToggleMetric(m, el) {

  if (idx >= 0) { compareSelectedMetrics.splice(idx,1); el.classList.remove('selected'); }
  else { compareSelectedMetrics.push(m); el.classList.add('selected'); }

  renderCompareMetricDropdown();

function compareRemoveMetric(m) {

  renderCompare();

function compareRestoreDefault() {

function setComparePreset(name) {
  const btns = document.querySelectorAll('#compare-preset-btns .preset-btn');
  btns.forEach(b => b.classList.toggle('active', b.dataset.preset === name));
  const sorted = [...DATES].sort();
  const startSel = document.getElementById('compare-start');
  const endSel = document.getElementById('compare-end');
  switch (name) {
    case 'latestMonth':
      startSel.value = sorted[sorted.length - 1];
      endSel.value = sorted[sorted.length - 1];
      break;
    case 'latestQuarter':
      startSel.value = sorted[Math.max(0, sorted.length - (DATA_GRAIN === 'daily' ? 7 : 3))];
      endSel.value = sorted[sorted.length - 1];
      break;
    case 'ytd': {
      const currentPrefix = sorted[sorted.length - 1].substring(0, DATA_GRAIN === 'daily' ? 7 : 4);
      const ytd = sorted.filter(d => d.startsWith(currentPrefix));
      startSel.value = ytd[0];
      endSel.value = ytd[ytd.length - 1];
      break;
    }
    default: // all
      startSel.value = sorted[0];
      endSel.value = sorted[sorted.length - 1];
      break;
  }
  renderCompare();
}

function renderCompare() {
  const start = document.getElementById('compare-start').value;
  const end = document.getElementById('compare-end').value;
  const dates = DATES.filter(d => d >= start && d <= end);

  // KPI cards: show both total and mean
  const kpiEl = document.getElementById('compare-kpi');
  if (compareSelectedStores.length === 0) {
    kpiEl.innerHTML = '<div style="color:var(--text2);padding:20px;">请选择门店</div>';
    return;
  }
  kpiEl.innerHTML = compareSelectedMetrics.map(m => {
    const isPctMetric = isPct(m);
    // Total across all stores for the period (sum of sums)
    const total = compareSelectedStores.reduce((sum, s) => sum + calcStoreAgg(dates, s, m), 0);
    // Per-store mean
    const storeVals = compareSelectedStores.map(s => calcStoreValue(dates, s, m));
    const mean = storeVals.reduce((a,b)=>a+b,0) / storeVals.length;
    const storeLabel = `${compareSelectedStores.length}店 × ${dates.length}月`;
    let mainVal, subText;
    if (isPctMetric) {
      mainVal = (mean*100).toFixed(1)+'%';
      subText = `均值 ${mainVal} | ${storeLabel}`;
    } else if (isAvgMetric(m)) {
      mainVal = fmtScore(mean);
      subText = `均值 ${mainVal} | ${storeLabel}`;
    } else {
      mainVal = fmtY(total);
      const meanPerMonth = mean / dates.length;
      subText = `总值 ${fmtY(total)} · 单店月均 ${fmtMean(meanPerMonth, m)} | ${storeLabel}`;
    }
    return `<div class="kpi-card">
      <div class="kpi-label">${METRIC_LABELS[m]||m}</div>
      <div class="kpi-value">${mainVal}</div>
      <div class="kpi-sub">${subText}</div>
    </div>`;
  }).join('');

  renderCompareChart(dates);
  renderCompareSummary(dates);
  renderCompareTable(dates);
}

function fmtCompareValue(v, metric) {
  if (isPct(metric)) return fmtPct(v);
  if (isAvgMetric(metric)) return fmtScore(v);
  if (MONEY_METRICS.has(metric)) return fmtY(v);
  return fmtN(Math.round(v));
}

function getCompareRankRows(dates, metric) {
  return compareSelectedStores
    .map(store => ({ store, value: calcStoreValue(dates, store, metric) }))
    .sort((a, b) => b.value - a.value);
}

function renderCompareSummary(dates) {
  const container = document.getElementById('compare-summary');
  if (!container) return;
  if (compareSelectedStores.length === 0 || compareSelectedMetrics.length === 0) {
    container.innerHTML = '';
    return;
  }

  const metric = compareSelectedMetrics[0];
  const rows = getCompareRankRows(dates, metric);
  const values = rows.map(r => r.value).sort((a, b) => a - b);
  const mid = Math.floor(values.length / 2);
  const median = values.length % 2 ? values[mid] : (values[mid - 1] + values[mid]) / 2;
  const metricName = METRIC_LABELS[metric] || metric;
  const topRows = rows.slice(0, 5);
  const bottomRows = rows.slice(-5).reverse();
  const periodText = `${displayDate(dates[0])} - ${displayDate(dates[dates.length - 1])}`;

  function list(title, items, cls) {
    return `<div class="insight-card">
      <div class="insight-title">${title}</div>
      ${items.map((x, i) => `<div class="insight-row">
        <span class="name">${i + 1}. ${escapeHtml(x.store)}</span>
        <span class="val ${cls || ''}">${fmtCompareValue(x.value, metric)}</span>
      </div>`).join('')}
    </div>`;
  }

  container.innerHTML = `
    <div class="compare-summary-header">
      <div class="compare-summary-title">${escapeHtml(metricName)}排名摘要</div>
      <div class="compare-summary-sub">${compareSelectedStores.length}家门店 · ${periodText}</div>
    </div>
    <div class="compare-summary-grid">
      ${list('前5', topRows, 'rank-top')}
      ${list('后5', bottomRows, 'rank-bottom')}
      <div class="median-box">
        <div class="median-label">中位数</div>
        <div class="median-value">${fmtCompareValue(median, metric)}</div>
      </div>
    </div>`;
}

function renderCompareChart(dates) {
  const chart = getChart('chart-compare-bar');
  if (!chart) return;
  if (compareSelectedMetrics.length === 0) {
    chart.clear();
    return;
  }

  // 柱状图只展示第一个指标，避免不同量纲混用同一张图导致差异失真。
  const sortMetric = compareSelectedMetrics[0];
  const chartMetric = compareSelectedMetrics[0];
  const sortedStores = [...compareSelectedStores].sort((a, b) => {
    const va = calcStoreAgg(dates, a, sortMetric);
    const vb = calcStoreAgg(dates, b, sortMetric);
    return vb - va;
  });

  const isP = isPct(chartMetric);
  const data = sortedStores.map(s => calcStoreValue(dates, s, chartMetric));
  const series = [{
    name: METRIC_LABELS[chartMetric] || chartMetric,
    type:'bar',
    data: data.map(v => isP ? Number((v*100).toFixed(1)) : Number(v.toFixed(0))),
    itemStyle:{color:CHART_COLORS[0]},
  }];
  const pctMax = isP ? Math.max(...data.map(v => v * 100), 1) * 1.2 : null;
  const chartSub = compareSelectedMetrics.length > 1 ? `图表仅展示：${METRIC_LABELS[chartMetric] || chartMetric}；其余指标见下方明细表` : '';

  chart.setOption({
    backgroundColor:'transparent',
    title: chartSub ? {show:true,text:chartSub,left:12,top:4,textStyle:{color:T.text,fontSize:11,fontWeight:'normal'}} : {show:false,text:''},
    tooltip:{...T.tip,trigger:'axis', formatter: p => p.map(pt=>`${pt.seriesName}: ${pt.value}${isP?'%':''}`).join('<br>')},
    legend:{data:[METRIC_LABELS[chartMetric]||chartMetric],textStyle:{color:T.text,fontSize:10},itemWidth:12,itemHeight:8,top:chartSub?24:5},
    xAxis:{type:'category',data:sortedStores,axisLine:{lineStyle:{color:T.axis}},axisLabel:{color:T.text,fontSize:10,rotate:15},splitLine:{show:false}},
    yAxis:{type:'value',max:isP?pctMax:null,axisLine:{show:false},splitLine:{lineStyle:{color:T.split}},axisLabel:{color:T.text,fontSize:10,formatter:v=>isP ? v+'%' : v}},
    series,
    grid:{left:50,right:20,top:chartSub?54:30,bottom:30}
  }, true);
}

function renderCompareTable(dates) {
  const cols = ['门店', ...compareSelectedMetrics.map(m => METRIC_LABELS[m]||m)];
  const thead = document.getElementById('compare-table-head');
  const tbody = document.getElementById('compare-table-body');
  thead.innerHTML = '<tr><th>门店</th>' + compareSelectedMetrics.map(m => `<th>${METRIC_LABELS[m]||m}</th>`).join('') + '</tr>';

  // 同柱状图一致，按第一个指标数值从高到低排序
  const sortMetric = compareSelectedMetrics[0];
  const sortedStores = [...compareSelectedStores].sort((a, b) => {
    const va = calcStoreAgg(dates, a, sortMetric);
    const vb = calcStoreAgg(dates, b, sortMetric);
    return vb - va;
  });
  const rows = sortedStores.map(store => {
    return [store, ...compareSelectedMetrics.map(m => {
      const v = calcStoreValue(dates, store, m);
      return isPct(m) ? fmtPct(v) : fmtY(v);
    })];
  });

  // 合计行: sum of calcStoreAgg across all stores for each metric
  const totalRow = ['合计', ...compareSelectedMetrics.map(m => {
    const rawTotal = compareSelectedStores.reduce((sum, s) => sum + calcStoreAgg(dates, s, m), 0);
    if (isPct(m)) {
      const avgVals = compareSelectedStores.map(s => calcStoreValue(dates, s, m));
      const mean = avgVals.reduce((a,b)=>a+b,0) / avgVals.length;
      return fmtPct(mean);
    }
    return isAvgMetric(m) ? fmtScore(rawTotal / compareSelectedStores.length) : fmtY(rawTotal);
  })];

  // 单店月均行: per-store per-month average
  const meanRow = ['单店月均', ...compareSelectedMetrics.map(m => {
    const isP = isPct(m);
    const storeVals = compareSelectedStores.map(s => calcStoreValue(dates, s, m));
    const mean = storeVals.reduce((a,b)=>a+b,0) / storeVals.length;
    const meanPerMonth = (isP || isAvgMetric(m)) ? mean : mean / dates.length;
    return isP ? fmtPct(meanPerMonth) : isAvgMetric(m) ? fmtScore(meanPerMonth) : fmtMean(meanPerMonth, m);
  })];

  tbody.innerHTML = rows.map(r => `<tr><td>${r[0]}</td>` + r.slice(1).map(v => `<td class="num">${v}</td>`).join('') + '</tr>').join('')
    + `<tr class="total-row"><td>${totalRow[0]}</td>` + totalRow.slice(1).map(v => `<td class="num">${v}</td>`).join('') + '</tr>'
    + `<tr class="total-row"><td>${meanRow[0]}</td>` + meanRow.slice(1).map(v => `<td class="num">${v}</td>`).join('') + '</tr>';
}

function exportCSV() {
  const start = document.getElementById('compare-start').value;

  const dates = DATES.filter(d => d >= start && d <= end);
  if (compareSelectedStores.length === 0) return;

  const sortMetric = compareSelectedMetrics[0];
  const sortedStores = [...compareSelectedStores].sort((a, b) => {
    const va = calcStoreAgg(dates, a, sortMetric);
    const vb = calcStoreAgg(dates, b, sortMetric);
    return vb - va;
  });
  const storeRows = sortedStores.map(store => {
    return [store, ...compareSelectedMetrics.map(m => {
      const v = calcStoreValue(dates, store, m);
      return isPct(m) ? (v*100).toFixed(1)+'%' : v.toFixed(1);
    })];
  });

  // 合计行
  const totalRow = ['合计', ...compareSelectedMetrics.map(m => {
    const rawTotal = compareSelectedStores.reduce((sum, s) => sum + calcStoreAgg(dates, s, m), 0);
    if (isPct(m)) {
      const avgVals = compareSelectedStores.map(s => calcStoreValue(dates, s, m));
      const mean = avgVals.reduce((a,b)=>a+b,0) / avgVals.length;
      return (mean*100).toFixed(1)+'%';
    }
    return isAvgMetric(m) ? (rawTotal / compareSelectedStores.length).toFixed(2) : rawTotal.toFixed(1);
  })];

  // 单店月均行
  const meanRow = ['单店月均', ...compareSelectedMetrics.map(m => {
    const isP = isPct(m);
    const storeVals = compareSelectedStores.map(s => calcStoreValue(dates, s, m));
    const mean = storeVals.reduce((a,b)=>a+b,0) / storeVals.length;
    const meanPerMonth = (isP || isAvgMetric(m)) ? mean : mean / dates.length;
    return isP ? (meanPerMonth*100).toFixed(1)+'%' : isAvgMetric(m) ? meanPerMonth.toFixed(2) : (MONEY_METRICS.has(m) ? meanPerMonth.toFixed(1) : Math.round(meanPerMonth).toString());

  const allRows = [...storeRows, totalRow, meanRow];
  const csv = [headers.map(csvCell).join(','), ...allRows.map(r => r.map(csvCell).join(','))].join('\n');

  a.click();
  URL.revokeObjectURL(a.href);
}

function getDailyStoreDates(store) {
  return [...new Set((ROOT_DATA?.daily?.data || [])
    .filter(record => record['门店'] === store)
    .map(record => record['日期']))].sort();
}

function getDetailTrendDates(store, selectedDates) {
  const period = document.getElementById('detail-period').value;
  const storeDates = DATA_GRAIN === 'monthly' ? getDailyStoreDates(store) : getStoreDates(store);
  if (DATA_GRAIN === 'monthly') {
    const selectedMonths = new Set(selectedDates.map(date => date.substring(0, 7)));
    const dailyTrendDates = storeDates.filter(date => selectedMonths.has(date.substring(0, 7)));
    return dailyTrendDates.length > 1 ? dailyTrendDates : selectedDates;
  }
  if (period !== 'day') return selectedDates;
  const end = selectedDates[selectedDates.length - 1] || storeDates[storeDates.length - 1];
  const endIndex = storeDates.indexOf(end);
  return endIndex >= 0 ? storeDates.slice(Math.max(0, endIndex - 6), endIndex + 1) : selectedDates;
}

function getDetailDates(store) {
  const period = document.getElementById('detail-period').value;
  const storeDates = getStoreDates(store);
  if (!storeDates.length) return [];

  if (period === 'day') {
    const value = document.getElementById('detail-day')?.value;
    return value ? storeDates.filter(d => d === value) : [storeDates[storeDates.length - 1]];
  }
  if (period === 'week') {
    const end = document.getElementById('detail-week-end')?.value || storeDates[storeDates.length - 1];
    const endIndex = storeDates.indexOf(end);
    return endIndex >= 0 ? storeDates.slice(Math.max(0, endIndex - 6), endIndex + 1) : [];
  }
  if (period === 'month') {
    const el = document.getElementById('detail-month');
    if (!el || !el.value) return storeDates;
    return DATA_GRAIN === 'daily' ? storeDates.filter(d => d.startsWith(el.value)) : [el.value];
  }
  if (period === 'quarter') {
    const y = document.getElementById('detail-q-year')?.value;
    const q = document.getElementById('detail-q-quarter')?.value;
    const months = {Q1:['01','02','03'], Q2:['04','05','06'], Q3:['07','08','09'], Q4:['10','11','12']}[q] || [];
    return storeDates.filter(d => d.startsWith(y+'-') && months.includes(d.substring(5,7)));
  }
  if (period === 'year') {
    const y = document.getElementById('detail-year')?.value;
    return storeDates.filter(d => d.startsWith(y+'-'));
  }
  if (period === 'range') {
    const from = document.getElementById('detail-from')?.value;
    const to = document.getElementById('detail-to')?.value;
    if (from && to) return storeDates.filter(d => d >= from && d <= to);
    return storeDates;
  }
  return storeDates;
}

function renderDetailKPIs(store, dates) {
  if (!dates.length) {
    document.getElementById('detail-kpi').innerHTML = `<div class="data-missing">该门店在所选周期内无数据记录</div>`;
    return;
  }
  const isAll = dates.length !== 1;

  // MoM & YoY only for single-month mode
  const singleDate = dates.length === 1 ? dates[0] : null;
  const dateParts = singleDate ? singleDate.split('-') : null;
  const prevMonth = dateParts ? (DATA_GRAIN === 'daily'
    ? shiftIsoDate(singleDate, -1)
    : ((parseInt(dateParts[1]) === 1 ? `${parseInt(dateParts[0])-1}-12` : `${dateParts[0]}-${String(parseInt(dateParts[1])-1).padStart(2,'0')}`) + '-01')) : '';
  const prevYearMonth = dateParts ? `${parseInt(dateParts[0])-1}-${dateParts[1]}-${DATA_GRAIN === 'daily' ? dateParts[2] : '01'}` : '';
  const prevRecord = dateParts ? (getRecord(prevMonth, store) || {}) : {};
  const pyRecord = dateParts ? (getRecord(prevYearMonth, store) || {}) : {};
  const foundRecord = !isAll ? getRecord(dates[0], store) : null;
  const noData = !isAll && !foundRecord;
  const curRecord = foundRecord || {};

  const getVal = m => {
    return calcStoreValue(dates, store, m);
  };
  const getPrevVal = m => calcStoreValue([prevMonth], store, m);
  const getPyVal = m => calcStoreValue([prevYearMonth], store, m);
  const getSum = m => calcStoreAgg(dates, store, m);
  const getPrevSum = m => calcStoreAgg([prevMonth], store, m);
  const getPySum = m => calcStoreAgg([prevYearMonth], store, m);
  const rechargeFraudAmount = getSum('美团刷单金额');
  const meituanVerificationSub = rechargeFraudAmount > 0
    ? `刷单金额 ${fmtYInt(rechargeFraudAmount)} 元`
    : '元';

  function renderDelta(current, prev, isP, label) {
    if (!prev || prev === 0) return null;
    const delta = (current - prev) / prev;
    const sign = delta > 0 ? '+' : '';
    const cls = delta > 0 ? 'up' : 'down';
    const arrow = delta > 0 ? '↑' : '↓';
    return `<div class="kpi-change ${cls}"><span class="arrow">${arrow}</span>${sign}${(delta*100).toFixed(1)}% <span style="font-size:9px;color:var(--text2)">${label}</span></div>`;

function renderCardGold(store, dates) {
  const consume = getStoreMonthlyData(store,'卡金',dates);
  const recharge = getStoreMonthlyData(store,'充值',dates);
  const labels = Object.keys(consume).sort();
  const hasData = (obj, d) => (obj[d] || 0) > 0;
  const glabels = labels.filter(d => hasData(consume,d) || hasData(recharge,d));

  // 消耗数据点：超标的大红点（带差额标签），正常的小绿点
  const seriesData1 = glabels.map(d => {
    const isWarn = safeNum(recharge[d]) < safeNum(consume[d]);
    const diff = safeNum(consume[d]) - safeNum(recharge[d]);
    return {
      value: consume[d],
      symbolSize: isWarn ? 12 : 3,
      itemStyle: { color: isWarn ? T.warn : T.mt },
      label: isWarn ? {
        show: true, position:'top', color:T.warn, fontSize:10,
        fontWeight:'bold',
        formatter: (diff >= 10000 ? (diff/10000).toFixed(1)+'万' : diff.toFixed(0)) + ''
      } : undefined
    };
  });

  const chart = getChart('chart-detail-cardgold');

  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{...T.tip,trigger:'axis',formatter:p=>`${p[0].name}<br>${p[0].seriesName}: ${p[0].value.toLocaleString('zh-CN')}<br>${p[1].seriesName}: ${p[1].value.toLocaleString('zh-CN')}`},
    legend:{data:['卡金消耗','充值'],textStyle:{color:T.text,fontSize:10},itemWidth:12,itemHeight:8,top:5},

function activateTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
  setTimeout(() => {
    const activeTab = document.querySelector('.tab-content.active');
    if (!activeTab) return;
    activeTab.querySelectorAll('.chart').forEach(el => {
      const instance = echarts.getInstanceByDom(el);
      if (instance) instance.resize();
    });
  }, 50);
}

function openStoreDetail(store) {
  const select = document.getElementById('detail-store');
  if (!select || !STORES.includes(store)) return;
  select.value = store;
  select.dispatchEvent(new Event('change'));
  activateTab('detail');
  const searchInput = document.getElementById('global-search-input');
  if (searchInput) searchInput.value = '';
  closeGlobalSearch();
}

function normalizeSearch(value) {
  return String(value || '').toLowerCase().replace(/加盟|门店|店|市|区|县|\s/g, '');
}

function closeGlobalSearch() {
  const results = document.getElementById('global-search-results');
  if (results) results.classList.remove('open');
}

function renderGlobalSearch(query) {
  const results = document.getElementById('global-search-results');
  if (!results) return;
  const q = normalizeSearch(query);
  if (!q) {
    results.classList.remove('open');
    results.innerHTML = '';
    return;
  }
  const matches = [...STORES]
    .sort((a, b) => STORE_ORDER.indexOf(a) - STORE_ORDER.indexOf(b))
    .filter(store => normalizeSearch(store).includes(q))
    .slice(0, 8);
  results.innerHTML = matches.length
    ? matches.map(store => `<button class="search-result" type="button" onclick="openStoreDetail('${jsString(store)}')"><span>${escapeHtml(store)}</span><small>查看单店详情 →</small></button>`).join('')
    : '<div class="search-empty">未找到匹配门店，试试城市名或门店简称</div>';
  results.classList.add('open');
}

function initGlobalSearch() {
  const input = document.getElementById('global-search-input');
  if (!input) return;
  input.addEventListener('input', () => renderGlobalSearch(input.value));
  input.addEventListener('focus', () => { if (input.value) renderGlobalSearch(input.value); });
  input.addEventListener('keydown', event => {
    if (event.key === 'Escape') { input.value = ''; closeGlobalSearch(); input.blur(); }
    if (event.key === 'Enter') {
      const q = normalizeSearch(input.value);
      const match = STORES.find(store => normalizeSearch(store).includes(q));
      if (match) openStoreDetail(match);
    }
  });
  document.addEventListener('keydown', event => {
    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
      event.preventDefault();
      input.focus();
      input.select();
    }
  });
  document.addEventListener('click', event => {
    if (!event.target.closest('.global-search')) closeGlobalSearch();
  });
}

function setupTabListeners() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activateTab(tab.dataset.tab);
    });
  });
  window.addEventListener('resize', () => {
    document.querySelectorAll('.chart').forEach(el => {
      const instance = echarts.getInstanceByDom(el);
      if (instance) instance.resize();
    });
  });
}

// ============================================================
// 数据自动刷新（每60秒检查 JSON 是否更新）
// ============================================================
let _lastDataHash = '';
function hashData(obj) { return JSON.stringify(obj).length + '_' + (obj.dates||[]).length; }
setInterval(() => {
  fetch('dashboard_data.json?t=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (!data) return;
      const h = hashData(data);
      if (!_lastDataHash) { _lastDataHash = h; return; }
      if (h !== _lastDataHash) {
        _lastDataHash = h;
        ROOT_DATA = data;
        const selected = DATA_GRAIN === 'monthly'
          ? prepareMonthlyViewData(data)
          : (data[DATA_GRAIN] || data.monthly || data);
        ALL_DATA = { ...data, ...selected };
        STORES = data.stores || selected.stores || [];
        DATES = selected.dates || [];
        METRICS = selected.metrics || [];
        buildIndex();
        renderOverview();
        renderCompare();
        renderDetail();
        console.log('[auto-refresh] 数据已更新');
      }
    })
    .catch(() => {});
}, 60000);
</script>
</body>
</html>
