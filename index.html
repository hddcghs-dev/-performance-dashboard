<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民德搓澡堂 · 经营数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --gold: #d4a843;
  --gold2: #f0c860;
  --blue: #4a9eff;
  --green: #3fb950;
  --red: #f85149;
  --purple: #a371f7;
  --orange: #f0883e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
  white-space: nowrap;
}
.tabs {
  display: flex;
  gap: 4px;
}
.tab {
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text2);
  background: transparent;
  border: none;
  transition: all 0.2s;
}
.tab:hover { color: var(--text); background: var(--card2); }
.tab.active { color: var(--gold); background: rgba(212,168,67,0.15); }

/* Filter bar */
.filter-bar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-label {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
select, button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
}
button {
  cursor: pointer;
  background: rgba(212,168,67,0.15);
  border-color: var(--gold);
  color: var(--gold);
}
button:hover { background: rgba(212,168,67,0.25); }

/* Main layout */
.main { padding: 16px 24px; }

/* KPI cards */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}
.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.kpi-label {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 4px;
}
.kpi-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}
.kpi-value.gold { color: var(--gold); }
.kpi-value.green { color: var(--green); }
.kpi-value.red { color: var(--red); }
.kpi-change {
  font-size: 11px;
  margin-top: 2px;
}
.kpi-change.up { color: var(--green); }
.kpi-change.down { color: var(--red); }
.kpi-change .arrow { font-size: 10px; }
.kpi-sub { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* KPI section collapse */
.kpi-section { margin-bottom: 12px; }
.kpi-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  font-size: 11px; color: var(--text2);
  user-select: none;
}
.kpi-section-body {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px; padding: 10px;
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 8px 8px;
}

/* Chart grid */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.chart-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.chart-card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.chart { height: 280px; }
.chart-sm { height: 220px; }

/* Table */
.table-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  background: rgba(255,255,255,0.02);
  color: var(--text2);
  font-weight: 500;
  text-align: right;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
}
th:first-child { text-align: left; }
td {
  padding: 7px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  text-align: right;
  color: var(--text);
}
td:first-child { text-align: left; color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.03); }
.num { font-variant-numeric: tabular-nums; }
.total-row td {
  font-weight: 700;
  background: rgba(212,168,67,0.08);
  color: var(--gold);
}
.red { color: var(--red); }
.green { color: var(--green); }
.gold { color: var(--gold); }

/* Section title */
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  padding: 8px 0;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Store detail header */
.store-selector {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
  display: flex;
  gap: 16px;
  align-items: center;
}
.store-selector select { font-size: 14px; padding: 8px 14px; min-width: 180px; }
.store-export { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* Multi-select dropdown */
.dropdown {
  position: relative;
  display: inline-block;
}
.dropdown-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  min-width: 160px;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.dropdown-btn:hover { border-color: var(--gold); }
.dropdown-content {
  display: none;
  position: absolute;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-width: 220px;
  max-height: 320px;
  overflow-y: auto;
  z-index: 1000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.dropdown.open .dropdown-content { display: block; }
.dropdown-item {
  padding: 8px 14px;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.dropdown-item:hover { background: rgba(212,168,67,0.1); }
.dropdown-item input[type=checkbox] { accent-color: var(--gold); }
.dropdown-footer {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.dropdown-footer button {
  font-size: 11px;
  padding: 3px 8px;
  flex: 1;
}

/* Tab content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Metric tags - color coded */
.metric-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 6px 0;
}
.metric-tag {
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 11px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: default;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.metric-tag:hover { opacity: 0.85; }
.metric-tag .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.metric-tag .remove {
  font-size: 13px;
  line-height: 1;
  opacity: 0;
  cursor: pointer;
  margin-left: 2px;
  transition: opacity 0.15s;
  color: inherit;
}
.metric-tag:hover .remove { opacity: 0.7; }
.metric-tag .remove:hover { opacity: 1; }
.metric-tag.empty { color: var(--text2); font-style: italic; cursor: default; border: none; background: none; }

/* Metric group */
.metric-group {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.metric-group-header {
  background: rgba(255,255,255,0.02);
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text2);
  cursor: default;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.metric-group-items {
  padding: 6px;
}
.metric-item {
  padding: 5px 8px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text2);
}
.metric-item:hover { background: rgba(212,168,67,0.1); color: var(--text); }
.metric-item input[type=checkbox] { accent-color: var(--gold); }
.metric-item.selected { color: var(--gold); }

/* Score badge */
.score-badge {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.score-high { background: rgba(63,185,80,0.2); color: var(--green); }
.score-mid { background: rgba(240,140,62,0.2); color: var(--orange); }
.score-low { background: rgba(248,81,73,0.2); color: var(--red); }

/* Preset buttons */
.presets { display:flex; gap:4px; }
.preset-btn {
  padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer;
  background:var(--card2); border:1px solid var(--border); color:var(--text2);
  transition:all 0.2s;
}
.preset-btn:hover { border-color:var(--gold); color:var(--text); }
.preset-btn.active { background:rgba(212,168,67,0.2); border-color:var(--gold); color:var(--gold); }
.preset-btn .badge { font-size:9px; color:var(--text2); margin-left:3px; }

/* Store search */
.store-search {
  position:sticky; top:0; z-index:2; padding:8px 10px;
  background:var(--card2); border-bottom:1px solid var(--border);
}
.store-search input {
  width:100%; padding:5px 10px; border-radius:6px; font-size:12px;
  background:var(--card); border:1px solid var(--border); color:var(--text);
  outline:none; box-sizing:border-box;
}
.store-search input:focus { border-color:var(--gold); }
.store-search input::placeholder { color:var(--text2); }

/* Export button */
.export-btn {
  padding:5px 12px; border-radius:6px; font-size:11px; cursor:pointer;
  background:rgba(74,158,255,0.15); border:1px solid var(--blue); color:var(--blue);
  transition:all 0.2s; margin-left:auto;
}
.export-btn:hover { background:rgba(74,158,255,0.25); }

/* Data quality indicators */
.data-missing {
  background:rgba(248,81,73,0.08); border:1px solid rgba(248,81,73,0.3);
  border-radius:8px; padding:10px 14px; color:var(--red); font-size:12px;
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.kpi-card.no-data { opacity:0.4; }

/* Alerts section */
.alert-section {
  margin-top: 16px;
  border: 1px solid var(--red);
  border-radius: 10px;
  background: rgba(248,81,73,0.05);
  overflow: hidden;
}
.alert-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: rgba(248,81,73,0.1);
  color: var(--red);
  font-size: 13px; font-weight: 600;
  border-bottom: 1px solid rgba(248,81,73,0.15);
}
.alert-body { padding: 12px 16px; }
.alert-group { margin-bottom: 14px; }
.alert-group:last-child { margin-bottom: 0; }
.alert-group-title {
  font-size: 12px; font-weight: 600;
  color: var(--orange);
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.alert-store {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  background: rgba(255,255,255,0.03);
  margin-bottom: 4px;
}
.alert-store:last-child { margin-bottom: 0; }
.alert-store .name { color: var(--text); font-weight: 500; min-width: 80px; }
.alert-store .val { color: var(--red); font-weight: 600; min-width: 60px; text-align: right; }
.alert-store .detail { color: var(--text2); font-size: 11px; }
.alert-none {
  color: var(--green); font-size: 12px;
  padding: 8px 0; text-align: center;
}

/* Freshness badge */
.freshness {
  font-size:11px; color:var(--text2); margin-left:auto; white-space:nowrap;
}

@media (max-width: 900px) {
  .chart-grid, .chart-grid-3 { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .header { align-items: flex-start; flex-direction: column; gap: 10px; padding: 12px 14px; }
  .tabs { width: 100%; overflow-x: auto; }
  .filter-bar { padding: 10px 14px; align-items: stretch; }
  .filter-group { width: 100%; justify-content: space-between; }
  .filter-group select, .dropdown { flex: 1; min-width: 0; }
  .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .chart { height: 240px; }
  .table-card { overflow-x: auto; }
}
</style>
</head>
<body>

<div class="header">
  <h1>民德搓澡堂 · 经营数据看板</h1>
  <div class="tabs">
    <button class="tab active" data-tab="overview">整体概览</button>
    <button class="tab" data-tab="compare">门店对比</button>
    <button class="tab" data-tab="detail">单店详情</button>
  </div>
  <span class="freshness" id="freshness-badge">加载中...</span>
</div>

<!-- ==================== 整体概览 ==================== -->
<div id="tab-overview" class="tab-content active">

  <div class="filter-bar">
    <div class="presets" id="preset-btns">
      <button class="preset-btn" data-preset="latestMonth">最近一月</button>
      <button class="preset-btn" data-preset="latestQuarter">最近一季</button>
      <button class="preset-btn" data-preset="ytd">今年</button>
      <button class="preset-btn active" data-preset="all">全部</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">年份</span>
      <select id="filter-year"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">月份</span>
      <select id="filter-month"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">指标</span>
      <div class="dropdown" id="trend-metric-dropdown">
        <div class="dropdown-btn" id="trend-metric-btn" onclick="toggleDropdown('trend-metric-dropdown')">
          <span id="trend-metric-count">选择指标（可多选）</span>
          <span style="font-size:10px;">▼</span>
        </div>
        <div class="dropdown-content" id="trend-metric-list"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="kpi-grid" id="overview-kpi"></div>
    <div class="chart-grid">
      <div class="chart-card" style="grid-column:1/-1;">
        <div class="chart-card-title" id="trend-chart-title">趋势图</div>
        <div style="margin-bottom:8px;" id="trend-metric-tags"></div>
        <div class="chart" id="chart-trend" style="height:280px;"></div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-card-title">营业结构</div>
        <div class="chart" id="chart-revenue-pie" style="height:260px;"></div>
        <div id="revenue-check" style="font-size:10px;color:var(--text2);text-align:center;padding:0 10px 8px;"></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">项目占比</div>
        <div class="chart" id="chart-project-pie"></div>
      </div>
    </div>
    <div id="overview-alerts"></div>
  </div>
</div>

<!-- ==================== 门店对比 ==================== -->
<div id="tab-compare" class="tab-content">

  <div class="filter-bar">
    <div class="presets" id="compare-preset-btns">
      <button class="preset-btn active" data-preset="latestMonth" onclick="setComparePreset('latestMonth')">最近一月</button>
      <button class="preset-btn" data-preset="latestQuarter" onclick="setComparePreset('latestQuarter')">最近一季</button>
      <button class="preset-btn" data-preset="ytd" onclick="setComparePreset('ytd')">今年</button>
      <button class="preset-btn" data-preset="all" onclick="setComparePreset('all')">全部</button>
    </div>
    <div class="filter-group">
      <span class="filter-label">门店</span>
      <div class="dropdown" id="compare-store-dropdown">
        <div class="dropdown-btn" id="compare-store-btn" onclick="toggleDropdown('compare-store-dropdown')">
          <span id="compare-store-count">选择门店</span>
          <span style="font-size:10px;">▼</span>
        </div>
        <div class="dropdown-content" id="compare-store-list"></div>
      </div>
    </div>
    <div class="filter-group">
      <span class="filter-label">起始月</span>
      <select id="compare-start"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">截止月</span>
      <select id="compare-end"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">指标</span>
      <div class="dropdown" id="compare-metric-dropdown">
        <div class="dropdown-btn" id="compare-metric-btn" onclick="toggleDropdown('compare-metric-dropdown')">
          <span id="compare-metric-count">选择指标</span>
          <span style="font-size:10px;">▼</span>
        </div>
        <div class="dropdown-content" id="compare-metric-list" style="min-width:260px;"></div>
      </div>
    </div>
    <button onclick="compareRestoreDefault()">恢复默认</button>
  </div>

  <div class="main">
    <div id="compare-metric-tags" class="metric-tags"></div>

    <div class="kpi-grid" id="compare-kpi"></div>
    <div class="chart-card" style="margin-bottom:16px;">
      <div class="chart-card-title">门店对比柱状图</div>
      <div class="chart" id="chart-compare-bar"></div>
    </div>
    <div class="table-card">
      <div class="chart-card-title" style="display:flex;align-items:center;gap:8px;">
        <span>对比数据明细</span>
        <button class="export-btn" onclick="exportCSV()">导出CSV</button>
      </div>
      <div style="max-height:400px;overflow-y:auto;">
        <table>
          <thead id="compare-table-head"></thead>
          <tbody id="compare-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ==================== 单店详情 ==================== -->
<div id="tab-detail" class="tab-content">

  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">门店</span>
      <select id="detail-store"></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">月份</span>
      <select id="detail-month"></select>
    </div>
    <button class="export-btn" onclick="detailExportCSV()" style="margin-left:auto;">导出CSV</button>
  </div>

  <div class="main">
    <div class="kpi-grid" id="detail-kpi"></div>

    <div class="chart-grid">
      <div class="chart-card"><div class="chart-card-title">营业结构</div><div class="chart" id="chart-detail-revenue-pie"></div></div>
      <div class="chart-card"><div class="chart-card-title">项目占比</div><div class="chart" id="chart-detail-project-pie"></div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-card-title">各月营业额趋势</div><div class="chart" id="chart-detail-revenue-trend"></div></div>
      <div class="chart-card"><div class="chart-card-title">项目数趋势</div><div class="chart" id="chart-detail-project-trend"></div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-card-title">评论与差评趋势</div><div class="chart" id="chart-detail-comment-trend"></div></div>
      <div class="chart-card"><div class="chart-card-title">线上流量趋势</div><div class="chart" id="chart-detail-traffic-trend"></div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-card-title">转化率趋势</div><div class="chart" id="chart-detail-convert-trend"></div></div>
      <div class="chart-card"><div class="chart-card-title">新客占比趋势</div><div class="chart" id="chart-detail-new-customer"></div></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">卡金消耗 vs 充值</div>
      <div class="chart" id="chart-detail-cardgold"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 数据加载
// ============================================================
let ALL_DATA = {};
let STORES = [];

function toggleDropdown(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.classList.contains('open');

  if (!isOpen) el.classList.add('open');
}
function closeAllDropdowns() {

function renderTrendMetricDropdown() {
  const container = document.getElementById('trend-metric-list');
  if (!container) return;
  container.innerHTML = Object.entries(METRIC_GROUPS).map(([grp, metrics]) => `
    <div class="metric-group">
      <div class="metric-group-header">${escapeHtml(grp)}</div>
      <div class="metric-group-items">
        ${metrics.map(m => `
          <div class="metric-item ${trendSelectedMetrics.includes(m)?'selected':''}" data-metric="${escapeHtml(m)}">
            <input type="checkbox" ${trendSelectedMetrics.includes(m)?'checked':''} onclick="event.stopPropagation();trendToggleMetric('${jsString(m)}',this.parentElement)">
            ${escapeHtml(METRIC_LABELS[m]||m)}
          </div>`).join('')}
      </div>
    </div>`).join('');
  renderTrendMetricTags();
}

function trendToggleMetric(m, el) {
  const idx = trendSelectedMetrics.indexOf(m);
  if (idx >= 0) { trendSelectedMetrics.splice(idx,1); }
  else { trendSelectedMetrics.push(m); }
  renderTrendMetricDropdown();
  renderTrendChart(getFilteredDates(), trendSelectedMetrics);
  // Update chart title
  const title = document.getElementById('trend-chart-title');
  if (title) {
    title.textContent = trendSelectedMetrics.length > 0
      ? trendSelectedMetrics.map(mm=>METRIC_LABELS[mm]||mm).join(' / ')
      : '趋势图';
  }
}

function trendRemoveMetric(m) {
  trendSelectedMetrics = trendSelectedMetrics.filter(x=>x!==m);
  renderTrendMetricDropdown();
  renderTrendChart(getFilteredDates(), trendSelectedMetrics);
}

function renderTrendMetricTags() {
  const tagsEl = document.getElementById('trend-metric-tags');
  if (!tagsEl) return;
  if (trendSelectedMetrics.length === 0) {
    tagsEl.innerHTML = '<span class="metric-tag empty">请在下方选择指标</span>';
  } else {
    tagsEl.innerHTML = trendSelectedMetrics.map((m, i) => {
      const c = CHART_COLORS[i % CHART_COLORS.length];
      return `<span class="metric-tag" id="trend-tag-${m.replace(/[^a-zA-Z0-9]/g,'_')}" style="background:${c}15;border-color:${c}40;color:${c}">
        <span class="dot" style="background:${c}"></span>${escapeHtml(METRIC_LABELS[m]||m)}
        <span class="remove" onclick="trendRemoveMetric('${jsString(m)}')">×</span>
      </span>`;
    }).join('');
  }
  const btn = document.getElementById('trend-metric-count');
  if (btn) {
    btn.textContent = trendSelectedMetrics.length === 0 ? '选择指标（可多选）'
      : trendSelectedMetrics.length <= 2 ? trendSelectedMetrics.map(mm=>METRIC_LABELS[mm]||mm).join(', ')
      : `已选${trendSelectedMetrics.length}个指标`;
  }
}

function getRecord(date, store) {
  return ALL_DATA.data.find(r => r['日期'] === date && r['门店'] === store);
}

function safeNum(v) {
  if (v == null || v === '' || v === undefined) return 0;
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}
function metricField(m) { return FIELD_MAP[m] || m; }
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}
function jsString(value) {
  return String(value)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\r/g, '\\r')
    .replace(/\n/g, '\\n');
}
function csvCell(value) {
  const s = value == null ? '' : String(value);
  return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

// 数据索引
let IDX_BY_DATE = {};  // date→[{record}]
let IDX_BY_DS = {};    // date_store→record
let LATEST_DATE = '';
function buildIndex() {
  IDX_BY_DATE = {};
  IDX_BY_DS = {};
  ALL_DATA.data.forEach(r => {
    const d = r['日期'], s = r['门店'];
    if (!IDX_BY_DATE[d]) IDX_BY_DATE[d] = [];
    IDX_BY_DATE[d].push(r);
    IDX_BY_DS[d + '_' + s] = r;
  });
  LATEST_DATE = [...DATES].sort().pop() || '';
  // Update freshness badge
  const badge = document.getElementById('freshness-badge');
  if (badge && LATEST_DATE) {
    const ym = LATEST_DATE.substring(0,7).replace('-','年');
    badge.textContent = '数据截止: ' + ym + '月';
  }
}

// 预设日期覆盖（非null时覆盖 getFilteredDates 的返回值）
let presetDates = null;
function setPreset(name) {
  const btns = document.querySelectorAll('#preset-btns .preset-btn');
  btns.forEach(b => b.classList.toggle('active', b.dataset.preset === name));
  const sorted = [...DATES].sort();
  switch (name) {
    case 'latestMonth': presetDates = [sorted[sorted.length - 1]]; break;
    case 'latestQuarter': presetDates = sorted.slice(-3); break;
    case 'ytd':
      presetDates = sorted.filter(d => d.startsWith(sorted[sorted.length-1].substring(0,4)));
      break;
    default: presetDates = null; break;
  }
  // Sync year/month selects to match preset for visual consistency
  const yearSel = document.getElementById('filter-year');
  const monthSel = document.getElementById('filter-month');
  if (presetDates) {
    yearSel.value = 'all';
    monthSel.value = '';
    monthSel.disabled = true;
  } else {
    monthSel.disabled = false;
  }
  renderOverview();
}
// Preset button click handlers
document.addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (btn) setPreset(btn.dataset.preset);
});

// 获取上一周期日期（同长度）
function getPrevDates(dates) {
  if (!dates || dates.length === 0) return [];
  const sorted = [...DATES].sort();
  const curStart = sorted.indexOf(dates[0]);
  if (curStart <= 0) return [];
  const prevStart = Math.max(0, curStart - dates.length);
  return sorted.slice(prevStart, curStart);
}

// 格式化函数族
function fmtY(n) {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString('zh-CN');
}
function fmtN(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('zh-CN');
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (Number(n)*100).toFixed(1) + '%';
}
function fmtScore(n) {
  if (n == null || isNaN(n) || Number(n) === 0) return '—';
  return Number(n).toFixed(1);
}

function initFilters() {
  const years = [...new Set(DATES.map(d => d.substring(0,4)))].sort();
  const yearSelect = document.getElementById('filter-year');
  yearSelect.innerHTML = '<option value="all">全部时间</option>';
  years.forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}年</option>`);

  const monthSelect = document.getElementById('filter-month');
  monthSelect.innerHTML = '<option value="">全部月份</option>';
  for (let m = 1; m <= 12; m++) {
    monthSelect.innerHTML += `<option value="${String(m).padStart(2,'0')}">${m}月</option>`;
  }

  document.getElementById('filter-year').onchange = () => {
    const y = document.getElementById('filter-year').value;
    monthSelect.disabled = (y === 'all');
    if (y === 'all') monthSelect.value = '';
    renderOverview();
  };
  document.getElementById('filter-month').onchange = renderOverview;

  // 初始化趋势指标多选下拉
  renderTrendMetricDropdown();

  // 单店月份（智能筛选：只显示该门店有数据的月份）
  const dm = document.getElementById('detail-month');
  const storeSelect = document.getElementById('detail-store');
  const sortedStores = [...STORES].sort((a, b) => {
    const ia = STORE_ORDER.indexOf(a);
    const ib = STORE_ORDER.indexOf(b);
    return ia - ib;
  });

  function updateDetailMonths(store) {
    const storeDates = [...new Set(
      ALL_DATA.data.filter(r => r['门店'] === store).map(r => r['日期'])
    )].sort((a, b) => b.localeCompare(a));
    const prevVal = dm.value;
    dm.innerHTML = '';
    storeDates.forEach(d => {
      const label = d.substring(0,7).replace('-','年')+'月';
      dm.innerHTML += `<option value="${d}">${label}</option>`;
    });
    // Keep previous selection if valid, else default to latest
    if (storeDates.includes(prevVal)) {
      dm.value = prevVal;
    }
  }

  sortedStores.forEach(s => {
    storeSelect.innerHTML += `<option value="${s}">${s}</option>`;
  });

  storeSelect.onchange = () => {
    updateDetailMonths(storeSelect.value);
    renderDetail();
  };
  dm.onchange = () => renderDetail();

  // Initialize with first store's months
  if (sortedStores.length > 0) {
    updateDetailMonths(sortedStores[0]);
  }
  renderDetail();
}

function getFilteredDates() {
  if (presetDates) return presetDates;
  const year = document.getElementById('filter-year').value;
  const month = document.getElementById('filter-month').value;
  if (year === 'all') return DATES;
  let dates = DATES.filter(d => d.startsWith(year));
  if (month) dates = dates.filter(d => d.substring(5,7) === month);
  return dates;
}

function calcTotal(dates, metric) {
  const f = metricField(metric);
  let sum = 0;
  dates.forEach(d => {
    (IDX_BY_DATE[d] || []).forEach(r => sum += safeNum(r[f]));
  });
  return sum;
}

function calcStoreAgg(dates, store, metric) {
  const f = metricField(metric);
  let sum = 0;
  dates.forEach(d => {
    const r = IDX_BY_DS[d + '_' + store];
    if (r) sum += safeNum(r[f]);
  });
  return sum;
}
function getStoreDataDates(dates, store) {
  return dates.filter(d => IDX_BY_DS[d + '_' + store]);
}
function calcStoreAvg(dates, store, metric) {
  const dataDates = getStoreDataDates(dates, store);
  if (dataDates.length === 0) return 0;
  return calcStoreAgg(dataDates, store, metric) / dataDates.length;
}

function getMonthlyData(dates, metric) {
  const f = metricField(metric);
  const monthly = {};
  dates.forEach(d => monthly[d] = 0);
  ALL_DATA.data.forEach(r => {
    if (dates.includes(r['日期'])) {
      monthly[r['日期']] = (monthly[r['日期']] || 0) + safeNum(r[f]);
    }
  });
  return monthly;
}

function getStoreMonthlyData(store, metric, dates) {
  const f = metricField(metric);
  const result = {};
  dates.forEach(d => result[d] = 0);
  ALL_DATA.data.forEach(r => {
    if (r['门店']===store && dates.includes(r['日期'])) {
      result[r['日期']] = safeNum(r[f]);
    }
  });
  return result;
}

function renderOverview() {
  const dates = getFilteredDates();
  renderOverviewKPIs(dates);
  renderTrendChart(dates, trendSelectedMetrics);
  renderPieCharts(dates);
  renderOverviewAlerts(dates);
}

function renderOverviewKPIs(dates) {
  const container = document.getElementById('overview-kpi');
  const prev = getPrevDates(dates);
  const hasPrev = prev.length > 0;

  function calcMoM(cur, metric) {
    if (!hasPrev) return '';
    const pv = calcTotal(prev, metric);
    if (!pv) return '';
    const chg = (cur - pv) / pv;
    const arrow = chg >= 0 ? '↑' : '↓';
    const isBad = metric === '综合新增差评' || metric === '差评率';
    const colorCls = (chg >= 0) ? (isBad ? 'down' : 'up') : (isBad ? 'up' : 'down');
    return `<div class="kpi-change ${colorCls}"><span class="arrow">${arrow}</span>${(chg*100).toFixed(1)}%</div>`;
  }

  const totalRev = calcTotal(dates,'服务营业额');
  const totalFree = calcTotal(dates,'免单减免');
  const totalProjects = calcTotal(dates,'项目数');
  const totalComments = calcTotal(dates,'综合新增评论');
  const totalBad = calcTotal(dates,'综合新增差评');
  const badRate = totalComments > 0 ? totalBad/totalComments : 0;
  const dyRedeemAmt = calcTotal(dates,'抖音核销金额');
  const mtRedeemAmt = calcTotal(dates,'美团核销金额');
  // 新客占比 = 核销新客 / (核销新客+核销老客)，用总数算避免平均各店比率
  const totalNewCust = calcTotal(dates,'核销新客数');
  const totalOldCust = calcTotal(dates,'核销老客数');
  const newRate = (totalNewCust + totalOldCust) > 0 ? totalNewCust / (totalNewCust + totalOldCust) : 0;

  // 评分只取最新月份（所有门店均值）
  const sortedAllDates = [...DATES].sort();
  const latestDate = sortedAllDates[sortedAllDates.length - 1];
  const latestRecs = IDX_BY_DATE[latestDate] || [];
  const latestCount = latestRecs.length || 1;
  const dyScore = latestRecs.reduce((s, r) => s + safeNum(r['抖音评分']), 0) / latestCount;
  const mtScore = latestRecs.reduce((s, r) => s + safeNum(r['美团评分']), 0) / latestCount;

  const kpis = [
    { label:'服务营业额', val:fmtY(totalRev), raw:totalRev, color:'gold', m:'服务营业额' },
    { label:'免单减免', val:fmtY(totalFree), raw:totalFree, color: totalFree>0?'red':'', m:'免单减免' },
    { label:'总项目数', val:fmtN(totalProjects), raw:totalProjects, color:'', m:'项目数' },
    { label:'综合新增评论', val:fmtN(totalComments), raw:totalComments, color:'green', m:'综合新增评论' },
    { label:'综合新增差评', val:fmtN(totalBad), raw:totalBad, color:'red', m:'综合新增差评' },
    { label:'差评率', val:fmtPct(badRate), raw:badRate, color: badRate>0.05?'red':'', m:null },
    { label:'抖音核销金额', val:fmtY(dyRedeemAmt), raw:dyRedeemAmt, color:'', m:'抖音核销金额' },
    { label:'美团核销金额', val:fmtY(mtRedeemAmt), raw:mtRedeemAmt, color:'', m:'美团核销金额' },
    { label:'新客占比', val:fmtPct(newRate), raw:newRate, color:'', m:null },
    { label:'抖音评分', val:fmtScore(dyScore), raw:dyScore, sub:latestDate.substring(0,7).replace('-','年')+'月', color: Number(dyScore)>4.5?'green':'', m:null },
    { label:'美团评分', val:fmtScore(mtScore), raw:mtScore, sub:latestDate.substring(0,7).replace('-','年')+'月', color: Number(mtScore)>4.5?'green':'', m:null },
  ];
  container.innerHTML = kpis.map(it => `
    <div class="kpi-card">
      <div class="kpi-label">${it.label}</div>
      <div class="kpi-value ${it.color}">${it.val}</div>
      ${it.sub ? `<div class="kpi-sub">${it.sub}</div>` : ''}
      ${it.m && hasPrev ? calcMoM(it.raw, it.m) : ''}
    </div>`).join('');
}

function renderTrendChart(dates, metrics) {
  const chart = getChart('chart-trend');
  if (!chart) return;
  const labels = dates.map(d => d.substring(5,7)+'月');

  const series = metrics.map((m, i) => {
    const monthly = getMonthlyData(dates, m);
    const values = dates.map(d => monthly[d] || 0);
    const pctFlag = isPct(m);
    return {
      name: METRIC_LABELS[m]||m,
      data: values,
      type:'line', smooth:true,
      yAxisIndex: pctFlag ? 1 : 0,
      lineStyle:{color:CHART_COLORS[i % CHART_COLORS.length], width:2},
      itemStyle:{color:CHART_COLORS[i % CHART_COLORS.length]},
      areaStyle: !pctFlag ? {color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:CHART_COLORS[i % CHART_COLORS.length]+'40'},{offset:1,color:CHART_COLORS[i % CHART_COLORS.length]+'00'}]}} : null
    };
  });

  const hasPct = metrics.some(m=>isPct(m));
  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',formatter:p=>p.map(x=>`${x.seriesName}: ${x.value.toLocaleString('zh-CN')}`).join('<br>')},
    legend:{data:metrics.map(m=>METRIC_LABELS[m]||m),textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8,top:0},
    xAxis:{type:'category',data:labels,axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:10},splitLine:{show:false}},
    yAxis:[
      {type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:10},name:'',nameTextStyle:{show:false}},
      hasPct ? {type:'value',axisLine:{show:false},splitLine:{show:false},axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>(v*100).toFixed(0)+'%'},position:'right',offset:0} : null
    ].filter(y=>y!==null),
    series,
    grid:{left:60,right:hasPct?60:30,top:30,bottom:40}
  }, true);
}

    backgroundColor:'transparent',
    tooltip:{formatter:p=>`${p.name}: ${p.value.toLocaleString('zh-CN')} (${p.percent.toFixed(1)}%) · 占服务营业额 ${(p.value/svcTotal*100).toFixed(1)}%`},

function renderOverviewAlerts(dates) {
  const container = document.getElementById('overview-alerts');
  if (!container || dates.length !== 1) {
    if (container) container.innerHTML = '';
    return;
  }

  const date = dates[0];
  const records = IDX_BY_DATE[date] || [];
  if (records.length === 0) { container.innerHTML = ''; return; }

  const stores = STORE_ORDER.filter(s => records.some(r => r['门店'] === s));
  if (stores.length === 0) { container.innerHTML = ''; return; }

  // 1) 评分低于4.3
  const scoreWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const dy = safeNum(r['抖音评分']);
    const mt = safeNum(r['美团评分']);
    if (dy > 0 && dy < 4.3) scoreWarns.push({ store:s, platform:'抖音', score:dy });
    if (mt > 0 && mt < 4.3) scoreWarns.push({ store:s, platform:'美团', score:mt });
  });

  // 2) 差评率 > 3%
  const badRateWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const rate = safeNum(r['差评率']);
    const totalNewBad = safeNum(r['综合新增差评']);
    if (rate > 0.03) badRateWarns.push({
      store:s, rate, bad:totalNewBad,
      dyTotal:safeNum(r['抖音总评论数']), dyBad:safeNum(r['抖音总中差评数']),
      mtTotal:safeNum(r['美团总评价数']), mtBad:safeNum(r['美团总差评数'])
    });
  });

  // 3) 新增差评 > 5
  const badCountWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const bad = safeNum(r['综合新增差评']);
    if (bad > 5) badCountWarns.push({ store:s, bad });
  });

  // 4) 免单金额 > 2000
  const freeWarns = [];
  stores.forEach(s => {
    const r = records.find(rr => rr['门店'] === s);
    if (!r) return;
    const free = safeNum(r['免单+减免']);
    if (free > 2000) freeWarns.push({ store:s, free });
  });

  const totalWarns = scoreWarns.length + badRateWarns.length + badCountWarns.length + freeWarns.length;

  if (totalWarns === 0) {
    container.innerHTML = `<div class="alert-section" style="border-color:var(--green);background:rgba(63,185,80,0.05);">
      <div class="alert-header" style="background:rgba(63,185,80,0.1);color:var(--green);border-color:rgba(63,185,80,0.15);">✓ 本月无异常警告</div>
    </div>`;
    return;
  }

  const monthLabel = date.substring(0,7).replace('-','年')+'月';
  let html = `<div class="alert-section">
    <div class="alert-header">⚠ ${monthLabel} 门店预警 (${totalWarns})</div>
    <div class="alert-body">`;

  if (scoreWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">📉 评分低于4.3</div>
      ${scoreWarns.map(w => `<div class="alert-store">
        <span class="name">${w.store}</span>
        <span class="val" style="color:${w.score<4?'var(--red)':'var(--orange)'}">${w.score.toFixed(1)}</span>
        <span class="detail">${w.platform}评分</span>
      </div>`).join('')}
    </div>`;
  }

  if (badRateWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">📊 差评率超过3%</div>
      ${badRateWarns.map(w => `<div class="alert-store" style="flex-wrap:wrap;padding:8px 10px;">
        <span class="name">${w.store}</span>
        <span class="val">${(w.rate*100).toFixed(1)}%</span>
        <span class="detail">差评 ${w.bad} 条</span>
        <div style="width:100%;font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:16px;">
          <span>🎵 抖音 ${w.dyTotal}评/${w.dyBad}差</span>
          <span>🟦 美团 ${w.mtTotal}评/${w.mtBad}差</span>
        </div>
      </div>`).join('')}
    </div>`;
  }

  if (badCountWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">🗣 新增差评超过5条</div>
      ${badCountWarns.map(w => `<div class="alert-store">
        <span class="name">${w.store}</span>
        <span class="val">${w.bad} 条</span>
      </div>`).join('')}
    </div>`;
  }

  if (freeWarns.length > 0) {
    html += `<div class="alert-group">
      <div class="alert-group-title">💰 免单金额超过2000元</div>
      ${freeWarns.map(w => `<div class="alert-store">
        <span class="name">${w.store}</span>
        <span class="val">${fmtY(w.free)}</span>
      </div>`).join('')}
    </div>`;
  }

  html += '</div></div>';
  container.innerHTML = html;
}

function initCompare() {
  // 门店下拉（按 STORE_ORDER 顺序）
  const sortedStores = [...STORES].sort((a, b) => {
    const ia = STORE_ORDER.indexOf(a);
    const ib = STORE_ORDER.indexOf(b);
    return ia - ib;
  });
  const list = document.getElementById('compare-store-list');
  list.innerHTML = `
    <div class="store-search"><input type="text" id="compare-store-search" placeholder="搜索门店..." oninput="filterStoreList(this.value)"></div>
    <div class="dropdown-footer">
      <button onclick="compareSelectAll()">全选</button>
      <button onclick="compareSelectNone()">清空</button>
    </div>` +
    sortedStores.map(s => `<div class="dropdown-item" data-store="${s}"><label><input type="checkbox" value="${s}" onchange="compareUpdateStores()"> ${s}</label></div>`).join('');

  // 日期下拉（时间倒序）
  const sortedAsc = [...DATES].sort();
  const sortedDesc = [...DATES].sort((a, b) => b.localeCompare(a));
  const startSel = document.getElementById('compare-start');
  const endSel = document.getElementById('compare-end');
  sortedAsc.forEach(d => {
    const label = d.substring(0,7).replace('-','年')+'月';
    startSel.innerHTML += `<option value="${d}">${label}</option>`;
  });
  sortedDesc.forEach(d => {
    const label = d.substring(0,7).replace('-','年')+'月';
    endSel.innerHTML += `<option value="${d}">${label}</option>`;
  });
  // 默认：起始月=截止月=最新
  const latest = sortedDesc[0];
  startSel.value = latest;
  endSel.value = latest;
  // 激活"最近一月"预设
  const presetBtns = document.querySelectorAll('#compare-preset-btns .preset-btn');
  presetBtns.forEach(b => b.classList.toggle('active', b.dataset.preset === 'latestMonth'));
  startSel.onchange = endSel.onchange = () => {
    document.querySelectorAll('#compare-preset-btns .preset-btn').forEach(b => b.classList.remove('active'));
    renderCompare();
  };

  // 指标下拉（统一分组）
  renderCompareMetricDropdown();

  // 默认全选
  compareSelectedStores = STORE_ORDER.filter(s => STORES.includes(s));
  compareUpdateStoreUI();
  renderCompare();
}

function renderCompareMetricDropdown() {
  const container = document.getElementById('compare-metric-list');
  const jsonMetrics = METRICS;
  const availableFields = new Set(Object.values(FIELD_MAP));

  container.innerHTML = Object.entries(METRIC_GROUPS).map(([grp, metrics]) => `
    <div class="metric-group">
      <div class="metric-group-header">${escapeHtml(grp)}</div>
      <div class="metric-group-items">
        ${metrics.filter(m => {
          const f = metricField(m);
          return jsonMetrics.includes(f);
        }).map(m => `
          <div class="metric-item ${compareSelectedMetrics.includes(m)?'selected':''}" data-metric="${escapeHtml(m)}">
            <input type="checkbox" ${compareSelectedMetrics.includes(m)?'checked':''} onclick="event.stopPropagation();compareToggleMetric('${jsString(m)}',this.parentElement)">
            ${escapeHtml(METRIC_LABELS[m]||m)}
          </div>`).join('')}
      </div>
    </div>`).join('');

  renderCompareMetricTags();
}

function compareSelectAll() {
  compareSelectedStores = [...STORES];
  compareUpdateStoreUI();
  renderCompare();
}
function compareSelectNone() {
  compareSelectedStores = [];
  compareUpdateStoreUI();
  renderCompare();
}
function compareUpdateStores() {
  compareSelectedStores = [...document.querySelectorAll('#compare-store-list input:checked')].map(i=>i.value);
  compareUpdateStoreUI();
  renderCompare();
}
function compareUpdateStoreUI() {
  const count = document.getElementById('compare-store-count');
  count.textContent = compareSelectedStores.length === 0 ? '选择门店' :
    compareSelectedStores.length < 5 ? compareSelectedStores.join(', ') :
    `已选${compareSelectedStores.length}家`;
  document.querySelectorAll('#compare-store-list input').forEach(i => {
    i.checked = compareSelectedStores.includes(i.value);
  });
  // Re-apply search filter
  const searchInput = document.getElementById('compare-store-search');
  if (searchInput && searchInput.value) filterStoreList(searchInput.value);
}

function filterStoreList(q) {
  document.querySelectorAll('#compare-store-list .dropdown-item').forEach(el => {
    el.style.display = (!q || el.dataset.store.includes(q)) ? '' : 'none';
  });
}

function compareToggleMetric(m, el) {
  const idx = compareSelectedMetrics.indexOf(m);
  if (idx >= 0) { compareSelectedMetrics.splice(idx,1); el.classList.remove('selected'); }
  else { compareSelectedMetrics.push(m); el.classList.add('selected'); }
  renderCompare();
  renderCompareMetricDropdown();
}
function compareRemoveMetric(m) {
  compareSelectedMetrics = compareSelectedMetrics.filter(x=>x!==m);
  renderCompare();
  renderCompareMetricDropdown();
}
function compareRestoreDefault() {
  compareSelectedMetrics = [...DEFAULT_COMPARE_METRICS];
  renderCompare();
  renderCompareMetricDropdown();
}

function setComparePreset(name) {
  const btns = document.querySelectorAll('#compare-preset-btns .preset-btn');
  btns.forEach(b => b.classList.toggle('active', b.dataset.preset === name));
  const sorted = [...DATES].sort();
  const startSel = document.getElementById('compare-start');
  const endSel = document.getElementById('compare-end');
  switch (name) {
    case 'latestMonth':
      startSel.value = sorted[sorted.length - 1];
      endSel.value = sorted[sorted.length - 1];
      break;
    case 'latestQuarter':
      startSel.value = sorted[Math.max(0, sorted.length - 3)];
      endSel.value = sorted[sorted.length - 1];
      break;
    case 'ytd': {
      const curYear = sorted[sorted.length - 1].substring(0,4);
      const ytd = sorted.filter(d => d.startsWith(curYear));
      startSel.value = ytd[0];
      endSel.value = ytd[ytd.length - 1];
      break;
    }
    default: // all
      startSel.value = sorted[0];
      endSel.value = sorted[sorted.length - 1];
      break;
  }
  renderCompare();
}

function renderCompareMetricTags() {
  const tagsEl = document.getElementById('compare-metric-tags');
  if (compareSelectedMetrics.length === 0) {
    tagsEl.innerHTML = '<span class="metric-tag empty">请在下方选择指标</span>';
  } else {
    tagsEl.innerHTML = compareSelectedMetrics.map((m, i) => {
      const c = CHART_COLORS[i % CHART_COLORS.length];
      return `<span class="metric-tag" id="tag-${m.replace(/[^a-zA-Z0-9]/g,'_')}" style="background:${c}15;border-color:${c}40;color:${c}">
        <span class="dot" style="background:${c}"></span>${escapeHtml(METRIC_LABELS[m]||m)}
        <span class="remove" onclick="compareRemoveMetric('${jsString(m)}')">×</span>
      </span>`;
    }).join('');
  }
  const btn = document.getElementById('compare-metric-count');
  if (btn) {
    btn.textContent = compareSelectedMetrics.length === 0 ? '选择指标'
      : compareSelectedMetrics.length <= 2 ? compareSelectedMetrics.map(mm=>METRIC_LABELS[mm]||mm).join(', ')
      : `已选${compareSelectedMetrics.length}个指标`;
  }
}

function renderCompare() {
  const start = document.getElementById('compare-start').value;
  const end = document.getElementById('compare-end').value;
  const dates = DATES.filter(d => d >= start && d <= end);

  // KPI cards: mean for each metric
  const kpiEl = document.getElementById('compare-kpi');
  if (compareSelectedStores.length === 0) {
    kpiEl.innerHTML = '<div style="color:var(--text2);padding:20px;">请选择门店</div>';
    return;
  }
  kpiEl.innerHTML = compareSelectedMetrics.map(m => {
    const vals = compareSelectedStores.map(s => calcStoreAvg(dates, s, m));
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    const unit = ['差评率','新客占比','曝光-访问转化率','美团意向转化率','抖音转化率'].includes(m) ? '%' : '';
    const fmtFn = ['差评率','新客占比','曝光-访问转化率','美团意向转化率','抖音转化率'].includes(m) ? fmtPct : fmtY;
    return `<div class="kpi-card">
      <div class="kpi-label">${METRIC_LABELS[m]||m}</div>
      <div class="kpi-value">${unit ? (Number(avg)*100).toFixed(1)+'%' : fmtFn(avg)}</div>
      <div class="kpi-sub">按有数据月份均值 | ${compareSelectedStores.length}店</div>
    </div>`;
  }).join('');

  renderCompareChart(dates);
  renderCompareTable(dates);
}

function renderCompareChart(dates) {
  compareCharts.forEach(c => c.dispose());
  const chart = echarts.init(document.getElementById('chart-compare-bar'));
  compareCharts = [chart];

  // 按第一个指标数值从高到低排序门店
  const sortMetric = compareSelectedMetrics[0];
  const sortedStores = [...compareSelectedStores].sort((a, b) => {
    const va = calcStoreAgg(dates, a, sortMetric);
    const vb = calcStoreAgg(dates, b, sortMetric);
    return vb - va;
  });

  const series = compareSelectedMetrics.map((m, i) => {
    const data = sortedStores.map(s => calcStoreAvg(dates, s, m));
    const isP = ['差评率','新客占比','曝光-访问转化率','美团意向转化率','抖音转化率'].includes(m);
    const color = CHART_COLORS[i % CHART_COLORS.length];
    return {
      name: METRIC_LABELS[m]||m,
      type:'bar',
      data: data.map(v => isP ? Number((v*100).toFixed(1)) : Number(v.toFixed(0))),
      yAxisIndex: isP ? 1 : 0,
      itemStyle:{color},
    };
  });

  const isP = compareSelectedMetrics.some(m => ['差评率','新客占比','曝光-访问转化率','美团意向转化率','抖音转化率'].includes(m));

  // Compute yAxis max for percentage metrics to avoid line at bottom of 0-100 scale
  let pctMax = null;
  if (isP) {
    const pctVals = [];
    compareSelectedMetrics.forEach(m => {
      if (['差评率','新客占比','曝光-访问转化率','美团意向转化率','抖音转化率'].includes(m)) {
        sortedStores.forEach(s => {
          pctVals.push(calcStoreAvg(dates, s, m) * 100);
        });
      }
    });
    pctMax = pctVals.length > 0 ? Math.max(...pctVals) * 1.2 : 5;
  }

  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis', formatter: p => p.map(pt=>`${pt.seriesName}: ${pt.value}${pt.seriesName.includes('率')?'%':''}`).join('<br>')},
    legend:{data:compareSelectedMetrics.map(m=>METRIC_LABELS[m]||m),textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8,top:5},
    xAxis:{type:'category',data:sortedStores,axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:10,rotate:15},splitLine:{show:false}},
    yAxis:[
      {type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:10}},
      ...(isP ? [{type:'value',max:pctMax,axisLine:{show:false},splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>v+'%'}}] : [])
    ],
    series,
    grid:{left:50,right:isP?50:20,top:30,bottom:30}
  });
}

function renderCompareTable(dates) {
  const cols = ['门店', ...compareSelectedMetrics.map(m => METRIC_LABELS[m]||m)];
  const thead = document.getElementById('compare-table-head');
  const tbody = document.getElementById('compare-table-body');
  thead.innerHTML = '<tr><th>门店</th>' + compareSelectedMetrics.map(m => `<th>${METRIC_LABELS[m]||m}</th>`).join('') + '</tr>';

  // 同柱状图一致，按第一个指标数值从高到低排序
  const sortMetric = compareSelectedMetrics[0];
  const sortedStores = [...compareSelectedStores].sort((a, b) => {
    const va = calcStoreAgg(dates, a, sortMetric);
    const vb = calcStoreAgg(dates, b, sortMetric);
    return vb - va;
  });
  const rows = sortedStores.map(store => {
    return [store, ...compareSelectedMetrics.map(m => {
      const v = calcStoreAvg(dates, store, m);
      const isP = ['差评率','新客占比','曝光-访问转化率','美团意向转化率','抖音转化率'].includes(m);
      return isP ? fmtPct(v) : fmtY(v);
    })];
  });

  tbody.innerHTML = rows.map(r => `<tr><td>${r[0]}</td>` + r.slice(1).map(v => `<td class="num">${v}</td>`).join('') + '</tr>').join('');
}

function exportCSV() {
  const start = document.getElementById('compare-start').value;
  const end = document.getElementById('compare-end').value;
  const dates = DATES.filter(d => d >= start && d <= end);
  if (compareSelectedStores.length === 0) return;

  const headers = ['门店', ...compareSelectedMetrics.map(m => METRIC_LABELS[m]||m)];
  const sortMetric = compareSelectedMetrics[0];
  const sortedStores = [...compareSelectedStores].sort((a, b) => {
    const va = calcStoreAgg(dates, a, sortMetric);
    const vb = calcStoreAgg(dates, b, sortMetric);
    return vb - va;
  });
  const rows = sortedStores.map(store => {
    return [store, ...compareSelectedMetrics.map(m => {
      const v = calcStoreAvg(dates, store, m);
      const isP = ['差评率','新客占比','美团意向转化率','抖音转化率','曝光-访问转化率'].includes(m);
      return isP ? (v*100).toFixed(1)+'%' : v.toFixed(1);
    })];
  });

  const csv = [headers.map(csvCell).join(','), ...rows.map(r => r.map(csvCell).join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `门店对比_${start}_${end}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function detailExportCSV() {
  const store = document.getElementById('detail-store').value;
  if (!store) return;

  // Get all dates that have data for this store
  const storeDates = ALL_DATA.data.filter(r => r['门店'] === store).map(r => r['日期']).sort();
  if (storeDates.length === 0) return;

  // Build list of exportable metrics (all FIELD_MAP keys)
  const exportMetrics = Object.keys(FIELD_MAP);
  const headers = ['日期', ...exportMetrics.map(m => METRIC_LABELS[m] || m)];
  const rows = storeDates.map(d => {
    const rec = IDX_BY_DS[d + '_' + store];
    return [d, ...exportMetrics.map(m => {
      const f = metricField(m);
      const v = rec ? safeNum(rec[f]) : '';
      const isP = isPct(m);
      return isP ? (v * 100).toFixed(1) + '%' : v.toFixed(1);
    })];
  });

  const csv = [headers.map(csvCell).join(','), ...rows.map(r => r.map(csvCell).join(','))].join('\n');

  a.href = URL.createObjectURL(blob);
  a.download = `单店详情_${store}_${storeDates[0]}_${storeDates[storeDates.length-1]}.csv`;

function renderDetailKPIs(store, date) {
  const dates = date ? [date] : DATES;
  const isAll = dates.length > 1;

  // Get prev month for MoM & prev year for YoY
  const curDate = dates[0];
  const dateParts = curDate.split('-');
  const year = parseInt(dateParts[0]);
  const month = parseInt(dateParts[1]);
  const prevMonth = (month === 1 ? `${year-1}-12` : `${year}-${String(month-1).padStart(2,'0')}`) + '-01';
  const prevYearMonth = `${year-1}-${String(month).padStart(2,'0')}-01`;
  const prevRecord = getRecord(prevMonth, store) || {};
  const pyRecord = getRecord(prevYearMonth, store) || {};
  const foundRecord = !isAll ? getRecord(dates[0], store) : null;
  const noData = !isAll && !foundRecord;
  const curRecord = foundRecord || {};

  const getVal = m => {
    if (isAll) return calcStoreAgg(dates, store, m) / dates.length;
    return safeNum(curRecord[m]);
  };
  const getPrevVal = m => safeNum(prevRecord[m]);
  const getPyVal = m => safeNum(pyRecord[m]);
  const getSum = m => calcStoreAgg(dates, store, m);
  const getPrevSum = m => calcStoreAgg([prevMonth], store, m);
  const getPySum = m => calcStoreAgg([prevYearMonth], store, m);

  function renderDelta(current, prev, isP, label) {
    if (!prev || prev === 0) return null;
    const delta = (current - prev) / prev;
    const sign = delta > 0 ? '+' : '';
    const cls = delta > 0 ? 'up' : 'down';
    const arrow = delta > 0 ? '↑' : '↓';
    return `<div class="kpi-change ${cls}"><span class="arrow">${arrow}</span>${sign}${(delta*100).toFixed(1)}% <span style="font-size:9px;color:var(--text2)">${label}</span></div>`;
  }

  const sections = [
    {
      title: '💰 营收', open: true, items: [
        { label:'服务营业额', val:fmtY(getSum('服务营业额')), sub:'元', color:'gold', m:'服务营业额', isSum:true, mom:true },
        { label:'现金流营业额', val:fmtY(getSum('现金流营业额')), sub:'元', color:'', m:'现金流营业额', isSum:true },
        { label:'抖音营业额', val:fmtY(getSum('抖音')), sub:'元', color:'', m:'抖音', isSum:true, mom:true },
        { label:'美团营业额', val:fmtY(getSum('美团')), sub:'元', color:'', m:'美团', isSum:true, mom:true },
        { label:'卡金', val:fmtY(getSum('卡金')), sub:'元', color:'', m:'卡金', isSum:true },
        { label:'免单减免', val:fmtY(getSum('免单减免')), sub:'元', color:'', m:'免单减免', isSum:true },
        { label:'开卡', val:fmtY(getSum('开卡')), sub:'元', color:'green', m:'开卡', isSum:true },
        { label:'续充', val:fmtY(getSum('续充')), sub:'元', color:'', m:'续充', isSum:true },
        { label:'商品营业额', val:fmtY(getSum('商品营业额')), sub:'元', color:'', m:'商品营业额', isSum:true },
      ]
    },
    {
      title: '⭐ 评分', open: true, items: [
        { label:'抖音评分', val:fmtScore(getVal('抖音评分')), sub:'分', color: Number(getVal('抖音评分'))>4.5?'green':'', m:'抖音评分' },
        { label:'美团评分', val:fmtScore(getVal('美团评分')), sub:'分', color: Number(getVal('美团评分'))>4.5?'green':'', m:'美团评分' },
        { label:'大众点评', val:fmtScore(getVal('大众点评')), sub:'分', color:'', m:'大众点评' },
        { label:'美团经营分', val:fmtScore(getVal('美团经营分')), sub:'分', color:'', m:'美团经营分' },
      ]
    },
    {
      title: '💬 评价', open: true, items: [
        { label:'新增评论', val:fmtN(getSum('综合新增评论')), sub:'条', color:'green', m:'综合新增评论', isSum:true },
        { label:'差评数', val:fmtN(getSum('综合新增差评')), sub:'条', color: getSum('综合新增差评')>0?'red':'', m:'综合新增差评', isSum:true },
        { label:'差评率', val:fmtPct(getVal('差评率')), sub:'', color: getVal('差评率')>0.05?'red':'', m:'差评率' },
      ]
    },
    {
      title: '📈 流量', open: true, items: [
        { label:'美团访问', val:fmtN(getSum('美团访问人数')), sub:'人', color:'', m:'美团访问人数', isSum:true },
        { label:'抖音访问', val:fmtN(getSum('抖音门店页访问人数')), sub:'人', color:'', m:'抖音门店页访问人数', isSum:true },
      ]
    },
    {
      title: '🔄 转化', open: true, items: [
        { label:'美团转化率', val:fmtPct(getVal('美团意向转化率')), sub:'', color:'', m:'美团意向转化率' },
        { label:'抖音转化率', val:fmtPct(getVal('抖音转化率')), sub:'', color:'', m:'抖音转化率' },
      ]
    },
    {
      title: '✅ 核销', open: true, items: [
        { label:'新客占比', val:fmtPct(getVal('新客占比')), sub:'', color:'', m:'新客占比' },
      ]
    }
  ];

  const container = document.getElementById('detail-kpi');
  const noDataBanner = noData ? `<div class="data-missing">该门店在 ${curDate.substring(0,7)} 无数据记录</div>` : '';
  container.innerHTML = noDataBanner + sections.map((sec, si) => `
    <div class="kpi-section">
      <div class="kpi-section-header">
        <span class="title">${sec.title}</span>
      </div>
      <div class="kpi-section-body">
        ${sec.items.map(it => {
          const isPMetric = ['差评率','新客占比','意向转化率','抖音转化率'].includes(it.m);
          const changeEl = it.mom && !isAll
            ? (renderDelta(it.isSum ? getSum(it.m) : getVal(it.m), it.isSum ? getPrevSum(it.m) : getPrevVal(it.m), isPMetric, '环比') || '')
            + (renderDelta(it.isSum ? getSum(it.m) : getVal(it.m), it.isSum ? getPySum(it.m) : getPyVal(it.m), isPMetric, '同比') || '')
            : '';
          return `<div class="kpi-card${noData?' no-data':''}">
            <div class="kpi-label">${it.label}</div>
            <div class="kpi-value ${noData ? '' : it.color}">${noData ? '—' : it.val}</div>
            ${it.sub ? `<div class="kpi-sub">${noData ? '—' : it.sub}</div>` : ''}
            ${noData ? '' : changeEl}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}

  detailCharts.push(convChart);
  convChart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>${p[0].seriesName}: ${(p[0].value*100).toFixed(1)}%`},
    legend:{data:['美团意向转化率','抖音转化率'],textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8,top:5},
    xAxis:{type:'category',data:convLabels.map(d=>d.substring(5,7)+'月'),axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:10},splitLine:{show:false}},
    yAxis:{type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>(v*100).toFixed(0)+'%'}},
    series:[
      {name:'美团意向转化率',data:convLabels.map(d=>conv1[d]),type:'line',smooth:true,symbol:'circle',symbolSize:3,lineStyle:{color:'#4a9eff',width:2},itemStyle:{color:'#4a9eff'}},
      {name:'抖音转化率',data:convLabels.map(d=>conv2[d]),type:'line',smooth:true,symbol:'circle',symbolSize:3,lineStyle:{color:'#f85149',width:2},itemStyle:{color:'#f85149'}},
    ],
    grid:{left:50,right:15,top:30,bottom:25}
  });

  // 新客占比
  const newRate = getStoreMonthlyData(store,'新客占比',dates);
  const newLabels = labels.filter(d => hasData(newRate, d));
  const newChart = echarts.init(document.getElementById('chart-detail-new-customer'));
  detailCharts.push(newChart);
  newChart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>${(p[0].value*100).toFixed(1)}%`},
    xAxis:{type:'category',data:newLabels.map(d=>d.substring(5,7)+'月'),axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:10},splitLine:{show:false}},
    yAxis:{type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:10,formatter:v=>(v*100).toFixed(0)+'%'},max:1},
    series:[{data:newLabels.map(d=>newRate[d]),type:'line',smooth:true,symbol:'circle',symbolSize:3,areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(63,185,80,0.4)'},{offset:1,color:'rgba(63,185,80,0)'}]}},lineStyle:{color:'#3fb950',width:2},itemStyle:{color:'#3fb950'}}],
    grid:{left:50,right:15,top:10,bottom:25}
  });
}

function renderCardGold(store) {
  const dates = DATES;
  const consume = getStoreMonthlyData(store,'卡金',dates);
  const recharge = getStoreMonthlyData(store,'充值',dates);
  const labels = Object.keys(consume).sort();
  const hasData = (obj, d) => (obj[d] || 0) > 0;
  const glabels = labels.filter(d => hasData(consume,d) || hasData(recharge,d));

  // 消耗数据点：超标的大红点（带差额标签），正常的小绿点
  const seriesData1 = glabels.map(d => {
    const isWarn = safeNum(recharge[d]) < safeNum(consume[d]);
    const diff = safeNum(consume[d]) - safeNum(recharge[d]);
    return {
      value: consume[d],
      symbolSize: isWarn ? 12 : 3,
      itemStyle: { color: isWarn ? '#f85149' : '#3fb950' },
      label: isWarn ? {
        show: true, position:'top', color:'#f85149', fontSize:10,
        fontWeight:'bold',
        formatter: (diff >= 10000 ? (diff/10000).toFixed(1)+'万' : diff.toFixed(0)) + ' ⚠'
      } : undefined
    };
  });

  const chart = echarts.init(document.getElementById('chart-detail-cardgold'));
  detailCharts.push(chart);

  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>${p[0].seriesName}: ${p[0].value.toLocaleString('zh-CN')}<br>${p[1].seriesName}: ${p[1].value.toLocaleString('zh-CN')}`},
    legend:{data:['卡金消耗','充值'],textStyle:{color:'#8b949e',fontSize:10},itemWidth:12,itemHeight:8,top:5},
    xAxis:{type:'category',data:glabels.map(d=>d.substring(5,7)+'月'),axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:10},splitLine:{show:false}},
    yAxis:{type:'value',axisLine:{show:false},splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e',fontSize:10}},
    series:[
      {
        name:'卡金消耗', data:seriesData1, type:'line', smooth:true,
        symbol:'circle', symbolSize:3,
        lineStyle:{color:'#f85149',width:2},
        label:{ show:false }  // 默认不显示，只对超标数据点单独开启
      },
      {name:'充值',data:glabels.map(d=>recharge[d]),type:'line',smooth:true,symbol:'circle',symbolSize:3,lineStyle:{color:'#3fb950',width:2},itemStyle:{color:'#3fb950'}},
    ],
    grid:{left:60,right:15,top:40,bottom:25}
  });
}

// ============================================================
// Tab 切换
// ============================================================
function setupTabListeners() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');

      // Resize charts when tab becomes visible
      setTimeout(() => {
        const activeTab = document.querySelector('.tab-content.active');
        if (activeTab) {
          activeTab.querySelectorAll('.chart').forEach(el => {
            const instance = echarts.getInstanceByDom(el);
            if (instance) instance.resize();
          });
        }
      }, 50);
    });
  });
  window.addEventListener('resize', () => {
    document.querySelectorAll('.chart').forEach(el => {
      const instance = echarts.getInstanceByDom(el);
      if (instance) instance.resize();
    });
  });
}
</script>
